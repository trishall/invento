function vImport(){
  topTitle('Import CSV','#more');
  $('#main').innerHTML='<h1 class="page">Import items from CSV</h1>'+
    '<div class="card pad mb"><p class="sub" style="margin-bottom:10px">Minimum columns: <b>Name</b> and <b>Quantity</b>. Also understood: '+locTerm()+', Unit, Price, Cost (USD), Min, SKU, Barcode, Tags, Notes. Headers are matched automatically — export from Excel or Sheets as CSV.</p>'+
    '<div class="dz" id="imp-dz">'+ico('csv')+'<div style="margin-top:8px;font-weight:700;color:var(--ink)">Choose a CSV file</div><div class="small" style="margin-top:3px">or drop it here</div></div>'+
    '<input type="file" id="imp-f" accept=".csv,text/csv" style="display:none"></div>'+
    '<div class="card pad mb"><div class="row" style="gap:12px;align-items:center"><span class="th" style="background:var(--saddle-bg);color:var(--saddle);flex:0 0 auto">'+ico('down')+'</span><div class="grow"><div style="font-weight:700;font-size:14px">Not sure of the format?</div><div class="small muted">Download a ready-to-fill template with the right headers and example rows.</div></div><button class="btn sm" id="imp-tpl">'+ico('csv')+'Template</button></div></div>'+
    '<div id="imp-stage"></div>';
  const fin=$('#imp-f'),dz=$('#imp-dz');
  dz.onclick=()=>fin.click();
  dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='var(--saddle)'};
  dz.ondragleave=()=>{dz.style.borderColor=''};
  dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';const f=e.dataTransfer.files[0];if(f)readFile(f)};
  fin.onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)readFile(f)};
  $('#imp-tpl').onclick=()=>{
    const headers=['Name','Quantity','Unit',locTerm(),'Price','Cost (USD)','Min quantity','SKU','Barcode','Other SKUs','Tags','Notes'];
    const sample=[
      ['Leather Duffle — Vintage Brown','12','pcs','Workshop','7999','45','3','CLB-DUF-201','CLB-DUF-201','ETSY-DUF-201','duffle; bestseller','Full-grain, 22 inch'],
      ['Bifold Wallet — Black','40','pcs','Shelf A','1299','5','10','CLB-WAL-101','CLB-WAL-101','','wallet','Buffalo leather'],
      ['Raw Hide — Tan','25','sq.ft','Godown','','2.5','','RAW-TAN-01','','','material','Per square foot']
    ];
    const csv=buildCSV([headers].concat(sample));
    download('invento-import-template.csv',csv,'text/csv');
    toast('Template downloaded — fill it and import','ok');
  };
  function readFile(f){
    const r=new FileReader();
    r.onload=()=>prep(String(r.result));
    r.onerror=()=>toast('Could not read file','err');
    r.readAsText(f);
  }
  const ALIAS={name:['name','item','itemname','item name','product','title','product name'],qty:['quantity','qty','stock','units','onhand','on hand','count'],folder:['folder','location','godown','warehouse','shelf','place'],unit:['unit','uom'],price:['price','sell','sale price','selling price','mrp','rate'],cost:['cost','cost (usd)','cost usd','buy','purchase','purchase price','cost price'],min:['min','minimum','min qty','min quantity','minimum quantity','reorder','reorder level','low stock'],sku:['sku','item code','code no','article'],code:['barcode','qr','code','barcode value','ean','upc'],alt:['other skus','alt skus','alt','more skus','barcodes'],tags:['tags','tag','labels','category','categories'],notes:['notes','note','description','remarks','desc']};
  function prep(text){
    const rows=parseCSV(text);
    if(rows.length<2){toast('File needs a header row and at least one data row','err');return}
    const head=rows[0].map(h=>String(h).trim().toLowerCase());
    const col={};
    Object.keys(ALIAS).forEach(k=>{const ix=head.findIndex(h=>ALIAS[k].includes(h));if(ix>=0&&!(k==='code'&&col.sku===ix))col[k]=ix});
    if(col.name==null||col.qty==null){toast('Could not find Name and Quantity columns','err');return}
    const data=rows.slice(1),errs=[];
    const parsed=data.map((rw,ix)=>{
      const name=String(rw[col.name]||'').trim();
      const qty=round4(parseFloat(rw[col.qty]));
      if(!name){errs.push('Row '+(ix+2)+': missing name');return null}
      if(isNaN(qty)){errs.push('Row '+(ix+2)+': quantity is not a number');return null}
      const g=k=>(col[k]!=null?String(rw[col[k]]||'').trim():'');
      return{name:name,qty:qty,folderName:g('folder'),unit:g('unit')||'pcs',price:g('price'),cost:g('cost'),min:g('min'),sku:g('sku'),code:g('code')||g('sku'),alt:g('alt').split(/[;,]/).map(s=>s.trim()).filter(Boolean),tags:g('tags').split(/[;,]/).map(s=>s.trim()).filter(Boolean),notes:g('notes')};
    }).filter(Boolean);
    const dups=parsed.filter(p=>p.sku&&S.items.some(i=>i.sku===p.sku)).length;
    let h='<div class="card pad mb"><div class="eyebrow" style="margin-bottom:8px">Ready to import</div>'+
      '<div class="kv" style="border:none;padding:0;background:transparent;gap:0 14px"><div><div class="k">Valid rows</div><div class="v num">'+parsed.length+'</div></div><div><div class="k">Skipped rows</div><div class="v num">'+errs.length+'</div></div></div>'+
      (dups?'<div class="field mt"><label>'+dups+' rows match existing SKUs</label><select class="in" id="imp-dup"><option value="update">Update existing items (qty &amp; details)</option><option value="skip">Skip them</option><option value="create">Create as new items anyway</option></select></div>':'')+
      (errs.length?'<details class="mt small muted"><summary>Show skipped rows</summary><div style="margin-top:6px">'+errs.slice(0,30).map(esc).join('<br>')+(errs.length>30?'<br>…':'')+'</div></details>':'')+
      '<button class="btn pri block mt" id="imp-go">'+ico('check')+'Import '+parsed.length+' items</button></div>';
    h+='<div class="tablewrap"><table class="t"><thead><tr><th>Name</th><th>'+locTerm()+'</th><th class="r">Qty</th><th>SKU</th></tr></thead><tbody>'+parsed.slice(0,8).map(p=>'<tr><td>'+esc(p.name)+'</td><td class="small">'+esc(p.folderName||'—')+'</td><td class="r num">'+fmtQty(p.qty)+'</td><td class="small mono">'+esc(p.sku||'')+'</td></tr>').join('')+(parsed.length>8?'<tr><td colspan="4" class="small muted">… and '+(parsed.length-8)+' more</td></tr>':'')+'</tbody></table></div>';
    $('#imp-stage').innerHTML=h;
    $('#imp-go').onclick=async()=>{
      $('#imp-go').disabled=true;
      const dupMode=$('#imp-dup')?$('#imp-dup').value:'update';
      const fmap={};S.folders.forEach(f=>fmap[folderPath(f.id).toLowerCase()]=f.id);S.folders.forEach(f=>{if(!(f.name.toLowerCase() in fmap))fmap[f.name.toLowerCase()]=f.id});
      function folderFor(nm){
        if(!nm)return null;const key=nm.toLowerCase();
        if(fmap[key])return fmap[key];
        let parent=null;
        nm.split('/').map(s=>s.trim()).filter(Boolean).forEach(seg=>{
          const segKey=(parent?folderPath(parent).toLowerCase()+' / ':'')+seg.toLowerCase();
          if(fmap[segKey]){parent=fmap[segKey];return}
          const nf={id:uid('f'),name:seg,parent:parent,createdAt:Date.now()};
          S.folders.push(nf);fmap[segKey]=nf.id;parent=nf.id;
        });
        return parent;
      }
      let added=0,updated=0,skipped=0;
      parsed.forEach(p=>{
        const ex=p.sku?S.items.find(i=>i.sku===p.sku):null;
        if(ex){
          if(dupMode==='skip'){skipped++;return}
          if(dupMode==='update'){
            Object.assign(ex,{name:p.name,qty:p.qty,unit:p.unit,price:p.price,cost:p.cost,min:p.min,tags:p.tags.length?p.tags:ex.tags,notes:p.notes||ex.notes,updatedAt:Date.now()});
            if(p.sku||p.alt.length)setSkus(ex,[p.sku||p.code||ex.sku].concat(p.alt||[]).filter(Boolean));
            if(p.folderName)ex.folder=folderFor(p.folderName);
            updated++;return;
          }
        }
        const ni=newItem({name:p.name,qty:p.qty,unit:p.unit,price:p.price,cost:p.cost,min:p.min,tags:p.tags,notes:p.notes,folder:folderFor(p.folderName)});
        setSkus(ni,[p.sku||p.code].concat(p.alt||[]).filter(Boolean));
        S.items.push(ni);
        added++;
      });
      logTx('imported',{detail:added+' added, '+updated+' updated'+(skipped?', '+skipped+' skipped':'')+' from CSV'});
      await Promise.all([saveNow('items'),saveNow('folders')]);
      updateBadges();
      toast('Imported — '+added+' added, '+updated+' updated','ok');
      go('#stock');
    };
  }
}

  $$('#main [data-rs]').forEach(b=>b.onclick=()=>{
    const t=S.trash.splice(+b.dataset.rs,1)[0];if(!t)return;
    delete t.deletedAt;const from=t.deletedFrom;delete t.deletedFrom;
    if(t.folder&&!fById(t.folder))t.folder=null;
    S.items.push(t);save('items');save('trash');
    logTx('restored',{itemId:t.id,itemName:t.name,detail:'from trash ('+(from||'')+')'});
    toast('Restored '+t.name,'ok');updateBadges();route();
  });
  $$('#main [data-pd]').forEach(b=>b.onclick=async()=>{
    const t=S.trash[+b.dataset.pd];if(!t)return;
    const ok=await confirmDlg('Delete forever?','\u201C'+esc(t.name)+'\u201D and its photos will be gone for good.','Delete forever',true);
    if(!ok)return;
    S.trash.splice(+b.dataset.pd,1);await store.del('p:'+t.id);save('trash');route();
  });
  const te=$('#tr-empty');if(te)te.onclick=async()=>{
    const ok=await confirmDlg('Empty trash?',S.trash.length+' items and their photos will be permanently deleted.','Empty trash',true);
    if(!ok)return;
    for(const t of S.trash)await store.del('p:'+t.id);
    S.trash=[];save('trash');route();
  };
}

/* ============================================================
   TEAM MEMBERS (admin)
   ============================================================ */
const ROLE_PILL={mainframe:['Mainframe','info'],admin:['Admin','warn'],user:['User','gray']};
const STAT_PILL={active:['Active','ok'],pending:['Pending','warn'],revoked:['Revoked','low']};
function vUsers(){
  if(MODE!=='cloud'||!isAdminU()){go('#more');return}
  topTitle('Team members','#more');
  $('#main').innerHTML='<h1 class="page">Team members</h1><div class="sub mb" id="us-note">Loading…</div><div id="us-list"></div>';
  paintUsers();
}
async function paintUsers(){
  const wrap=$('#us-list');if(!wrap)return;
  let docs;
  try{const q=await db.collection('users').get();docs=q.docs.map(d=>d.data())}
  catch(e){$('#us-note').textContent='Could not load users: '+((e&&e.message)||e);return}
  docs.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  const note=$('#us-note');
  const pend=docs.filter(u=>u.status==='pending').length;
  note.innerHTML=docs.length+' account'+(docs.length!==1?'s':'')+(pend?' · <b style="color:var(--amber)">'+pend+' waiting for approval</b>':'')+(isMF()?'':' · Only the mainframe account can manage admins.');
  let h='<div class="ilist">';
  docs.forEach(u=>{
    const me=fbUser&&u.id===fbUser.uid;
    const rp=ROLE_PILL[u.role]||ROLE_PILL.user, sp=STAT_PILL[u.status]||STAT_PILL.pending;
    const canManage=!me&&(isMF()?u.role!=='mainframe':(u.role==='user'));
    let btns='';
    if(canManage){
      if(u.status==='pending')btns+='<button class="btn sm pri" data-ua="approve" data-id="'+u.id+'">'+ico('check')+'Approve</button>';
      if(u.status==='active')btns+='<button class="btn sm danger" data-ua="revoke" data-id="'+u.id+'">Revoke</button>';
      if(u.status==='revoked')btns+='<button class="btn sm" data-ua="approve" data-id="'+u.id+'">Reactivate</button>';
      if(isMF()&&u.status==='active'&&u.role==='user')btns+='<button class="btn sm" data-ua="promote" data-id="'+u.id+'">Make admin</button>';
      if(isMF()&&u.role==='admin')btns+='<button class="btn sm" data-ua="demote" data-id="'+u.id+'">Make user</button>';
    }
    h+='<div class="irow" style="cursor:default;flex-wrap:wrap"><span class="th" style="background:var(--saddle-bg);color:var(--saddle);font-weight:800;font-size:15px">'+esc(cap1((u.name||u.userid||'?').charAt(0)))+'</span>'+
      '<div class="grow"><div class="nm">'+esc(u.name||cap1(u.userid))+(me?' <span class="muted" style="font-weight:600">(you)</span>':'')+'</div><div class="meta mono">'+esc(u.userid)+'</div></div>'+
      '<span class="pill '+rp[1]+'">'+rp[0]+'</span> <span class="pill '+sp[1]+'">'+sp[0]+'</span>'+
      (btns?'<div class="row" style="width:100%;margin-top:9px;gap:7px;flex-wrap:wrap">'+btns+'</div>':'')+
      '</div>';
  });
  h+='</div>';
  wrap.innerHTML=h;
  $$('#us-list [data-ua]').forEach(b=>b.onclick=async()=>{
    const act=b.dataset.ua,id=b.dataset.id;const u=docs.find(x=>x.id===id);if(!u)return;
    const label=act==='approve'?(u.status==='revoked'?'Reactivate':'Approve')+' '+u.name+'?':act==='revoke'?'Revoke '+u.name+'? They will be signed out and lose all access.':act==='promote'?'Make '+u.name+' an admin? Admins can delete items and manage users.':'Make '+u.name+' a regular user?';
    const ok=await confirmDlg('Team member',esc(label),'Confirm',act==='revoke');if(!ok)return;
    const patch=act==='approve'?{status:'active',approvedBy:userName()}:act==='revoke'?{status:'revoked'}:act==='promote'?{role:'admin'}:{role:'user'};
    try{await db.collection('users').doc(id).update(patch);toast('Done','ok');logTx('list',{detail:(act==='approve'?'Approved ':act==='revoke'?'Revoked ':act==='promote'?'Promoted ':'Demoted ')+u.name})}
    catch(e){toast('Not allowed: '+((e&&e.code)||e),'err')}
    paintUsers();
  });
}

/* ============================================================
   GLOBAL ACTIONS + INIT
   ============================================================ */
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-act]');if(!b)return;
  const act=b.dataset.act,id=b.dataset.id;
  if(act==='newitem')go('#edit/new'+(b.dataset.folder?'/'+b.dataset.folder:''));
  else if(act==='newfolder')folderDlg(b.dataset.parent||null);
  else if(act==='edititem')go('#edit/'+id);
  else if(act==='moveitem'){const i=iById(id);if(i)moveDlg([i])}
  else if(act==='cloneitem'){const i=iById(id);if(i)cloneDlg(i)}
  else if(act==='labelone'){sessionStorage.setItem('lblsel',JSON.stringify([id]));go('#labels')}
  else if(act==='addto'){const i=iById(id);if(i)addToDlg(i)}
  else if(act==='delitem'){if(!isAdminU()){toast('Only admins can delete','err');return}const i=iById(id);if(!i)return;confirmDlg('Move to trash?','\u201C'+esc(i.name)+'\u201D can be restored from Trash later.','Move to trash',true).then(ok=>{if(!ok)return;trashItem(i);logTx('deleted',{itemId:i.id,itemName:i.name});toast('Moved to trash');updateBadges();go('#stock'+(i.folder?'/'+i.folder:''))})}
  else if(act==='renfolder')folderDlg(null,id);
  else if(act==='delfolder'){if(!isAdminU()){toast('Only admins can delete','err');return}deleteFolder(id)}
  else if(act==='newlist'){b.disabled=true;createList().then(lid=>go('#list/'+lid))}
});

/* ============================================================
   SETUP / CONNECT SCREENS
   ============================================================ */
const FB_RULES="rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    function uD() { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data; }\n    function active() { return request.auth != null && uD().status == 'active'; }\n    function admin() { return active() && uD().role in ['admin','mainframe']; }\n    function mainframe() { return active() && uD().role == 'mainframe'; }\n\n    match /users/{uid} {\n      allow read: if request.auth != null && (request.auth.uid == uid || admin());\n      allow create: if request.auth != null && request.auth.uid == uid && (\n        (request.resource.data.role == 'user' && request.resource.data.status == 'pending') ||\n        (request.auth.token.email == 'trishal@invento.app' && request.resource.data.role == 'mainframe')\n      );\n      allow update: if mainframe()\n        || (admin() && resource.data.role == 'user' && request.resource.data.role == 'user')\n        || (request.auth != null && request.auth.uid == uid\n            && request.resource.data.role == resource.data.role\n            && request.resource.data.status == resource.data.status);\n      allow delete: if mainframe();\n    }\n\n    match /txns/{id}    { allow read, create: if active(); allow update: if false; allow delete: if admin(); }\n    match /trash/{id}   { allow read: if active(); allow create, update, delete: if admin(); }\n    match /meta/{doc}   { allow read, write: if active(); }\n    match /items/{id}   { allow read, create, update: if active(); allow delete: if admin(); }\n    match /folders/{id} { allow read, create, update: if active(); allow delete: if admin(); }\n    match /lists/{id}   { allow read, create, update: if active(); allow delete: if admin(); }\n    match /pos/{id}     { allow read, create, update: if active(); allow delete: if admin(); }\n    match /photos/{id}  { allow read, write: if active(); }\n  }\n}";
function authEmail(u){u=String(u||'').trim().toLowerCase();return u.indexOf('@')>0?u:u.replace(/[^a-z0-9._-]/g,'')+'@invento.app'}
function authErrMsg(e){
  const c=(e&&e.code)||'';
  return (c==='auth/invalid-credential'||c==='auth/wrong-password'||c==='auth/user-not-found'||c==='auth/invalid-email')?'Wrong user ID or password'
    :(c==='auth/email-already-in-use')?'That user ID is already taken — try signing in'
    :(c==='auth/weak-password')?'Password must be at least 6 characters'
    :(c==='auth/operation-not-allowed')?'Email/Password sign-in is not enabled in the Firebase console (Authentication → Sign-in method)'
    :(c==='auth/too-many-requests')?'Too many attempts — wait a minute and try again'
    :(c==='auth/network-request-failed')?'No internet — check the connection'
    :((e&&e.message)||String(e));
}
function vLogin(err,tab){
  tab=tab||'in';
  topTitle('Welcome','');
  $('#main').innerHTML='<div class="welcome"><div class="eyebrow" style="color:#C9A86C">Invento</div><h2>'+(tab==='in'?'Sign in':'Create your account')+'</h2><p>'+(tab==='in'?'Use your Invento user ID. You stay signed in on this device.':'Pick a user ID and password. An admin approves new accounts before they can see stock.')+'</p></div>'+
    '<div class="seg mb"><button id="tb-in" class="'+(tab==='in'?'on':'')+'">Sign in</button><button id="tb-up" class="'+(tab==='up'?'on':'')+'">Sign up</button></div>'+
    '<div class="card pad">'+
    (err?'<p class="sub" style="color:var(--red);margin-bottom:12px;font-weight:600">'+esc(err)+'</p>':'')+
    (tab==='up'?'<div class="field"><label>Full name</label><input class="in" id="lg-n" autocomplete="name" placeholder="e.g. Ramesh Kumar"></div>':'')+
    '<div class="field"><label>User ID</label><input class="in" id="lg-u" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="e.g. ramesh"></div>'+
    '<div class="field"><label>Password</label><input class="in" id="lg-p" type="password" autocomplete="'+(tab==='up'?'new-password':'current-password')+'" placeholder="'+(tab==='up'?'At least 6 characters':'')+'"></div>'+
    '<button class="btn pri block" id="lg-go">'+ico('check')+(tab==='in'?'Sign in':'Create account')+'</button>'+
    (tab==='in'?'<div class="hint mt">Forgot the password? Ask the admin to reset it (Firebase console → Authentication → Users).</div>':'<div class="hint mt">User IDs are letters/numbers only — staff sign in with just the ID, no email or OTP.</div>')+
    '</div>';
  $('#tb-in').onclick=()=>vLogin('','in');
  $('#tb-up').onclick=()=>vLogin('','up');
  const doAuth=async()=>{
    const u=$('#lg-u').value.trim(),p=$('#lg-p').value;
    if(!u||!p){toast('Enter user ID and password','err');return}
    const email=authEmail(u);
    const uidName=email.split('@')[0];
    const btn=$('#lg-go');btn.disabled=true;btn.textContent=tab==='in'?'Signing in…':'Creating…';
    try{
      if(tab==='in'){
        await firebase.auth().signInWithEmailAndPassword(email,p);
      }else{
        const nm=($('#lg-n').value||'').trim()||cap1(uidName);
        const cred=await firebase.auth().createUserWithEmailAndPassword(email,p);
        try{await cred.user.updateProfile({displayName:nm})}catch(e){}
        const prof={id:cred.user.uid,userid:uidName,name:nm,
          role:uidName===MAINFRAME_ID?'mainframe':'user',
          status:uidName===MAINFRAME_ID?'active':'pending',createdAt:Date.now()};
        await db.collection('users').doc(cred.user.uid).set(prof);
      }
      location.hash='#home';location.reload();
    }catch(e){vLogin(authErrMsg(e),tab)}
  };
  $('#lg-go').onclick=doAuth;
  $('#lg-p').onkeydown=e=>{if(e.key==='Enter')doAuth()};
  $(tab==='up'?'#lg-n':'#lg-u').focus();
}
function vPending(){
  topTitle('Awaiting approval','');
  $('#main').innerHTML='<div class="empty" style="margin-top:46px">'+ico('check')+'<div class="t">Account created — waiting for approval</div><div class="s">Signed in as <b>'+esc(userName())+'</b>. An admin needs to approve you in More → Team members before you can see stock. Ask them, then tap below.</div>'+
    '<div class="row" style="justify-content:center;gap:9px"><button class="btn pri" onclick="location.reload()">'+ico('undo')+'Check again</button><button class="btn" id="pd-out">Sign out</button></div></div>';
  $('#pd-out').onclick=async()=>{try{await firebase.auth().signOut()}catch(e){};location.reload()};
}
function vRevoked(){
  topTitle('Access revoked','');
  $('#main').innerHTML='<div class="empty" style="margin-top:46px">'+ico('alert')+'<div class="t">Access revoked</div><div class="s">This account ('+esc(userName())+') has been revoked by an admin. Contact them if you think this is a mistake.</div>'+
    '<button class="btn" id="rv-out">Sign out</button></div>';
  $('#rv-out').onclick=async()=>{try{await firebase.auth().signOut()}catch(e){};location.reload()};
}
function vSetup(err){
  topTitle('Connect your team','');
  $('#main').innerHTML='<div class="welcome"><div class="eyebrow" style="color:#C9A86C">One-time setup</div><h2>Connect Firebase</h2><p>Ten minutes, free, and everyone on the team sees the same live stock — every change syncs instantly to all phones.</p></div>'+
    (err?'<div class="card pad mb" style="border-color:var(--red)"><b style="color:var(--red)">Could not connect</b><div class="sub mt" style="margin-top:6px">'+esc(err)+'</div></div>':'')+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:8px">Do this once (any laptop)</div><ol style="padding-left:20px;font-size:14px;line-height:1.85">'+
    '<li>Open <b>console.firebase.google.com</b> → <b>Add project</b> (name it <span class="mono">invento</span>, Analytics off)</li>'+
    '<li><b>Build → Firestore Database → Create database</b> → Production mode → location <b>asia-south1 (Mumbai)</b></li>'+
    '<li>In Firestore, open the <b>Rules</b> tab, replace everything with the rules below → <b>Publish</b></li>'+
    '<li><b>Build → Authentication → Get started → Sign-in method → Email/Password → Enable</b></li>'+
    '<li>Team members <b>sign up themselves</b> in the app (just a user ID + password, no email/OTP) — new accounts wait until an admin approves them in More → Team members. The ID <span class="mono">trishal</span> becomes the mainframe owner automatically.</li>'+
    '<li>Click the <b>&lt;/&gt;</b> (Web) icon on Project Overview → register app → copy the <span class="mono">firebaseConfig</span> block</li>'+
    '<li>Paste it below → Connect → sign in. Then share this file (or the team link from More) with your staff — they sign in with their own ID.</li></ol></div>'+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Security rules (step 3)</div><pre class="mono" id="ruletext" style="font-size:11.5px;background:#F7F4EE;border:1px solid var(--line);border-radius:10px;padding:10px;white-space:pre-wrap">'+esc(FB_RULES)+'</pre><button class="btn sm" id="rule-copy">'+ico('copy')+'Copy rules</button></div>'+
    '<div class="card pad mb"><div class="field"><label>Paste your firebaseConfig here</label><textarea class="in mono" id="cfg-in" style="min-height:130px" placeholder=\'const firebaseConfig = {\n  apiKey: "AIza…",\n  authDomain: "godown-xxxx.firebaseapp.com",\n  projectId: "godown-xxxx",\n  …\n};\'></textarea></div><button class="btn pri block" id="cfg-go">'+ico('bolt')+'Connect &amp; sync</button></div>'+
    '<button class="btn block" id="cfg-local">Skip — use on this device only (no sync)</button>';
  $('#rule-copy').onclick=()=>{try{navigator.clipboard.writeText(FB_RULES);toast('Rules copied','ok')}catch(e){toast('Select and copy the text above','err')}};
  $('#cfg-go').onclick=()=>{
    const c=parseCfgText($('#cfg-in').value);
    if(!c){toast('That does not look like a Firebase config — paste the whole block','err');return}
    localStorage.setItem('gdwn:fbconfig',JSON.stringify(c));
    localStorage.removeItem('gdwn:mode');
    location.hash='#home';location.reload();
  };
  $('#cfg-local').onclick=()=>{localStorage.setItem('gdwn:mode','local');location.hash='#home';location.reload()};
}
function vCloudError(e){
  topTitle('Connection problem','');
  const msg=(e&&e.message)||String(e);
  const denied=/permission|insufficient/i.test(msg);
  $('#main').innerHTML='<h1 class="page">Could not connect</h1>'+
    '<div class="card pad mb" style="border-color:var(--red)"><div class="mono small" style="word-break:break-word">'+esc(msg)+'</div>'+'</div>'+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Usual fixes</div><ul style="padding-left:18px;font-size:14px;line-height:1.8">'+
    (denied?'<li><b>Enable Email/Password sign-in</b> (Authentication → Sign-in method) and check the Firestore <b>Rules</b> allow signed-in users</li>':'')+
    '<li>Check internet on this device</li><li>Make sure Firestore Database was created in the project</li><li>Re-paste the config if the project changed</li></ul></div>'+
    '<div class="row" style="gap:9px"><button class="btn pri grow" onclick="location.reload()">'+ico('undo')+'Retry</button><button class="btn grow" id="ce-cfg">Re-enter config</button></div>'+
    '<button class="btn block mt" id="ce-local">Use on this device only (no sync)</button>';
  $('#ce-cfg').onclick=()=>{localStorage.removeItem('gdwn:fbconfig');location.reload()};
  $('#ce-local').onclick=()=>{localStorage.removeItem('gdwn:fbconfig');localStorage.setItem('gdwn:mode','local');location.reload()};
}

(async function init(){
  window.addEventListener('hashchange',route);
  paintNav();
  $('#main').innerHTML='<div class="empty" style="margin-top:56px">'+ico('bolt')+'<div class="t">Connecting…</div><div class="s">Loading Invento</div></div>';
  let res;
  try{res=await loadAll()}
  catch(e){console.error(e);vCloudError(e);return}
  if(res==='setup'){vSetup();return}
  if(res==='login'){vLogin();return}
  if(res==='pending'){vPending();return}
  if(res==='revoked'){vRevoked();return}
  bootDone=true;
  route();
})();
</script>
