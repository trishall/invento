<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#221C15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Invento — Inventory</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%238A5226'/%3E%3Ccircle cx='32' cy='17.5' r='4' fill='%23E8B04B'/%3E%3Cpath d='M19 28h26v17a3 3 0 0 1-3 3H22a3 3 0 0 1-3-3z' fill='none' stroke='%23F4E9D8' stroke-width='3.4' stroke-linejoin='round'/%3E%3Cpath d='M19 28l-5.5-6.5M45 28l5.5-6.5' fill='none' stroke='%23F4E9D8' stroke-width='3.4' stroke-linecap='round'/%3E%3Cpath d='M32 33v9' stroke='%23F4E9D8' stroke-width='3.4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFECE6; --card:#FFFFFF; --ink:#221C15; --muted:#71685B; --faint:#9B9285;
  --line:#E0DBD1; --line2:#CFC8BB;
  --saddle:#8A5226; --saddle-dk:#6F411E; --saddle-bg:#F3E7DA;
  --brass:#A8893B; --kraft:#F4E9D8;
  --green:#2F7A4D; --green-bg:#E4F0E8;
  --red:#B23B2A; --red-bg:#F6E4E0;
  --amber:#B07012; --amber-bg:#F6ECDA;
  --r:14px; --r-sm:10px;
  --shadow:0 1px 2px rgba(34,28,21,.06),0 4px 14px rgba(34,28,21,.05);
  --shadow-lg:0 8px 30px rgba(34,28,21,.18);
  --nav-h:62px; --top-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
svg[viewBox='0 0 24 24']{width:18px;height:18px}
.irow>svg,.listcard>svg{width:20px;height:20px;flex:0 0 auto;color:var(--faint)}
html{-webkit-text-size-adjust:100%}
body{font-family:'Archivo',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;min-height:100dvh}
button,input,select,textarea{font:inherit;color:inherit}
img{display:block;max-width:100%}
a{color:var(--saddle)}
.num{font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92em}
:focus-visible{outline:2px solid var(--saddle);outline-offset:2px;border-radius:4px}
::placeholder{color:var(--faint)}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- shell ---------- */
#app{display:flex;min-height:100dvh}
#side{display:none}
#main{flex:1;min-width:0;padding:calc(var(--top-h) + 14px) 14px calc(var(--nav-h) + 24px);max-width:1060px;margin:0 auto;width:100%}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:rgba(239,236,230,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:40}
#topbar .tb-title{font-weight:700;font-size:17px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.04em}
.brand .bx{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;overflow:hidden}.brand .bx svg{width:100%;height:100%;display:block}
.brand small{display:block;font-weight:500;color:var(--muted);letter-spacing:.14em;font-size:9px;text-transform:uppercase}

#bottomnav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#FBFAF7;border-top:1px solid var(--line);display:flex;z-index:40}
#bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10.5px;font-weight:600;letter-spacing:.02em;position:relative}
#bottomnav a.on{color:var(--saddle)}
#bottomnav a svg{width:22px;height:22px}
#bottomnav .scan-btn{margin-top:-22px}
#bottomnav .scan-btn .ring{width:54px;height:54px;border-radius:50%;background:var(--saddle);color:#fff;display:grid;place-items:center;box-shadow:0 4px 14px rgba(111,65,30,.45);border:3px solid var(--bg)}
#bottomnav .scan-btn .ring svg{width:24px;height:24px}
.navbadge{position:absolute;top:6px;right:calc(50% - 22px);min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px}

@media(min-width:920px){
  #bottomnav{display:none}
  #side{display:flex;flex-direction:column;width:228px;border-right:1px solid var(--line);background:#FBFAF7;position:sticky;top:0;height:100dvh;padding:18px 12px;gap:4px}
  #side .brand{padding:4px 10px 16px}
  #side a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--ink);font-weight:600;font-size:14px;position:relative}
  #side a svg{width:19px;height:19px;color:var(--muted)}
  #side a.on{background:var(--saddle-bg);color:var(--saddle-dk)}
  #side a.on svg{color:var(--saddle)}
  #side a:hover:not(.on){background:#F1EEE7}
  #side .navbadge{position:static;margin-left:auto}
  #main{padding:calc(var(--top-h) + 18px) 26px 60px}
  #topbar{left:228px}
}

/* ---------- type & misc ---------- */
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
h1.page{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:2px 0 14px}
.sub{color:var(--muted);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.right{margin-left:auto}
.wrap{flex-wrap:wrap}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{margin-top:14px}.mb{margin-bottom:14px}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line2);background:var(--card);border-radius:11px;padding:10px 15px;font-weight:600;font-size:14px;cursor:pointer;min-height:42px;text-decoration:none;color:var(--ink);transition:filter .12s, background .12s}
.btn:active{filter:brightness(.95)}
.btn svg{width:17px;height:17px}
.btn.pri{background:var(--saddle);border-color:var(--saddle);color:#fff}
.btn.pri:hover{background:var(--saddle-dk)}
.btn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.danger{background:var(--red-bg);border-color:#E3BEB6;color:var(--red)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.sm{min-height:34px;padding:6px 11px;font-size:13px;border-radius:9px}
.btn.sm svg{width:15px;height:15px}
.btn.block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
.icobtn{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;border:1px solid var(--line2);background:var(--card);cursor:pointer;color:var(--ink)}
.icobtn svg{width:18px;height:18px}
.icobtn.ghost{border-color:transparent;background:transparent;color:var(--muted)}

/* ---------- cards / stats ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:16px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:680px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow)}
.stat .v{font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:2px}
.stat.alert{background:var(--red-bg);border-color:#E8C6BE}
.stat.alert .v{color:var(--red)}
.section-h{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px}
.section-h h2{font-size:15.5px;font-weight:700}
.section-h a{font-size:13px;font-weight:600;text-decoration:none;margin-left:auto}

/* quick actions */
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:680px){.quick{grid-template-columns:repeat(6,1fr)}}
.quick button{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 6px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink);box-shadow:var(--shadow)}
.quick button svg{width:21px;height:21px;color:var(--saddle)}
.quick button:active{filter:brightness(.96)}

/* ---------- chips / tags ---------- */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--card);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--kraft);border:1px dashed #D8C29A;color:#6E5526;border-radius:7px;padding:2px 8px 2px 6px;font-size:11.5px;font-weight:600}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;border:1px solid #C9B083}
.skutag{display:inline-block;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;background:var(--kraft);border:1px dashed #D8C29A;border-radius:6px;padding:1px 7px;color:#6E5526}

/* ---------- pills / badges ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:700}
.pill.low{background:var(--red-bg);color:var(--red)}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.zero{background:#EEEAE2;color:var(--muted)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.info{background:var(--saddle-bg);color:var(--saddle-dk)}
.pill.gray{background:#EEEAE2;color:var(--muted)}

/* ---------- search / inputs ---------- */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:0 12px;height:44px}
.searchbar svg{width:18px;height:18px;color:var(--faint);flex:0 0 auto}
.searchbar input{border:none;outline:none;background:transparent;flex:1;min-width:0;font-size:15px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.in, select.in, textarea.in{width:100%;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;background:var(--card);font-size:15px;min-height:42px}
textarea.in{resize:vertical;min-height:70px}
.in:focus,select.in:focus,textarea.in:focus{outline:2px solid var(--saddle);outline-offset:-1px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.hint{font-size:11.5px;color:var(--faint);margin-top:4px}

/* ---------- folder & item grids ---------- */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.fcard{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;cursor:pointer;box-shadow:var(--shadow);text-align:left}
.fcard svg{width:22px;height:22px;color:var(--brass);flex:0 0 auto}
.fcard .fn{font-weight:700;font-size:13.5px;line-height:1.25}
.fcard .fm{font-size:11px;color:var(--muted)}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.icard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--shadow);position:relative;text-align:left;display:flex;flex-direction:column}
.icard .ph{aspect-ratio:4/3;background:linear-gradient(135deg,#F0EBE2,#E5DECF);display:grid;place-items:center;color:#C9BFA9;position:relative}
.icard .ph img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.icard .ph svg{width:30px;height:30px}
.icard .bd{padding:9px 11px 11px}
.icard .nm{font-weight:700;font-size:13.5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
.icard .qv{display:flex;align-items:baseline;justify-content:space-between;margin-top:5px;gap:6px}
.icard .q{font-weight:800;font-size:14px}
.icard .q small{font-weight:600;color:var(--muted);font-size:10.5px}
.icard .pr{font-size:12px;color:var(--muted);font-weight:600}
.icard .lowdot{position:absolute;top:8px;left:8px}
.selbox{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:7px;border:2px solid #fff;background:rgba(34,28,21,.35);display:grid;place-items:center;color:#fff;z-index:2}
.selbox svg{width:14px;height:14px;opacity:0}
.icard.sel{outline:3px solid var(--saddle)}
.icard.sel .selbox{background:var(--saddle);border-color:var(--saddle)}
.icard.sel .selbox svg{opacity:1}
/* list view */
.ilist{display:flex;flex-direction:column;gap:8px}
.irow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;cursor:pointer;box-shadow:var(--shadow);position:relative}
.irow .th{width:46px;height:46px;border-radius:9px;background:linear-gradient(135deg,#F0EBE2,#E5DECF);overflow:hidden;flex:0 0 auto;display:grid;place-items:center;color:#C9BFA9}
.irow .th img{width:100%;height:100%;object-fit:cover}
.irow .th svg{width:20px;height:20px}
.irow .nm{font-weight:700;font-size:14px}
.irow .meta{font-size:11.5px;color:var(--muted);display:flex;gap:7px;align-items:center;margin-top:2px;flex-wrap:wrap}
.irow .qcol{text-align:right;flex:0 0 auto}
.irow .qcol .q{font-weight:800;font-size:15px}
.irow .qcol .v{font-size:11.5px;color:var(--muted)}
.irow.sel{outline:3px solid var(--saddle)}
.irow .selbox{position:static;background:#EEEAE2;border-color:var(--line2);color:transparent;flex:0 0 auto}
.irow.sel .selbox{background:var(--saddle);border-color:var(--saddle);color:#fff}
.irow.sel .selbox svg{opacity:1}
.crumbs{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--muted);overflow-x:auto;scrollbar-width:none;white-space:nowrap;padding:2px}
.crumbs::-webkit-scrollbar{display:none}
.crumbs a{text-decoration:none;color:var(--muted)}
.crumbs a:last-child{color:var(--ink)}
.crumbs svg{width:13px;height:13px;color:var(--faint);flex:0 0 auto}

/* bulk bar */
#bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);background:var(--ink);color:#fff;border-radius:14px;display:none;align-items:center;gap:4px;padding:8px 10px;z-index:45;box-shadow:var(--shadow-lg);max-width:96vw;overflow-x:auto}
@media(min-width:920px){#bulkbar{bottom:18px}}
#bulkbar.show{display:flex}
#bulkbar .cnt{font-weight:800;font-size:13px;padding:0 8px;white-space:nowrap}
#bulkbar button{background:transparent;border:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:4px 9px;cursor:pointer;border-radius:8px}
#bulkbar button:hover{background:rgba(255,255,255,.12)}
#bulkbar button svg{width:17px;height:17px}

/* ---------- item detail ---------- */
.gallery{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gallery .g{flex:0 0 78%;max-width:340px;aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;background:linear-gradient(135deg,#F0EBE2,#E5DECF);border:1px solid var(--line);display:grid;place-items:center;color:#C9BFA9;position:relative}
.gallery .g img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gallery .g svg{width:34px;height:34px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.kv>div{background:var(--card);padding:11px 13px}
.kv .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.kv .v{font-weight:700;margin-top:2px;font-size:14.5px;word-break:break-word}
.stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line2);border-radius:13px;overflow:hidden;background:var(--card)}
.stepper button{width:54px;height:52px;border:none;background:var(--card);font-size:24px;cursor:pointer;color:var(--saddle);display:grid;place-items:center}
.stepper button:active{background:var(--saddle-bg)}
.stepper input{flex:1;min-width:0;border:none;text-align:center;font-size:21px;font-weight:800;outline:none;height:52px;background:transparent}
.actgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.actgrid .btn{flex-direction:column;gap:5px;font-size:11.5px;padding:10px 4px;min-height:58px}
.hist{display:flex;flex-direction:column}
.hist .h{display:flex;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:13px}
.hist .h:last-child{border-bottom:none}
.hist .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);margin-top:5px;flex:0 0 auto}
.hist .when{color:var(--faint);font-size:11.5px;margin-top:1px}

/* ---------- tables ---------- */
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);box-shadow:var(--shadow)}
table.t{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
table.t th{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
table.t td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.t tr:last-child td{border-bottom:none}
table.t td.r,table.t th.r{text-align:right}
table.t tfoot td{font-weight:800;background:#FAF8F4}

/* ---------- modal / sheet ---------- */
#ovl{position:fixed;inset:0;background:rgba(28,22,16,.45);z-index:60;display:none;align-items:flex-end;justify-content:center}
#ovl.show{display:flex}
@media(min-width:680px){#ovl{align-items:center;padding:20px}}
#modal{background:var(--card);width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));animation:up .18s ease}
@media(min-width:680px){#modal{border-radius:18px;animation:pop .15s ease}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
@keyframes pop{from{transform:scale(.97);opacity:.6}to{transform:none;opacity:1}}
#modal h3{font-size:17px;font-weight:800;margin-bottom:13px}
.mhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mhead h3{margin:0;flex:1}

/* ---------- toast ---------- */
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
@media(min-width:920px){#toasts{bottom:22px}}
.toast{background:var(--ink);color:#fff;border-radius:11px;padding:10px 16px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:up .18s ease;max-width:88vw;text-align:center}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}

/* ---------- scanner ---------- */
.scanwrap{position:relative;border-radius:var(--r);overflow:hidden;background:#15110D;aspect-ratio:3/4;max-height:62dvh;width:100%}
.scanwrap video{width:100%;height:100%;object-fit:cover}
.scanbox{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.scanbox .frame{width:68%;max-width:300px;aspect-ratio:1.4;border-radius:14px;box-shadow:0 0 0 9999px rgba(15,12,9,.45);position:relative}
.scanbox .frame::before{content:'';position:absolute;inset:0;border-radius:14px;border:2.5px solid rgba(255,255,255,.9)}
.scanbox .laser{position:absolute;left:6%;right:6%;height:2px;background:var(--brass);top:10%;animation:laser 1.6s ease-in-out infinite alternate;border-radius:2px;box-shadow:0 0 8px var(--brass)}
@keyframes laser{from{top:10%}to{top:88%}}

function parseCfgText(t){
  t=String(t||'');
  const k=t.indexOf('apiKey');if(k<0)return null;
  const a=t.lastIndexOf('{',k);if(a<0)return null;
  let d=0,b=-1;
  for(let i=a;i<t.length;i++){const ch=t[i];if(ch==='{')d++;else if(ch==='}'){d--;if(d===0){b=i;break}}}

  },
  async set(k,v){
    if(MODE==='cloud'&&k.indexOf('p:')===0){
      try{
        let arr=Array.isArray(v)?v.slice():v;
        if(Array.isArray(arr)){let g=0;while(JSON.stringify(arr).length>900000&&arr.length>1&&g++<5){arr.pop()}}
        await db.collection('photos').doc(k.slice(2)).set({arr:arr});return true
      }catch(e){console.error('save',k,e);return false}
    }
    const s=JSON.stringify(v);
    if(hasWS()){ try{await window.storage.set(k,s);return true}catch(e){console.error('save',k,e);return false} }
    try{localStorage.setItem('gdwn:'+k,s);return true}catch(e){console.error('save',k,e);return false}
  },
  async del(k){
    if(MODE==='cloud'&&k.indexOf('p:')===0){try{await db.collection('photos').doc(k.slice(2)).delete()}catch(e){};return}
    if(hasWS()){ try{await window.storage.delete(k)}catch(e){} return }
    try{localStorage.removeItem('gdwn:'+k)}catch(e){}
  },
  async listPhotoKeys(){
    if(MODE==='cloud'){try{const q=await db.collection('photos').get();return q.docs.map(d=>'p:'+d.id)}catch(e){return []}}
    if(hasWS()){ try{const r=await window.storage.list('p:');return (r&&r.keys)?r.keys:[]}catch(e){return []} }
    const out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf('gdwn:p:')===0)out.push(k.slice(5))}}catch(e){}
    return out
  }
};

const DEFAULT_META=()=>({company:'',user:'',currency:'$',lowDefault:5,view:'grid',sort:'updated',seq:{pl:0,po:0},setup:{},locTerm:'Location',locTermPlural:''});

function clean(o){const c=JSON.parse(JSON.stringify(o));Object.keys(c).forEach(k=>{if(k[0]==='_')delete c[k]});return c}

let saveTimers={};
function save(col){
  dirty[col]=true;
  clearTimeout(saveTimers[col]);
  saveTimers[col]=setTimeout(()=>{saveNow(col)},250);
}
async function saveNow(col){
  clearTimeout(saveTimers[col]);dirty[col]=false;
  if(MODE==='cloud'){
    try{
      if(col==='meta')await pushMeta();
      else if(col==='txns'){/* txns are written per-entry in logTx */}
      else await pushDiff(col);
      return true;
    }catch(e){
      console.error('cloud save',col,e);
      if(e&&e.code==='permission-denied'){toast('Not allowed — admin permission needed','err');resyncCol(col);return false}
      toast('Could not sync — retrying','err');save(col);return false}
  }
  const ok=await store.set(col,S[col]);
  if(!ok)toast('Could not save — storage error','err');
  return ok;
}
async function resyncCol(col){
  try{
    if(col==='meta'){const s=await db.collection('meta').doc('app').get();S.meta=Object.assign(DEFAULT_META(),s.exists?s.data():{});shadows.meta=JSON.stringify(clean(S.meta))}
    else{const q=await db.collection(col).get();mergeCol(col,q.docs)}
    dirty[col]=false;route();
  }catch(e){}
}
async function pushDiff(col){
  const sh=shadows[col]||(shadows[col]={});
  const cur={},ops=[];
  S[col].forEach(o=>{
    if(!o||!o.id)return;
    const c=clean(o);const j=JSON.stringify(c);cur[o.id]=1;
    if(sh[o.id]!==j){ops.push(['set',c]);sh[o.id]=j}
  });
  Object.keys(sh).forEach(id=>{if(!cur[id]){ops.push(['del',id]);delete sh[id]}});
  for(let i=0;i<ops.length;i+=400){
    const b=db.batch();
    ops.slice(i,i+400).forEach(op=>{
      const ref=db.collection(col).doc(op[0]==='set'?op[1].id:op[1]);
      if(op[0]==='set')b.set(ref,op[1]);else b.delete(ref);
    });
    await b.commit();
  }
}
async function pushMeta(){
  const c=clean(S.meta);const j=JSON.stringify(c);
  if(shadows.meta===j)return;
  shadows.meta=j;
  await db.collection('meta').doc('app').set(c,{merge:true});
}
async function nextSeq(key){
  if(MODE!=='cloud'){S.meta.seq[key]=(S.meta.seq[key]||0)+1;save('meta');return S.meta.seq[key]}
  const ref=db.collection('meta').doc('app');
  const n=await db.runTransaction(async t=>{
    const s=await t.get(ref);const m=s.exists?(s.data()||{}):{};
    const seq=Object.assign({pl:0,po:0},m.seq||{});seq[key]=(seq[key]||0)+1;
    t.set(ref,{seq:seq},{merge:true});
    return seq[key];
  });
  S.meta.seq[key]=n;
  return n;
}

/* ---------- realtime sync ---------- */
function mergeCol(col,docs){
  const map={};S[col].forEach(o=>{if(o&&o.id)map[o.id]=o});
  const next=docs.map(d=>{
    const data=d.data();data.id=d.id;
    const ex=map[d.id];
    if(ex){
      Object.keys(ex).forEach(k=>{if(!(k in data)&&k[0]!=='_')delete ex[k]});
      Object.assign(ex,data);
      return ex;
    }
    return data;
  });
  S[col]=next;
  const sh=shadows[col]={};
  next.forEach(o=>{sh[o.id]=JSON.stringify(clean(o))});
}

async function initCloud(cfg){
  activeCfg=cfg;
  fbApp=firebase.initializeApp(cfg);
  db=firebase.firestore();
  try{await db.enablePersistence({synchronizeTabs:true})}catch(e){}
  fbUser=await new Promise(res=>{const off=firebase.auth().onAuthStateChanged(u=>{off();res(u)},()=>{off();res(null)})});
  if(!fbUser){MODE='cloud';return 'login'}
  firebase.auth().onAuthStateChanged(u=>{if(!u)location.reload()});
  MODE='cloud';
  // --- my profile (role/status) ---
  const uref=db.collection('users').doc(fbUser.uid);
  let us;try{us=await uref.get()}catch(e){throw new Error('Could not read your user profile — check the security rules were published. ('+(e.message||e)+')')}
  if(!us.exists){
    const uidName=String(fbUser.email||'').split('@')[0].toLowerCase();
    const prof={id:fbUser.uid,userid:uidName,name:fbUser.displayName||cap1(uidName),
      role:uidName===MAINFRAME_ID?'mainframe':'user',
      status:uidName===MAINFRAME_ID?'active':'pending',createdAt:Date.now()};
    await uref.set(prof);
    myProfile=prof;
  } else myProfile=us.data();
  if(myProfile.status!=='active')return myProfile.status==='revoked'?'revoked':'pending';
  uref.onSnapshot(s=>{
    if(!s.exists){location.reload();return}
    const p=s.data();const was=myProfile;myProfile=p;
    if(p.status!=='active')location.reload();
    else if(bootDone&&was&&was.role!==p.role){toast('Your role is now '+p.role,'ok');route()}
  },()=>{});
  const first=[];
  function wireCol(col,query,apply){
    first.push(new Promise((res,rej)=>{
      let done=false;
      query.onSnapshot(snap=>{
        if(dirty[col]){saveNow(col)}
        else apply(snap);
        if(!done){done=true;res()}
        else repaintSoon();
      },err=>{if(!done){done=true;rej(err)}else console.error(col,err)});
    }));
  }
  wireCol('items',db.collection('items').orderBy('createdAt'),s=>mergeCol('items',s.docs));
  wireCol('folders',db.collection('folders').orderBy('createdAt'),s=>mergeCol('folders',s.docs));
  wireCol('lists',db.collection('lists'),s=>mergeCol('lists',s.docs));
  wireCol('pos',db.collection('pos'),s=>mergeCol('pos',s.docs));
  wireCol('trash',db.collection('trash').orderBy('deletedAt','desc'),s=>mergeCol('trash',s.docs));
  wireCol('txns',db.collection('txns').where('ts','>=',Date.now()-30*86400000).orderBy('ts','desc').limit(1500),s=>{S.txns=s.docs.map(d=>{const x=d.data();x.id=d.id;return x})});
  wireCol('meta',db.collection('meta').doc('app'),s=>{
    const d=s.exists?(s.data()||{}):{};
    S.meta=Object.assign(DEFAULT_META(),d);
    shadows.meta=JSON.stringify(clean(S.meta));
    fixCurrency();
  });
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timed out connecting to Firestore — check internet, project setup and security rules.')),15000));
  await Promise.race([Promise.all(first),timeout]);
  cloudReady=true;
  if(isAdminU())purgeOldTxns();
  return 'cloud';
}
async function purgeOldTxns(){
  try{
    const cutoff=Date.now()-30*86400000;
    for(let k=0;k<3;k++){
      const q=await db.collection('txns').where('ts','<',cutoff).limit(300).get();
      if(q.empty)break;
      const b=db.batch();q.docs.forEach(d=>b.delete(d.ref));await b.commit();
      if(q.size<300)break;
    }
  }catch(e){}
}

function folderPath(id){const seg=[];let f=fById(id),guard=0;while(f&&guard++<30){seg.unshift(f.name);f=fById(f.parent)}return seg.join(' / ')||'All stock'}
function childFolders(pid){return S.folders.filter(f=>(f.parent||null)===(pid||null)).sort((a,b)=>a.name.localeCompare(b.name))}
function itemsIn(fid){return S.items.filter(i=>(i.folder||null)===(fid||null))}
function descFolderIds(fid){const out=[fid];const walk=p=>{childFolders(p).forEach(c=>{out.push(c.id);walk(c.id)})};walk(fid);return out}
function deepStats(fid){const ids=fid?descFolderIds(fid):[null].concat(S.folders.map(f=>f.id));const its=fid?S.items.filter(i=>ids.includes(i.folder)):S.items;return{count:its.length,qty:sum(its,i=>+i.qty||0),value:sum(its,i=>(+i.qty||0)*(+i.price||0))}}
function flatFolders(){const out=[];const walk=(pid,d)=>{childFolders(pid).forEach(f=>{out.push({id:f.id,name:f.name,depth:d});walk(f.id,d+1)})};walk(null,0);return out}

  if(t.detail&&t.itemName)line+=' <span class="muted">· '+esc(t.detail)+'</span>';
  return '<div class="h"><span class="dot"></span><div class="grow"><b>'+esc(d)+'</b> · '+line+'<div class="when">'+esc(t.user||'')+' · '+ago(t.ts)+'</div></div></div>';
}

function matches(i,q){q=q.toLowerCase();return [i.name,skusOf(i).join(' '),(i.tags||[]).join(' '),i.notes].some(v=>v&&String(v).toLowerCase().includes(q))}
function sortItems(arr){
  const s=S.meta.sort;
  const c={updated:(a,b)=>b.updatedAt-a.updatedAt,name:(a,b)=>a.name.localeCompare(b.name),qty:(a,b)=>(+b.qty||0)-(+a.qty||0),value:(a,b)=>itemValue(b)-itemValue(a)}[s]||((a,b)=>b.updatedAt-a.updatedAt);
  return arr.slice().sort(c);
}
function rowHTML(i,opt){
  opt=opt||{};
  const selectable=opt.selectable;
  const selected=view.sel.has(i.id);
  return '<div class="irow'+(selected?' sel':'')+'" data-item="'+i.id+'">'+
    (selectable?'<span class="selbox">'+ico('check')+'</span>':'')+
    '<span class="th">'+(i.thumb?'<img src="'+i.thumb+'" alt="">':ico('box'))+'</span>'+
    '<div class="grow"><div class="nm ellip">'+esc(i.name)+'</div><div class="meta">'+
      (i.sku?'<span class="skutag">'+esc(i.sku)+'</span>':'')+
      '<span class="ellip">'+esc(folderPath(i.folder))+'</span>'+
      (isLow(i)?'<span class="pill low">Low</span>':'')+'</div></div>'+
    '<div class="qcol"><div class="q num">'+fmtQty(i.qty)+' <small style="font-weight:600;color:var(--muted)">'+esc(i.unit||'')+'</small></div>'+(+i.price?'<div class="v num">'+fmtMoney(itemValue(i),0)+'</div>':'')+'</div></div>';
}
function cardHTML(i){
  const selected=view.sel.has(i.id);
  return '<div class="icard'+(selected?' sel':'')+'" data-item="'+i.id+'">'+
    '<span class="selbox">'+ico('check')+'</span>'+
    (isLow(i)?'<span class="pill low lowdot">Low</span>':'')+
    '<div class="ph">'+(i.thumb?'<img src="'+i.thumb+'" alt="" loading="lazy">':ico('photo'))+'</div>'+
    '<div class="bd"><div class="nm">'+esc(i.name)+'</div><div class="qv"><span class="q num">'+fmtQty(i.qty)+' <small>'+esc(i.unit||'')+'</small></span>'+(+i.price?'<span class="pr num">'+fmtMoney(+i.price,0)+'</span>':'')+'</div></div></div>';
}
function vStock(fid){
  fid=fid&&fById(fid)?fid:null;
  const f=fById(fid);
  topTitle(f?f.name:'Stock',f?('#stock'+(f.parent?'/'+f.parent:'')):null,
    '<button class="icobtn ghost" data-act="newfolder" data-parent="'+(fid||'')+'" aria-label="New folder">'+ico('folder')+'</button>'+
    '<button class="icobtn" data-act="newitem" data-folder="'+(fid||'')+'" aria-label="Add item" style="background:var(--saddle);border-color:var(--saddle);color:#fff">'+ico('plus')+'</button>');
  const subs=childFolders(fid);
  let pool,searching=view.q.trim().length>0;
  if(searching){pool=S.items.filter(i=>matches(i,view.q.trim()))}
  else pool=itemsIn(fid);
  if(view.tag)pool=pool.filter(i=>(i.tags||[]).includes(view.tag));
  if(view.low)pool=pool.filter(isLow);
  pool=sortItems(pool);
  const st=deepStats(fid);
  let h='';
  // breadcrumbs
  let crumbs='<a href="#stock">All stock</a>';let cf=f;const segs=[];while(cf){segs.unshift(cf);cf=fById(cf.parent)}
  segs.forEach(sg=>{crumbs+=ico('chev')+'<a href="#stock/'+sg.id+'">'+esc(sg.name)+'</a>'});
  h+='<div class="crumbs mb">'+crumbs+'</div>';
  h+='<div class="row mb"><div class="searchbar grow">'+ico('search')+'<input id="q" type="search" placeholder="Search name, SKU, code, tag…" value="'+esc(view.q)+'" autocomplete="off">'+(view.q?'<button class="icobtn ghost" id="clrq" style="width:30px;height:30px" aria-label="Clear">'+ico('x')+'</button>':'')+'</div>'+
    '<button class="icobtn" id="sortBtn" aria-label="Sort">'+ico('sort')+'</button>'+
    '<button class="icobtn" id="viewBtn" aria-label="Toggle view">'+ico(S.meta.view==='grid'?'listv':'grid')+'</button></div>';
  // chips
  const tags=allTags().slice(0,12);
  h+='<div class="chips mb"><button class="chip'+(view.low?' on':'')+'" id="chipLow">Low stock</button>';
  tags.forEach(t=>{h+='<button class="chip'+(view.tag===t?' on':'')+'" data-tag="'+esc(t)+'">'+esc(t)+'</button>'});
  h+='</div>';
  // folder cards
  if(!searching&&subs.length){
    h+='<div class="fgrid mb">';
    subs.forEach(sf=>{const ss=deepStats(sf.id);h+='<button class="fcard" data-folder="'+sf.id+'">'+ico('folder')+'<span class="grow"><span class="fn ellip" style="display:block">'+esc(sf.name)+'</span><span class="fm num">'+ss.count+' items · '+fmtMoney(ss.value,0)+'</span></span></button>'});
    h+='</div>';
  }
  // summary line
  h+='<div class="row mb small muted"><span class="num">'+(searching?pool.length+' result'+(pool.length===1?'':'s'):st.count+' items · '+fmtMoney(st.value,0)+(f?' in this folder':''))+'</span><button class="btn sm ghost right" id="selToggle">'+(view.selectMode?'Done':'Select')+'</button></div>';
  // items
  if(pool.length===0&&(searching||!subs.length)){
    h+='<div class="empty">'+ico('box')+'<div class="t">'+(searching?'Nothing found':'No items here yet')+'</div><div class="s">'+(searching?'Try a different name, SKU or tag.':'Add your first item or import a CSV to get going.')+'</div>'+(!searching?'<div class="row" style="justify-content:center"><button class="btn pri" data-act="newitem" data-folder="'+(fid||'')+'">'+ico('plus')+'Add item</button><a class="btn" href="#import">Import CSV</a></div>':'')+'</div>';
  } else if(S.meta.view==='grid'){
    h+='<div class="igrid">'+pool.map(cardHTML).join('')+'</div>';
  } else {
    h+='<div class="ilist">'+pool.map(i=>rowHTML(i,{selectable:true})).join('')+'</div>';
  }
  if(f){h+='<div class="row mt"><button class="btn sm" data-act="renfolder" data-id="'+f.id+'">'+ico('edit')+'Rename folder</button>'+(isAdminU()?'<button class="btn sm danger" data-act="delfolder" data-id="'+f.id+'">'+ico('trash')+'Delete folder</button>':'')+'</div>'}
  $('#main').innerHTML=h;
  // wire
  const q=$('#q');q.oninput=()=>{view.q=q.value;rerenderStockBody(fid)};
  q.onkeydown=e=>{if(e.key==='Enter')q.blur()};
  if($('#clrq'))$('#clrq').onclick=()=>{view.q='';vStock(fid)};
  $('#viewBtn').onclick=()=>{S.meta.view=S.meta.view==='grid'?'list':'grid';save('meta');vStock(fid)};
  $('#sortBtn').onclick=()=>sortMenu(()=>vStock(fid));
  $('#chipLow').onclick=()=>{view.low=!view.low;vStock(fid)};
  $$('.chip[data-tag]').forEach(c=>c.onclick=()=>{view.tag=view.tag===c.dataset.tag?'':c.dataset.tag;vStock(fid)});
  $('#selToggle').onclick=()=>{view.selectMode=!view.selectMode;if(!view.selectMode)view.sel.clear();renderBulk();vStock(fid)};
  bindStockClicks(fid);
}
function rerenderStockBody(fid){ // light re-render keeps keyboard focus
  vStockDebounce=vStockDebounce||{};clearTimeout(vStockDebounce.t);
  vStockDebounce.t=setTimeout(()=>{const q=$('#q');const pos=q?q.selectionStart:0;vStock(fid);const nq=$('#q');if(nq){nq.focus();try{nq.setSelectionRange(pos,pos)}catch(e){}}},220);
}
let vStockDebounce=null;
function bindStockClicks(fid){
  $$('#main [data-folder]').forEach(b=>b.onclick=()=>go('#stock/'+b.dataset.folder));
  $$('#main [data-item]').forEach(el=>el.onclick=e=>{
    const id=el.dataset.item;
    if(view.selectMode||e.target.closest('.selbox')){
      if(view.sel.has(id))view.sel.delete(id);else view.sel.add(id);
      el.classList.toggle('sel');renderBulk();return;
    }
    go('#item/'+id);
  });
}
function sortMenu(after){
  const opts=[['updated','Last updated'],['name','Name A–Z'],['qty','Quantity (high → low)'],['value','Value (high → low)']];
  openModal('<h3>Sort by</h3>'+opts.map(([k,l])=>'<button class="btn block" style="justify-content:flex-start;margin-bottom:8px'+(S.meta.sort===k?';border-color:var(--saddle);background:var(--saddle-bg)':'')+'" data-sort="'+k+'">'+(S.meta.sort===k?ico('check'):'<span style="width:17px"></span>')+l+'</button>').join(''));
  $$('#modal [data-sort]').forEach(b=>b.onclick=()=>{S.meta.sort=b.dataset.sort;save('meta');closeModal();after&&after()});
}

/* ---------- bulk bar ---------- */
function renderBulk(){
  const bar=$('#bulkbar');const n=view.sel.size;
  if(!n){bar.classList.remove('show');bar.innerHTML='';return}
  bar.classList.add('show');
  bar.innerHTML='<span class="cnt num">'+n+' selected</span>'+
    '<button data-b="move">'+ico('move')+'Move</button>'+
    '<button data-b="tag">'+ico('tag')+'Tag</button>'+
    '<button data-b="label">'+ico('label')+'Labels</button>'+
    '<button data-b="csv">'+ico('down')+'CSV</button>'+
    (isAdminU()?'<button data-b="del">'+ico('trash')+'Delete</button>':'')+
    '<button data-b="x">'+ico('x')+'Clear</button>';
  $$('#bulkbar [data-b]').forEach(b=>b.onclick=()=>bulkAct(b.dataset.b));
}
async function bulkAct(k){
  const ids=Array.from(view.sel);const its=ids.map(iById).filter(Boolean);
  if(k==='x'){view.sel.clear();renderBulk();route();return}
  if(k==='move'){moveDlg(its);return}
  if(k==='label'){sessionStorage.setItem('lblsel',JSON.stringify(ids));go('#labels');return}
  if(k==='csv'){exportItemsCSV(its);return}
  if(k==='tag'){openModal('<h3>Add tag to '+its.length+' items</h3><div class="field"><input class="in" id="bt" placeholder="e.g. sale, export, b-grade" list="tagsdl"><datalist id="tagsdl">'+allTags().map(t=>'<option value="'+esc(t)+'">').join('')+'</datalist></div><button class="btn pri block" id="btgo">Add tag</button>');
    $('#btgo').onclick=()=>{const t=$('#bt').value.trim();if(!t)return;its.forEach(i=>{i.tags=i.tags||[];if(!i.tags.includes(t))i.tags.push(t);i.updatedAt=Date.now()});save('items');logTx('edited',{detail:'Tag "'+t+'" added to '+its.length+' items'});closeModal();toast('Tag added','ok');route()};return}
  if(k==='del'){const ok=await confirmDlg('Delete '+its.length+' items?','They move to Trash and can be restored from More → Trash.','Delete',true);if(!ok)return;
    its.forEach(i=>trashItem(i,true));save('items');save('trash');logTx('deleted',{detail:its.length+' items moved to trash'});view.sel.clear();renderBulk();toast(its.length+' moved to trash');route()}
}

    '<select class="in" id="adj-r" style="flex:1;min-width:120px;padding:9px 10px">'+ADJ_REASONS.map(r=>'<option>'+r+'</option>').join('')+'</select></div>'+
    '<div class="row mt" style="gap:8px"><button class="btn grow danger" id="adj-out" style="font-weight:800">− Remove</button><button class="btn grow pri" id="adj-in" style="font-weight:800">+ Add</button></div>'+
    '<div class="hint" style="margin-top:7px">Stock only moves by adding or removing — every change lands in the movement history with its reason.</div></div>';
  h+='<div class="actgrid mb">'+
    '<button class="btn" data-act="moveitem" data-id="'+i.id+'">'+ico('move')+'Move</button>'+
    '<button class="btn" data-act="cloneitem" data-id="'+i.id+'">'+ico('copy')+'Clone</button>'+
    '<button class="btn" data-act="labelone" data-id="'+i.id+'">'+ico('label')+'Label</button>'+
    '<button class="btn" data-act="addto" data-id="'+i.id+'">'+ico('pick')+'Add to…</button></div>';
  h+='<div class="kv mb">'+
    '<div><div class="k">'+locTerm()+'</div><div class="v">'+esc(folderPath(i.folder))+'</div></div>'+
    '<div style="grid-column:1/-1"><div class="k">SKU'+(skusOf(i).length>1?'s ('+skusOf(i).length+')':'')+'</div><div class="v">'+(skusOf(i).length?skusOf(i).map((s,ix)=>'<span class="skutag" style="font-size:13px;margin:0 5px 5px 0;display:inline-block">'+esc(s)+(ix===0?' ·main':'')+'</span>').join(''):'<span class="muted">—</span>')+'</div></div>'+
    '<div><div class="k">Min quantity</div><div class="v num">'+(i.min!==''&&i.min!=null?fmtQty(i.min)+' '+esc(i.unit||''):'<span class="muted">No alert</span>')+'</div></div>'+

    '<div><div class="k">Cost (USD)</div><div class="v num">'+(+i.cost?fmtUSD(+i.cost):'<span class="muted">—</span>')+'</div></div>'+
    '<div><div class="k">Created</div><div class="v">'+fmtDate(i.createdAt)+'</div></div>'+
    '<div><div class="k">Updated</div><div class="v">'+ago(i.updatedAt)+'</div></div>'+
  '</div>';
  if(i.notes)h+='<div class="card pad mb"><div class="eyebrow" style="margin-bottom:5px">Notes</div><div style="white-space:pre-wrap;font-size:14px">'+esc(i.notes)+'</div></div>';

  h+='<div class="section-h"><h2>History</h2></div>';
  h+=hist.length?'<div class="card" style="padding:4px 14px"><div class="hist">'+hist.map(txHTML).join('')+'</div></div>':'<div class="sub">No history yet.</div>';

  getPhotos(i.id).then(ps=>{if(!ps.length)return;const g=$('#gal');if(!g)return;g.innerHTML=ps.map(p=>'<div class="g"><img src="'+p+'" alt=""></div>').join('')});
  // qty controls — delta only
  const an=$('#adj-n');
  $('#adj-m').onclick=()=>{an.value=fmtQty(Math.max(1,round4((parseFloat(an.value)||1)-1)))};
  $('#adj-p').onclick=()=>{an.value=fmtQty(round4((parseFloat(an.value)||0)+1))};
  const adj=dir=>{
    let n=round4(parseFloat(an.value));
    if(!(n>0)){toast('Enter how many to '+(dir>0?'add':'remove'),'err');return}
    const old=+i.qty||0;
    if(dir<0&&n>old){toast('Only '+fmtQty(old)+' in stock','err');return}

    toast((dir>0?'Added ':'Removed ')+fmtQty(n)+' — now '+fmtQty(nv),'ok');
  };
  $('#adj-out').onclick=()=>adj(-1);
  $('#adj-in').onclick=()=>adj(1);
}

  $('#f-save').onclick=async()=>{

function compressImage(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      const make=(max,q)=>{const sc=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*sc));c.height=Math.max(1,Math.round(img.height*sc));c.getContext('2d').drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',q)};
      res([make(480,.55),make(80,.5)]);
    };img.onerror=rej;img.src=r.result};
    r.onerror=rej;r.readAsDataURL(file);
  });
}
function makeThumbFromDataURL(durl){return new Promise(res=>{const img=new Image();img.onload=()=>{const max=80,sc=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.6))};img.onerror=()=>res('');img.src=durl})}

function doMove(i,q,dest,reason){
  if((i.folder||null)===(dest||null))return;
  const fromName=folderPath(i.folder),toName=folderPath(dest);
  const moveAll=Math.abs(q-(+i.qty||0))<1e-9;
  if(moveAll){i.folder=dest;i.updatedAt=Date.now()}
  else{
    i.qty=round4((+i.qty||0)-q);i.updatedAt=Date.now();
    let tgt=S.items.find(x=>x.id!==i.id&&(x.folder||null)===(dest||null)&&((i.sku&&x.sku===i.sku)||(!i.sku&&x.name===i.name&&x.unit===i.unit)));
    if(tgt){tgt.qty=round4((+tgt.qty||0)+q);tgt.updatedAt=Date.now()}
    else{const c=newItem(Object.assign(JSON.parse(JSON.stringify(i)),{id:uid('i'),folder:dest,qty:q,createdAt:Date.now(),updatedAt:Date.now()}));delete c._thumbCand;S.items.push(c)}
  }
  logTx('moved',{itemId:i.id,itemName:i.name,qtyMoved:q,from:fromName,to:toName,detail:reason});
}

function vScan(mode,arg){
  mode=mode||'find';
  const list=mode==='pick'?S.lists.find(l=>l.id===arg):null;
  topTitle(mode==='tocode'?'Scan a code':(mode==='pick'?'Scan to pick — '+(list?list.name:''):'Scan'),mode==='tocode'?null:(mode==='pick'?'#list/'+arg:'#home'));
  let h='<div class="scanwrap mb"><video id="cam" playsinline muted autoplay></video><div class="scanbox"><div class="frame"><div class="laser"></div></div></div><div class="scanmsg" id="scanmsg">Point at a barcode or QR code</div></div>';
  h+='<div class="card pad"><div class="eyebrow" style="margin-bottom:6px">Or enter code manually</div><div class="row"><input class="in mono grow" id="man" placeholder="SKU or barcode value" autocomplete="off"><button class="btn pri" id="mango">Go</button></div><div class="hint" id="camnote"></div></div>';
  $('#main').innerHTML=h;
  const man=$('#man');
  $('#mango').onclick=()=>{const v=man.value.trim();if(v)handleCode(v)};
  man.onkeydown=e=>{if(e.key==='Enter')$('#mango').click()};

  let lastCode='',lastAt=0,closed=false;
  function handleCode(code){
    const now=Date.now();
    if(code===lastCode&&now-lastAt<2200)return;
    lastCode=code;lastAt=now;
    if(mode==='tocode'){beep(true);sessionStorage.setItem('scannedcode',code);const ret=sessionStorage.getItem('scanret')||'stock';sessionStorage.removeItem('scanret');go('#'+ret);return}
    if(mode==='pick'&&list){scanPick(list,code);return}
    const it=findByCode(code);
    if(it){beep(true);quickScanModal(it)}
    else{beep(false);openModal('<h3>Code not found</h3><p class="sub mb">No item matches <span class="mono">'+esc(code)+'</span>.</p><button class="btn pri block mb" id="ns-add">'+ico('plus')+'Add new item with this code</button><button class="btn block" id="ns-x">Keep scanning</button>');
      $('#ns-add').onclick=()=>{closeModal();sessionStorage.setItem('newcode',code);go('#edit/new')};
      $('#ns-x').onclick=closeModal;}
  }
  function quickScanModal(it){
    openModal('<div class="mhead"><span class="th" style="width:46px;height:46px;border-radius:9px;overflow:hidden;display:grid;place-items:center;background:var(--saddle-bg)">'+(it.thumb?'<img src="'+it.thumb+'" style="width:100%;height:100%;object-fit:cover">':ico('box'))+'</span><h3 class="ellip">'+esc(it.name)+'</h3></div>'+
      '<div class="sub mb num">In stock: <b id="qs-cur">'+fmtQty(it.qty)+'</b> '+esc(it.unit||'')+' · '+esc(folderPath(it.folder))+'</div>'+
      '<div class="row mb" style="gap:8px"><div class="stepper" style="max-width:150px;flex:0 0 auto"><button id="qs-m" aria-label="Less">−</button><input id="qs-q" class="num" inputmode="decimal" value="1"><button id="qs-p" aria-label="More">+</button></div>'+
      '<select class="in" id="qs-r" style="flex:1;min-width:110px;padding:9px 10px">'+ADJ_REASONS.map(r=>'<option>'+r+'</option>').join('')+'</select></div>'+
      '<div class="row mb"><button class="btn grow danger" id="qs-out" style="font-weight:800">− Remove</button><button class="btn pri grow" id="qs-in" style="font-weight:800">+ Add</button></div>'+
      '<button class="btn block" id="qs-open">Open item</button>');
    const q=$('#qs-q');
    $('#qs-m').onclick=()=>{q.value=fmtQty(Math.max(1,round4((parseFloat(q.value)||1)-1)))};
    $('#qs-p').onclick=()=>{q.value=fmtQty(round4((parseFloat(q.value)||0)+1))};
    $('#qs-open').onclick=()=>{closeModal();go('#item/'+it.id)};
    const apply=dir=>{
      let n=round4(parseFloat(q.value));
      if(!(n>0)){toast('Enter how many','err');return}
      const old=+it.qty||0;
      if(dir<0&&n>old){beep(false);toast('Only '+fmtQty(old)+' in stock','err');return}
      const nv=round4(old+dir*n);
      it.qty=nv;it.updatedAt=Date.now();save('items');
      logTx(dir>0?'in':'out',{itemId:it.id,itemName:it.name,fromQ:old,toQ:nv,qty:n,reason:$('#qs-r').value,detail:'Scan · '+$('#qs-r').value});
      updateBadges();beep(true);closeModal();
      toast((dir>0?'Added ':'Removed ')+fmtQty(n)+' — '+it.name+' now '+fmtQty(nv),'ok');
    };
    $('#qs-out').onclick=()=>apply(-1);
    $('#qs-in').onclick=()=>apply(1);
  }
  function scanPick(l,code){
    const line=l.items.find(x=>{const it=iById(x.itemId);return it&&codeHit(it,code.toLowerCase())});
    if(!line){beep(false);$('#scanmsg').textContent='Not on this list: '+code;return}
    const it=iById(line.itemId);
    const cap=Math.min(line.need,(+it.qty||0));
    if(line.picked>=cap){beep(false);$('#scanmsg').textContent=(line.picked>=line.need?'Already fully picked':'No stock left')+' — '+it.name;return}
    line.picked=round4(line.picked+1);if(line.picked>cap)line.picked=cap;
    save('lists');beep(true);
    $('#scanmsg').textContent='Picked '+fmtQty(line.picked)+' / '+fmtQty(line.need)+' — '+it.name;
  }

  // camera
  const video=$('#cam');const note=$('#camnote');
  const Detector=window.BarcodeDetector;
  (async()=>{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){note.textContent='Camera not available here — use manual entry or a USB/Bluetooth scanner (it types into the box above).';return}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      if(closed){stream.getTracks().forEach(t=>t.stop());return}
      video.srcObject=stream;
      scannerStop=()=>{closed=true;try{stream.getTracks().forEach(t=>t.stop())}catch(e){}};
      if(!Detector){note.textContent='Live decoding is not supported in this browser — camera is on for reference, but type the code manually or use Chrome on Android for auto-detect.';return}
      let formats=['qr_code','ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','codabar','data_matrix'];
      try{const sup=await Detector.getSupportedFormats();formats=formats.filter(f=>sup.includes(f))}catch(e){}
      const det=new Detector({formats});
      let busy=false;
      const loop=async()=>{
        if(closed)return;
        if(!busy&&video.readyState>=2){busy=true;
          try{const codes=await det.detect(video);if(codes&&codes.length&&codes[0].rawValue)handleCode(String(codes[0].rawValue).trim())}catch(e){}
          busy=false}
        setTimeout(()=>requestAnimationFrame(loop),180);
      };
      loop();
    }catch(err){
      note.innerHTML='Camera blocked or unavailable. If you are previewing inside Claude, <b>download this file</b> (More → About) and open it in Chrome on your phone — scanning works there. Manual entry and hardware scanners work everywhere.';
    }
  })();
}

      '<div class="hint" style="margin-top:8px">Tick only what should print. For items with several SKUs, one label is produced for each SKU.</div></div>';
  h+='<div class="row mb"><div class="searchbar grow">'+ico('search')+'<input id="lb-q" type="search" placeholder="Filter items…"></div><button class="btn sm" id="lb-all">Select all</button></div>';
  h+='<div class="ilist mb" id="lb-list" style="max-height:330px;overflow-y:auto"></div>';
  h+='<div class="row"><button class="btn grow" id="lb-prev" disabled>'+ico('label')+'Preview</button><button class="btn pri grow" id="lb-print" disabled>'+ico('print')+'Print / PDF</button></div>';
  h+='<div class="mt" id="lb-stage"></div>';
  $('#main').innerHTML=h;
  const listEl=$('#lb-list');
  function paintList(){
    const q=($('#lb-q').value||'').trim().toLowerCase();
    const pool=sortItems(S.items.filter(i=>skusOf(i).length&&(!q||matches(i,q))));
    listEl.innerHTML=pool.length?pool.map(i=>'<div class="irow'+(sel.has(i.id)?' sel':'')+'" data-lb="'+i.id+'"><span class="selbox">'+ico('check')+'</span><div class="grow"><div class="nm ellip">'+esc(i.name)+'</div><div class="meta">'+skusOf(i).map(s=>'<span class="skutag" style="margin-right:4px">'+esc(s)+'</span>').join('')+'</div></div></div>').join(''):'<div class="empty"><div class="t">No items with a code</div><div class="s">Give items a SKU or barcode value first — labels need something to encode.</div></div>';
    $$('#lb-list [data-lb]').forEach(r=>r.onclick=()=>{const id=r.dataset.lb;if(sel.has(id))sel.delete(id);else sel.add(id);r.classList.toggle('sel');syncBtns()});
    syncBtns();
  }
  function syncBtns(){const on=sel.size>0;$('#lb-prev').disabled=!on;$('#lb-print').disabled=!on;$('#lb-prev').innerHTML=ico('label')+'Preview'+(on?' ('+sel.size+')':'')}
  $('#lb-q').oninput=paintList;
  $('#lb-all').onclick=()=>{const q=($('#lb-q').value||'').trim().toLowerCase();S.items.filter(i=>skusOf(i).length&&(!q||matches(i,q))).forEach(i=>sel.add(i.id));paintList()};
  paintList();

  const QRDIM={s:46,m:58,l:90};const BARH={s:34,m:44,l:66};
  async function buildSheet(target){
    const type=$('#lb-type').value,size=$('#lb-size').value,n=clamp(parseInt($('#lb-n').value)||1,1,100);
    const showName=$('#lb-name').checked,showSku=$('#lb-sku').checked,showPrice=$('#lb-price').checked,showTags=$('#lb-tags').checked,showLoc=$('#lb-loc').checked;
    let libOK=true;
    try{
      if(type==='qr')await lazyScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js');
      else await lazyScript('https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js');
    }catch(e){libOK=false}
    let sheet='<div class="lblsheet">';
    const its=Array.from(sel).map(iById).filter(Boolean);
    let nLabels=0;
    its.forEach(i=>{
      const codes=skusOf(i);const list=codes.length?codes:[''];
      list.forEach(code=>{ if(!code)return;
        for(let k=0;k<n;k++){ nLabels++;
          sheet+='<div class="lbl s-'+size+'"><div class="code" data-code="'+esc(code)+'" data-type="'+type+'"></div><div class="tx">'+
            (showName?'<div class="tn">'+esc(i.name)+'</div>':'')+
            (showSku?'<div class="ts">'+esc(code)+'</div>':'')+
            (showLoc?'<div class="ts" style="font-weight:600">'+esc(folderPath(i.folder))+'</div>':'')+
            (showTags&&(i.tags||[]).length?'<div class="ts" style="font-weight:600">'+esc((i.tags||[]).join(', '))+'</div>':'')+
            (showPrice&&+i.price?'<div class="tp num">'+fmtMoney(+i.price)+'</div>':'')+'</div></div>';
        }
      });
    });
    sheet+='</div>';
    target.innerHTML=sheet;
    $$('.lbl .code',target).forEach(el=>{
      const code=el.dataset.code;
      if(!libOK){el.innerHTML='<div class="mono" style="font-weight:700;font-size:1.1em;writing-mode:vertical-rl;transform:rotate(180deg)">'+esc(code)+'</div>';return}
      if(type==='qr'){new QRCode(el,{text:code,width:QRDIM[size],height:QRDIM[size],correctLevel:QRCode.CorrectLevel.M})}
      else{const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');el.appendChild(svg);try{JsBarcode(svg,code,{format:'CODE128',displayValue:true,fontSize:size==='s'?9:11,height:BARH[size],width:size==='l'?2:1.4,margin:2,textMargin:1})}catch(e){el.innerHTML='<div class="mono small">'+esc(code)+'</div>'}}
    });
    if(!libOK)toast('Code library offline — labels show text only','err');
    logTx('label',{detail:nLabels+' label'+(nLabels===1?'':'s')+' for '+its.length+' item'+(its.length>1?'s':'')});
  }
  $('#lb-prev').onclick=()=>buildSheet($('#lb-stage'));
  $('#lb-print').onclick=async()=>{await buildSheet($('#printArea'));printNow()};
}
function printNow(){
  document.body.classList.add('printing');
  setTimeout(()=>{window.print();setTimeout(()=>{document.body.classList.remove('printing')},400)},120);
}

/* ============================================================
   WORKFLOWS HUB — PICK LISTS + PURCHASE ORDERS

const PL_STATUS={draft:['Draft','gray'],progress:['In progress','info'],completed:['Completed','ok']};
const PO_STATUS={draft:['Draft','gray'],ordered:['Ordered','info'],partial:['Partially received','warn'],received:['Received','ok']};
function plPill(s){const x=PL_STATUS[s]||PL_STATUS.draft;return '<span class="pill '+x[1]+'">'+x[0]+'</span>'}
function poPill(s){const x=PO_STATUS[s]||PO_STATUS.draft;return '<span class="pill '+x[1]+'">'+x[0]+'</span>'}

function vFlows(tab){
  tab=(tab==='po')?'po':'pick';

    h+='<button class="btn pri block mb" data-act="newlist">'+ico('plus')+'New pick list</button>';

    else{
      const ls=S.lists.slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));

        const need=sum(l.items,x=>+x.need||0),picked=sum(l.items,x=>+x.picked||0);

      });
    }
  } else {
    h+='<button class="btn pri block mb" id="newpo">'+ico('plus')+'New purchase order</button>';
    if(!S.pos.length)h+='<div class="empty">'+ico('po')+'<div class="t">No purchase orders yet</div><div class="s">Raise a PO on a vendor, then receive goods against it — received quantities add straight into stock.</div></div>';
    else{
      const ps=S.pos.slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
      ps.forEach(p=>{
        const total=sum(p.items,x=>(+x.qty||0)*(+x.cost||0));
        h+='<div class="listcard mb" data-open="po/'+p.id+'"><span class="ic">'+ico('po')+'</span><div class="grow"><div class="t1">'+esc(p.number)+(p.vendor?' · '+esc(p.vendor):'')+'</div><div class="t2 num">'+p.items.length+' lines · '+fmtUSD(total,0)+' · '+ago(p.updatedAt||p.createdAt)+'</div></div>'+poPill(p.status)+'</div>';
      });

  }
  $('#main').innerHTML=h;
  $('#sg-pick').onclick=()=>go('#flows/pick');
  $('#sg-po').onclick=()=>go('#flows/po');
  const np=$('#newpo');if(np)np.onclick=async()=>{np.disabled=true;const id=await createPO();go('#po/'+id)};
  $$('#main [data-open]').forEach(c=>c.onclick=()=>go('#'+c.dataset.open));
}

/* ---------- pick lists ---------- */
async function createList(name){
  const n=await nextSeq('pl');
  const l={id:uid('l'),name:name||('Pick list PL-'+String(n).padStart(4,'0')),status:'draft',items:[],notes:'',createdAt:Date.now(),updatedAt:Date.now()};
  S.lists.unshift(l);await saveNow('lists');if(MODE!=='cloud')save('meta');
  logTx('list',{detail:'Created '+l.name});
  return l.id;
}
function addLineToList(l,i,n){
  if(!l)return;
  const ex=l.items.find(x=>x.itemId===i.id);
  if(ex)ex.need=round4((+ex.need||0)+(n||1));
  else l.items.push({itemId:i.id,need:n||1,picked:0});
  l.updatedAt=Date.now();
}
function vList(id){
  const l=S.lists.find(x=>x.id===id);
  if(!l){toast('Pick list not found','err');go('#flows/pick');return}
  const ro=l.status==='completed';
  topTitle(l.name,'#flows/pick',ro?'':'<button class="icobtn ghost" id="pl-ren" aria-label="Rename">'+ico('edit')+'</button>');
  const need=sum(l.items,x=>+x.need||0),picked=sum(l.items,x=>+x.picked||0);
  const pct=need>0?Math.min(100,Math.round(picked/need*100)):0;
  let h='<div class="row mb wrap"><h1 class="page" style="margin:0">'+esc(l.name)+'</h1>'+plPill(l.status)+'</div>';
  h+='<div class="card pad mb"><div class="row small muted mb" style="margin-bottom:7px"><span>Picked</span><span class="right num">'+fmtQty(picked)+' / '+fmtQty(need)+'</span></div><div class="prog"><i style="width:'+pct+'%"></i></div></div>';
  if(!ro)h+='<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Add item</div><div class="searchbar">'+ico('search')+'<input id="pl-q" type="search" placeholder="Search name, SKU or tag…" autocomplete="off"></div><div id="pl-res" class="ilist mt" style="display:none;max-height:240px;overflow-y:auto"></div></div>';
  h+='<div class="section-h"><h2>Lines</h2></div>';
  if(!l.items.length)h+='<div class="sub mb">Nothing on this list yet'+(ro?'.':' — search above or use “Add to…” from any item.')+'</div>';
  else{
    h+='<div class="ilist mb">';
    l.items.forEach((x,ix)=>{
      const it=iById(x.itemId);
      const nm=it?it.name:'(deleted item)',stock=it?(+it.qty||0):0;
      const short=!ro&&it&&x.need>stock;
      h+='<div class="irow" style="cursor:default"><span class="th">'+(it&&it.thumb?'<img src="'+it.thumb+'" alt="">':ico('box'))+'</span>'+
        '<div class="grow"><div class="nm ellip">'+esc(nm)+'</div><div class="meta num">'+(it?'have '+fmtQty(stock)+' '+esc(it.unit||''):'')+(short?' · <span style="color:var(--red);font-weight:700">short '+fmtQty(round4(x.need-stock))+'</span>':'')+'</div>'+
        (l.status==='progress'&&it?'<div class="row mt" style="gap:8px"><div class="stepper" style="max-width:170px"><button data-pm="'+ix+'" aria-label="Less">−</button><input class="num" data-pq="'+ix+'" inputmode="decimal" value="'+fmtQty(x.picked)+'"><button data-pp="'+ix+'" aria-label="More">+</button></div><span class="small muted num">of '+fmtQty(x.need)+'</span></div>':'')+
        '</div>'+
        '<div style="text-align:right;flex:0 0 auto">'+
        (l.status==='draft'?'<input class="in num" data-need="'+ix+'" inputmode="decimal" value="'+fmtQty(x.need)+'" style="width:76px;text-align:right;padding:8px 9px">':'<div class="num" style="font-weight:800">'+fmtQty(x.picked)+'<span class="muted" style="font-weight:600"> / '+fmtQty(x.need)+'</span></div>')+
        (ro?'':'<button class="icobtn ghost" data-rm="'+ix+'" aria-label="Remove" style="margin-top:5px;width:30px;height:30px">'+ico('x')+'</button>')+
        '</div></div>';
    });
    h+='</div>';
  }
  h+='<div class="row wrap mb" style="gap:9px">';
  if(l.status==='draft')h+='<button class="btn pri grow" id="pl-start" '+(l.items.length?'':'disabled')+'>'+ico('bolt')+'Start picking</button>';
  if(l.status==='progress')h+='<a class="btn grow" href="#scan/pick/'+l.id+'">'+ico('scan')+'Scan to pick</a><button class="btn pri grow" id="pl-done">'+ico('check')+'Complete</button>';
  if(ro)h+='<button class="btn grow" id="pl-clone">'+ico('copy')+'Clone to new list</button>';
  h+='</div>';
  h+='<div class="row wrap" style="gap:9px"><button class="btn grow" id="pl-print">'+ico('print')+'Pick sheet</button><button class="btn grow" id="pl-csv">'+ico('csv')+'CSV</button>'+(!ro&&isAdminU()?'<button class="btn danger" id="pl-del">'+ico('trash')+'</button>':'')+'</div>';
  $('#main').innerHTML=h;

  const rn=$('#pl-ren');if(rn)rn.onclick=()=>{openModal('<h3>Rename list</h3><div class="field"><input class="in" id="rn-v" value="'+esc(l.name)+'"></div><button class="btn pri block" id="rn-go">Save</button>');$('#rn-v').focus();$('#rn-go').onclick=()=>{const v=$('#rn-v').value.trim();if(v){l.name=v;l.updatedAt=Date.now();save('lists')}closeModal();route()}};
  // add-item search
  const q=$('#pl-q');
  if(q){const res=$('#pl-res');
    q.oninput=()=>{const v=q.value.trim().toLowerCase();
      if(!v){res.style.display='none';res.innerHTML='';return}
      const pool=sortItems(S.items.filter(i=>matches(i,v))).slice(0,8);
      res.innerHTML=pool.length?pool.map(i=>'<div class="irow" data-add="'+i.id+'"><span class="th">'+(i.thumb?'<img src="'+i.thumb+'" alt="">':ico('box'))+'</span><div class="grow"><div class="nm ellip">'+esc(i.name)+'</div><div class="meta num">'+fmtQty(i.qty)+' '+esc(i.unit||'')+(i.sku?' · '+esc(i.sku):'')+'</div></div>'+ico('plus','muted')+'</div>').join(''):'<div class="sub" style="padding:10px 4px">No matches.</div>';
      res.style.display='block';
      $$('#pl-res [data-add]').forEach(r=>r.onclick=()=>{const it=iById(r.dataset.add);if(!it)return;addLineToList(l,it,1);save('lists');toast('Added '+it.name,'ok');route()});
    };
  }
  // draft need edits + remove
  $$('#main [data-need]').forEach(inp=>inp.onchange=()=>{const x=l.items[+inp.dataset.need];const v=round4(parseFloat(inp.value));if(!(v>0)){inp.value=fmtQty(x.need);return}x.need=v;l.updatedAt=Date.now();save('lists');route()});
  $$('#main [data-rm]').forEach(b=>b.onclick=()=>{l.items.splice(+b.dataset.rm,1);l.updatedAt=Date.now();save('lists');route()});
  // progress steppers
  const setPicked=(ix,v)=>{const x=l.items[ix];const it=iById(x.itemId);const cap=Math.min(+x.need||0,it?(+it.qty||0):0);x.picked=clamp(round4(v),0,cap);l.updatedAt=Date.now();save('lists');route()};
  $$('#main [data-pm]').forEach(b=>b.onclick=()=>setPicked(+b.dataset.pm,(+l.items[+b.dataset.pm].picked||0)-1));
  $$('#main [data-pp]').forEach(b=>b.onclick=()=>setPicked(+b.dataset.pp,(+l.items[+b.dataset.pp].picked||0)+1));
  $$('#main [data-pq]').forEach(inp=>inp.onchange=()=>{const v=parseFloat(inp.value);if(isNaN(v)){route();return}setPicked(+inp.dataset.pq,v)});

  const st=$('#pl-start');if(st)st.onclick=()=>{l.status='progress';l.updatedAt=Date.now();save('lists');logTx('list',{detail:l.name+' → picking started'});route()};
  const dn=$('#pl-done');if(dn)dn.onclick=async()=>{
    const shorts=l.items.filter(x=>(+x.picked||0)+1e-9<(+x.need||0));
    const ok=await confirmDlg('Complete '+esc(l.name)+'?','Picked quantities will be deducted from stock.'+(shorts.length?'<br><b>'+shorts.length+' line'+(shorts.length>1?'s are':' is')+' short</b> — they complete with what was picked.':''),'Complete & deduct');
    if(!ok)return;
    l.items.forEach(x=>{
      const it=iById(x.itemId);const p=+x.picked||0;
      if(!it||p<=0)return;
      const old=+it.qty||0;it.qty=round4(Math.max(0,old-p));it.updatedAt=Date.now();
      logTx('picked',{itemId:it.id,itemName:it.name,fromQ:old,toQ:it.qty,detail:l.name});
    });
    l.status='completed';l.completedAt=Date.now();l.updatedAt=Date.now();
    await Promise.all([saveNow('items'),saveNow('lists')]);
    updateBadges();toast('List completed — stock updated','ok');route();
  };
  const cl=$('#pl-clone');if(cl)cl.onclick=async()=>{cl.disabled=true;const nid=await createList(l.name.replace(/ \(copy\)$/,'')+' (copy)');const nl=S.lists.find(x=>x.id===nid);nl.items=l.items.map(x=>({itemId:x.itemId,need:x.need,picked:0}));nl.updatedAt=Date.now();await saveNow('lists');go('#list/'+nid)};
  $('#pl-print').onclick=()=>{
    let d='<div class="printdoc"><h2>'+esc(l.name)+'</h2><div class="pmeta">'+esc(S.meta.company||'Godown')+' · '+fmtDT(Date.now())+' · '+(PL_STATUS[l.status]||[])[0]+'</div>';
    d+='<table><thead><tr><th>#</th><th>Item</th><th>SKU / code</th><th>Location</th><th class="r">Need</th><th class="r">Picked</th><th>✓</th></tr></thead><tbody>';
    l.items.forEach((x,ix)=>{const it=iById(x.itemId);d+='<tr><td>'+(ix+1)+'</td><td>'+esc(it?it.name:'—')+'</td><td>'+esc(it?(it.code||it.sku||''):'')+'</td><td>'+esc(it?folderPath(it.folder):'')+'</td><td class="r">'+fmtQty(x.need)+'</td><td class="r">'+fmtQty(x.picked)+'</td><td style="width:9mm"></td></tr>'});
    d+='</tbody></table></div>';
    $('#printArea').innerHTML=d;printNow();
  };
  $('#pl-csv').onclick=()=>{
    const rows=[['Line','Item','SKU','Code','Location','Need','Picked','Unit']];

    download(l.name.replace(/[^\w-]+/g,'_')+'.csv',buildCSV(rows),'text/csv');
    logTx('export',{detail:l.name+' CSV'});
  };
  const del=$('#pl-del');if(del)del.onclick=async()=>{const ok=await confirmDlg('Delete '+esc(l.name)+'?','This removes the list. Stock is not affected.','Delete',true);if(!ok)return;S.lists=S.lists.filter(x=>x.id!==l.id);save('lists');logTx('list',{detail:'Deleted '+l.name});go('#flows/pick')};
}

/* ---------- purchase orders ---------- */
async function createPO(){
  const n=await nextSeq('po');
  const p={id:uid('p'),number:'PO-'+String(n).padStart(4,'0'),vendor:'',expected:'',status:'draft',items:[],notes:'',createdAt:Date.now(),updatedAt:Date.now()};
  S.pos.unshift(p);await saveNow('pos');if(MODE!=='cloud')save('meta');
  logTx('po',{detail:'Created '+p.number});
  return p.id;
}
function addLineToPO(p,i,n){
  if(!p)return;
  const ex=p.items.find(x=>x.itemId===i.id);
  if(ex)ex.qty=round4((+ex.qty||0)+(n||1));
  else p.items.push({itemId:i.id,qty:n||1,cost:+i.cost||0,received:0});
  p.updatedAt=Date.now();
}
function poVendors(){const m={};S.pos.forEach(p=>{if(p.vendor)m[p.vendor.trim()]=1});return Object.keys(m).sort()}
function vPO(id){
  const p=S.pos.find(x=>x.id===id);
  if(!p){toast('PO not found','err');go('#flows/po');return}
  const ro=p.status==='received';
  const editable=p.status==='draft';
  topTitle(p.number,'#flows/po');
  const total=sum(p.items,x=>(+x.qty||0)*(+x.cost||0));
  const recd=sum(p.items,x=>+x.received||0),ordq=sum(p.items,x=>+x.qty||0);
  let h='<div class="row mb wrap"><h1 class="page" style="margin:0">'+esc(p.number)+'</h1>'+poPill(p.status)+'</div>';
  h+='<div class="card pad mb"><div class="f2"><div class="field" style="margin-bottom:0"><label>Vendor</label><input class="in" id="po-v" list="po-vl" value="'+esc(p.vendor)+'" placeholder="Supplier name" '+(editable?'':'disabled')+'><datalist id="po-vl">'+poVendors().map(v=>'<option value="'+esc(v)+'">').join('')+'</datalist></div>'+
    '<div class="field" style="margin-bottom:0"><label>Expected by</label><input class="in" id="po-d" type="date" value="'+esc(p.expected||'')+'" '+(ro?'disabled':'')+'></div></div></div>';
  if(p.status!=='draft')h+='<div class="card pad mb"><div class="row small muted" style="margin-bottom:7px"><span>Received</span><span class="right num">'+fmtQty(recd)+' / '+fmtQty(ordq)+'</span></div><div class="prog"><i style="width:'+(ordq>0?Math.min(100,Math.round(recd/ordq*100)):0)+'%"></i></div></div>';
  if(editable)h+='<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Add item</div><div class="searchbar">'+ico('search')+'<input id="po-q" type="search" placeholder="Search name, SKU or tag…" autocomplete="off"></div><div id="po-res" class="ilist mt" style="display:none;max-height:240px;overflow-y:auto"></div></div>';
  h+='<div class="section-h"><h2>Lines</h2><span class="num" style="font-weight:800">'+fmtUSD(total,0)+'</span></div>';
  if(!p.items.length)h+='<div class="sub mb">No lines yet'+(editable?' — search above or use “Add to…” from any item.':'.')+'</div>';
  else{
    h+='<div class="ilist mb">';

/* ============================================================
   CSV HELPERS
   ============================================================ */
function buildCSV(rows){
  return rows.map(r=>r.map(c=>{
    c=(c==null)?'':String(c);
    return /[",\n\r]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;
  }).join(',')).join('\r\n');
}
function parseCSV(text){
  const rows=[];let row=[],cur='',inQ=false;
  text=String(text).replace(/^\uFEFF/,'');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++}else inQ=false}
      else cur+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===','){row.push(cur);cur=''}
      else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(cur);cur='';if(row.length>1||row[0]!=='')rows.push(row);row=[]}
      else cur+=ch;
    }
  }
  if(cur!==''||row.length){row.push(cur);if(row.length>1||row[0]!=='')rows.push(row)}
  return rows;
}
function exportItemsCSV(its){
  const rows=[['Name','Location','Quantity','Unit','Price','Cost','Min quantity','SKU','Barcode','Other SKUs','Tags','Notes','Value','Updated']];
  its.forEach(i=>rows.push([i.name,folderPath(i.folder),i.qty,i.unit,i.price,i.cost,i.min,i.sku,i.code,(i.alt||[]).join('; '),(i.tags||[]).join('; '),i.notes,itemValue(i),new Date(i.updatedAt).toISOString()]));
  download('invento-items-'+new Date().toISOString().slice(0,10)+'.csv',buildCSV(rows),'text/csv');
  logTx('export',{detail:its.length+' items to CSV'});
  toast('CSV downloaded','ok');
}

    function calc(){
      const cut=Date.now()-period*86400000;const m={};

        const e=m[t.itemId]||(m[t.itemId]={name:t.itemName||'?',inn:0,out:0});
        if(d>0)e.inn=round4(e.inn+d);else e.out=round4(e.out-d);
      });

      const rs=rowsFor();
      if(!rs.length)return '<div class="empty">'+ico('move')+'<div class="t">No movements in this period</div><div class="s">Add or remove stock from an item — each movement is recorded here with its reason.</div></div>';
      const tin=sum(rs.filter(x=>x.dir==='in'),x=>x.qty),tout=sum(rs.filter(x=>x.dir==='out'),x=>x.qty);
      let b='<div class="stats mb"><div class="stat"><div class="n num" style="color:var(--green)">+'+fmtQty(tin)+'</div><div class="l">Total in</div></div><div class="stat"><div class="n num" style="color:var(--red)">−'+fmtQty(tout)+'</div><div class="l">Total out</div></div></div>';
      b+='<div class="tablewrap"><table class="t"><thead><tr><th>When</th><th>Item</th><th>Direction</th><th>Reason</th><th class="r">Qty</th><th>By</th></tr></thead><tbody>';
      rs.slice(0,300).forEach(x=>{b+='<tr><td class="small">'+esc(fmtDate(x.ts))+'</td><td>'+esc(x.name)+'</td><td>'+(x.dir==='in'?'<span class="pill ok">In</span>':'<span class="pill low">Out</span>')+'</td><td class="small">'+esc(x.reason)+'</td><td class="r num" style="font-weight:700;color:'+(x.dir==='in'?'var(--green)':'var(--red)')+'">'+(x.dir==='in'?'+':'−')+fmtQty(x.qty)+'</td><td class="small">'+esc(x.user)+'</td></tr>'});
      b+='</tbody></table></div>'+(rs.length>300?'<div class="sub mt">Showing first 300 of '+rs.length+' — use CSV for everything.</div>':'');
      return b;
    }
    shell('Stock movements',controls,bodyFor(),
      ()=>{const rs=rowsFor();printTable('Stock movements','Last '+period+' days'+(dir?' · '+dir:''),[['When'],['Item'],['Direction'],['Reason'],['Qty',1],['By']],rs.map(x=>[fmtDate(x.ts),x.name,x.dir==='in'?'IN':'OUT',x.reason,(x.dir==='in'?'+':'-')+fmtQty(x.qty),x.user]))},
      ()=>{const rs=rowsFor();const rows=[['Date','Item','Direction','Reason','Qty','Balance after','By']];rs.forEach(x=>rows.push([new Date(x.ts).toISOString(),x.name,x.dir,x.reason,x.qty,x.balance,x.user]));download('stock-movements.csv',buildCSV(rows),'text/csv');logTx('export',{detail:'Stock movements CSV'})});
    $('#rm-p').onchange=e=>{period=+e.target.value;$('#rep-body').innerHTML=bodyFor()};
    $('#rm-d').onchange=e=>{dir=e.target.value;$('#rep-body').innerHTML=bodyFor()};
  }
  else go('#reports');
}
