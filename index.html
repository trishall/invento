<style>
:root{
  --bg:#EFECE6; --card:#FFFFFF; --ink:#221C15; --muted:#71685B; --faint:#9B9285;
  --line:#E0DBD1; --line2:#CFC8BB;
  --saddle:#8A5226; --saddle-dk:#6F411E; --saddle-bg:#F3E7DA;
  --brass:#A8893B; --kraft:#F4E9D8;
  --green:#2F7A4D; --green-bg:#E4F0E8;
  --red:#B23B2A; --red-bg:#F6E4E0;
  --amber:#B07012; --amber-bg:#F6ECDA;
  --r:14px; --r-sm:10px;
  --dark-surface:#221C15;
  --shadow:0 1px 2px rgba(34,28,21,.06),0 4px 14px rgba(34,28,21,.05);
  --shadow-lg:0 8px 30px rgba(34,28,21,.18);
  --nav-h:62px; --top-h:56px;
}
:root[data-theme="dark"]{
  --bg:#17130F; --card:#221C16; --ink:#F2EBE0; --muted:#A89D8C; --faint:#7C7264;
  --line:#322A22; --line2:#42382D;
  --saddle:#C68A4E; --saddle-dk:#A87238; --saddle-bg:#352519;
  --brass:#CBA85A; --kraft:#3A2D1E;
  --green:#5BB07E; --green-bg:#1E3328;
  --red:#D9715F; --red-bg:#3A211C;
  --amber:#D29A3F; --amber-bg:#34281A;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.35);
  --shadow-lg:0 8px 30px rgba(0,0,0,.6);
  --dark-surface:#3A2E22;
}
*{box-sizing:border-box;margin:0;padding:0}
svg[viewBox='0 0 24 24']{width:18px;height:18px}
.irow>svg,.listcard>svg{width:20px;height:20px;flex:0 0 auto;color:var(--faint)}
html{-webkit-text-size-adjust:100%}
body{font-family:'Archivo',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;min-height:100dvh}
button,input,select,textarea{font:inherit;color:inherit}
img{display:block;max-width:100%}
a{color:var(--saddle)}
.num{font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92em}
:focus-visible{outline:2px solid var(--saddle);outline-offset:2px;border-radius:4px}
::placeholder{color:var(--faint)}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- shell ---------- */
#app{display:flex;min-height:100dvh}
#side{display:none}
#main{flex:1;min-width:0;padding:calc(var(--top-h) + 14px) 14px calc(var(--nav-h) + 24px);max-width:1060px;margin:0 auto;width:100%}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--bg);background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:40}
#topbar .tb-title{font-weight:700;font-size:17px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.04em}
.brand .bx{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;overflow:hidden}.brand .bx svg{width:100%;height:100%;display:block}
.brand small{display:block;font-weight:500;color:var(--muted);letter-spacing:.14em;font-size:9px;text-transform:uppercase}

#bottomnav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--card);border-top:1px solid var(--line);display:flex;z-index:40}
#bottomnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10.5px;font-weight:600;letter-spacing:.02em;position:relative}
#bottomnav a.on{color:var(--saddle)}
#bottomnav a svg{width:22px;height:22px}
#bottomnav .scan-btn{margin-top:-22px}
#bottomnav .scan-btn .ring{width:54px;height:54px;border-radius:50%;background:var(--saddle);color:#fff;display:grid;place-items:center;box-shadow:0 4px 14px rgba(111,65,30,.45);border:3px solid var(--bg)}
#bottomnav .scan-btn .ring svg{width:24px;height:24px}
.navbadge{position:absolute;top:6px;right:calc(50% - 22px);min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px}

@media(min-width:920px){
  #bottomnav{display:none}
  #side{display:flex;flex-direction:column;width:228px;border-right:1px solid var(--line);background:var(--card);position:sticky;top:0;height:100dvh;padding:18px 12px;gap:4px}
  #side .brand{padding:4px 10px 16px}
  #side a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--ink);font-weight:600;font-size:14px;position:relative}
  #side a svg{width:19px;height:19px;color:var(--muted)}
  #side a.on{background:var(--saddle-bg);color:var(--saddle-dk)}
  #side a.on svg{color:var(--saddle)}
  #side a:hover:not(.on){background:var(--bg)}
  #side .navbadge{position:static;margin-left:auto}
  #main{padding:calc(var(--top-h) + 18px) 26px 60px}
  #topbar{left:228px}
}

/* ---------- type & misc ---------- */
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
h1.page{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:2px 0 14px}
.sub{color:var(--muted);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.right{margin-left:auto}
.wrap{flex-wrap:wrap}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{margin-top:14px}.mb{margin-bottom:14px}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line2);background:var(--card);border-radius:11px;padding:10px 15px;font-weight:600;font-size:14px;cursor:pointer;min-height:42px;text-decoration:none;color:var(--ink);transition:filter .12s, background .12s}
.btn:active{filter:brightness(.95)}
.btn svg{width:17px;height:17px}
.btn.pri{background:var(--saddle);border-color:var(--saddle);color:#fff}
.btn.pri:hover{background:var(--saddle-dk)}
.btn.dark{background:var(--dark-surface);border-color:var(--dark-surface);color:#fff}
.btn.danger{background:var(--red-bg);border-color:#E3BEB6;color:var(--red)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.sm{min-height:34px;padding:6px 11px;font-size:13px;border-radius:9px}
.btn.sm svg{width:15px;height:15px}
.btn.block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
.icobtn{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;border:1px solid var(--line2);background:var(--card);cursor:pointer;color:var(--ink)}
.icobtn svg{width:18px;height:18px}
.icobtn.ghost{border-color:transparent;background:transparent;color:var(--muted)}

/* ---------- cards / stats ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:16px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:680px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;box-shadow:var(--shadow)}
.stat .v{font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:2px}
.stat.alert{background:var(--red-bg);border-color:#E8C6BE}
.stat.alert .v{color:var(--red)}
.section-h{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px}
.section-h h2{font-size:15.5px;font-weight:700}
.section-h a{font-size:13px;font-weight:600;text-decoration:none;margin-left:auto}

.bigbtns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:6px 0 14px}
.bigbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px 14px;border-radius:18px;border:2px solid var(--line);background:var(--card);cursor:pointer;font-size:18px;font-weight:800;color:var(--ink);box-shadow:var(--shadow);min-height:140px;text-align:center}
.bigbtn svg{width:42px;height:42px;color:var(--saddle)}
.bigbtn.sel{border-color:var(--saddle);background:var(--saddle-bg)}
.bigbtn .sub{font-size:12px;font-weight:600;color:var(--muted)}
.destbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.destbtn{display:flex;flex-direction:column;align-items:center;gap:9px;padding:22px 12px;border-radius:16px;border:2px solid var(--line);background:var(--card);cursor:pointer;font-size:16px;font-weight:800;color:var(--ink)}
.destbtn svg{width:32px;height:32px;color:var(--saddle)}
.destbtn.on{border-color:var(--saddle);background:var(--saddle-bg);color:var(--saddle-dk)}
.dcapture{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.dcapbtn{display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 12px;border-radius:16px;border:none;cursor:pointer;font-size:17px;font-weight:800;color:#fff}
.dcapbtn svg{width:38px;height:38px}
.dcapbtn.scan{background:var(--saddle)}
.dcapbtn.photo{background:var(--brass)}
.dline{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px}
.dline img{width:46px;height:46px;border-radius:9px;object-fit:cover;flex:0 0 auto}
.dline .ph{width:46px;height:46px;border-radius:9px;background:var(--saddle-bg);color:var(--saddle);display:grid;place-items:center;flex:0 0 auto}
.modeslider{display:flex;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-bottom:16px;box-shadow:var(--shadow)}
.modeslider button{flex:1;border:none;background:transparent;padding:11px 8px;border-radius:10px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s,color .15s}
.modeslider button svg{width:17px;height:17px}
.modeslider button.on{background:var(--saddle);color:#fff}
\.modeslider button.on svg{color:#fff}
.modeslider4 button{padding:9px 4px;font-size:12.5px;gap:5px;position:relative}
.modeslider4 button svg{width:15px;height:15px}
.navdot{position:absolute;top:2px;right:4px;min-width:15px;height:15px;padding:0 4px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;line-height:1}
.awbcard{border:1px solid var(--line);border-radius:13px;padding:13px;background:var(--card);margin-bottom:9px}
.awbcard.over{border-color:var(--red);background:var(--red-bg)}
.awbcols{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.awbcols{grid-template-columns:1fr 1fr 1fr}}
.awbcol{background:color-mix(in srgb,var(--ink) 5%,var(--card));border:1px solid var(--line);border-radius:13px;padding:10px}
.awbcol-h{font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.awbcol-n{background:var(--ink);color:var(--card);border-radius:8px;min-width:20px;height:18px;padding:0 6px;font-size:11px;display:grid;place-items:center}
.awbcol-empty{color:var(--faint);text-align:center;padding:14px 0;font-size:13px}
.awbmini{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line2);border-radius:10px;padding:9px 11px;margin-bottom:8px}
.awbmini.fresh{border-left-color:var(--green)}
.awbmini.aging{border-left-color:var(--amber);background:color-mix(in srgb,var(--amber) 8%,var(--card))}
.awbmini.over{border-left-color:var(--red);background:var(--red-bg)}
.pocard{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--line2);border-radius:13px;padding:13px 14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.pocard:active{filter:brightness(.97)}
.pocard.hi{border-left-color:var(--red)}
.pocard.lo{border-left-color:var(--saddle)}
.pocard.done{border-left-color:var(--green);opacity:.82}
.pocard.late{background:var(--red-bg);border-color:var(--red);border-left-color:var(--red)}
.pocard .po-t{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:800;font-size:15px}
.pocard .po-m{font-size:12.5px;color:var(--muted);margin-top:3px}
.pocard .po-due{font-weight:700}
.pocard .po-due.over{color:var(--red)}
.pocard .prog{margin-top:9px}
.awb-no{font-weight:800;font-size:15px;font-family:var(--mono,monospace);letter-spacing:.3px;word-break:break-all}
.awb-meta{font-size:12px;color:var(--muted);margin-top:2px}
.marketbar{display:flex;align-items:center;gap:10px;background:var(--saddle-bg);border-radius:12px;padding:11px 14px;margin-bottom:14px}
.marketbar .mk{font-weight:800;color:var(--saddle-dk);flex:1;display:flex;align-items:center;gap:8px}
.marketbar .mk svg{width:19px;height:19px;color:var(--saddle)}
.marketbar button{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;color:var(--saddle-dk);cursor:pointer}
.dbig{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 16px;border-radius:20px;border:none;background:var(--saddle);color:#fff;cursor:pointer;font-size:22px;font-weight:800;width:100%;box-shadow:0 6px 20px rgba(111,65,30,.35);min-height:170px}
.dbig svg{width:52px;height:52px}
.dbig.ret{background:var(--brass)}
.dbig .sub{font-size:13px;font-weight:600;opacity:.92;color:#fff!important}
.condbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.condbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;border-radius:14px;border:2px solid var(--line);background:var(--card);cursor:pointer;font-size:15px;font-weight:800;color:var(--ink)}
.condbtn svg{width:28px;height:28px}
.condbtn.good.on{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.condbtn.bad.on{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.splitbox{background:var(--saddle-bg);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13px}
.splitbox .sl{display:flex;justify-content:space-between;padding:3px 0;color:var(--saddle-dk)}
.splitbox .sl b{font-weight:800}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.lightbox .lbx-close{position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:grid;place-items:center}
/* quick actions */
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:680px){.quick{grid-template-columns:repeat(6,1fr)}}
.quick button{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 6px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink);box-shadow:var(--shadow)}
.quick button svg{width:21px;height:21px;color:var(--saddle)}
.quick button:active{filter:brightness(.96)}

/* ---------- chips / tags ---------- */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line2);background:var(--card);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--dark-surface);border-color:var(--dark-surface);color:#fff}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--kraft);border:1px dashed #D8C29A;color:#6E5526;border-radius:7px;padding:2px 8px 2px 6px;font-size:11.5px;font-weight:600}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--card);border:1px solid var(--brass)}
.skutag{display:inline-block;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;background:var(--kraft);border:1px dashed #D8C29A;border-radius:6px;padding:1px 7px;color:#6E5526}

/* ---------- pills / badges ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:700}
.pill.low{background:var(--red-bg);color:var(--red)}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.zero{background:#EEEAE2;color:var(--muted)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.info{background:var(--saddle-bg);color:var(--saddle-dk)}
.pill.gray{background:#EEEAE2;color:var(--muted)}

/* ---------- search / inputs ---------- */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:0 12px;height:44px}
.searchbar svg{width:18px;height:18px;color:var(--faint);flex:0 0 auto}
.searchbar input{border:none;outline:none;background:transparent;flex:1;min-width:0;font-size:15px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.in, select.in, textarea.in{width:100%;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;background:var(--card);font-size:15px;min-height:42px}
textarea.in{resize:vertical;min-height:70px}
.in:focus,select.in:focus,textarea.in:focus{outline:2px solid var(--saddle);outline-offset:-1px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.hint{font-size:11.5px;color:var(--faint);margin-top:4px}

/* ---------- folder & item grids ---------- */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.fcard{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;cursor:pointer;box-shadow:var(--shadow);text-align:left}
.fcard svg{width:22px;height:22px;color:var(--brass);flex:0 0 auto}
.fcard .fn{font-weight:700;font-size:13.5px;line-height:1.25}
.fcard .fm{font-size:11px;color:var(--muted)}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.icard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--shadow);position:relative;text-align:left;display:flex;flex-direction:column}
.icard .ph{aspect-ratio:4/3;background:linear-gradient(135deg,#F0EBE2,#E5DECF);display:grid;place-items:center;color:#C9BFA9;position:relative}
.icard .ph img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.icard .ph svg{width:30px;height:30px}
.icard .bd{padding:9px 11px 11px}
.icard .nm{font-weight:700;font-size:13.5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
.icard .qv{display:flex;align-items:baseline;justify-content:space-between;margin-top:5px;gap:6px}
.icard .q{font-weight:800;font-size:14px}
.icard .q small{font-weight:600;color:var(--muted);font-size:10.5px}
.icard .pr{font-size:12px;color:var(--muted);font-weight:600}
.icard .lowdot{position:absolute;top:8px;left:8px}
.selbox{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:7px;border:2px solid #fff;background:rgba(34,28,21,.35);display:grid;place-items:center;color:#fff;z-index:2}
.selbox svg{width:14px;height:14px;opacity:0}
.icard.sel{outline:3px solid var(--saddle)}
.icard.sel .selbox{background:var(--saddle);border-color:var(--saddle)}
.icard.sel .selbox svg{opacity:1}
/* list view */
.ilist{display:flex;flex-direction:column;gap:8px}
.irow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;cursor:pointer;box-shadow:var(--shadow);position:relative}
.irow .th{width:46px;height:46px;border-radius:9px;background:linear-gradient(135deg,#F0EBE2,#E5DECF);overflow:hidden;flex:0 0 auto;display:grid;place-items:center;color:#C9BFA9}
.irow .th img{width:100%;height:100%;object-fit:cover}
.irow .th svg{width:20px;height:20px}
.irow .nm{font-weight:700;font-size:14px}
.irow .meta{font-size:11.5px;color:var(--muted);display:flex;gap:7px;align-items:center;margin-top:2px;flex-wrap:wrap}
.irow .qcol{text-align:right;flex:0 0 auto}
.irow .qcol .q{font-weight:800;font-size:15px}
.irow .qcol .v{font-size:11.5px;color:var(--muted)}
.irow.sel{outline:3px solid var(--saddle)}
.irow .selbox{position:static;background:#EEEAE2;border-color:var(--line2);color:transparent;flex:0 0 auto}
.irow.sel .selbox{background:var(--saddle);border-color:var(--saddle);color:#fff}
.irow.sel .selbox svg{opacity:1}
/* account menu */
.tb-acct{position:relative;flex:0 0 auto}
.tb-acct .av{width:34px;height:34px;border-radius:50%;background:var(--saddle);color:#fff;border:none;display:grid;place-items:center;font-weight:800;font-size:14px;cursor:pointer}
.acctmenu{position:absolute;top:42px;right:0;width:240px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:7px;z-index:60;display:none}
.acctmenu.show{display:block}
.acctmenu .who{padding:10px 11px 9px;border-bottom:1px solid var(--line);margin-bottom:6px}
.acctmenu .who .n{font-weight:800;font-size:14.5px;color:var(--ink)}
.acctmenu .who .r{font-size:12px;color:var(--muted);margin-top:2px}
.acctmenu button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:none;padding:11px 11px;border-radius:9px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer}
.acctmenu button:hover{background:var(--bg)}
.acctmenu button svg{width:18px;height:18px;color:var(--muted);flex:0 0 auto}
.acctmenu .sep{height:1px;background:var(--line);margin:6px 2px}
.acctmenu .seg2{display:flex;gap:6px;padding:4px 4px 6px}
.acctmenu .seg2 button{justify-content:center;border:1px solid var(--line);font-size:13px;padding:9px 8px}
.acctmenu .seg2 button.on{background:var(--saddle);border-color:var(--saddle);color:#fff}
.acctmenu .seg2 button.on svg{color:#fff}
.crumbs{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--muted);overflow-x:auto;scrollbar-width:none;white-space:nowrap;padding:2px}
.crumbs::-webkit-scrollbar{display:none}
.crumbs a{text-decoration:none;color:var(--muted)}
.crumbs a:last-child{color:var(--ink)}
.crumbs svg{width:13px;height:13px;color:var(--faint);flex:0 0 auto}

/* bulk bar */
#bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);background:#2A2118;color:#fff;border:1px solid rgba(255,255,255,.08);border-radius:14px;display:none;align-items:center;gap:4px;padding:8px 10px;z-index:45;box-shadow:var(--shadow-lg);max-width:96vw;overflow-x:auto}
@media(min-width:920px){#bulkbar{bottom:18px}}
#bulkbar.show{display:flex}
#bulkbar .cnt{font-weight:800;font-size:13px;padding:0 8px;white-space:nowrap}
#bulkbar button{background:transparent;border:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:4px 9px;cursor:pointer;border-radius:8px}
#bulkbar button:hover{background:rgba(255,255,255,.12)}
#bulkbar button svg{width:17px;height:17px}

/* ---------- item detail ---------- */
.gallery{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gallery .g{flex:0 0 78%;max-width:340px;aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;background:linear-gradient(135deg,#F0EBE2,#E5DECF);border:1px solid var(--line);display:grid;place-items:center;color:#C9BFA9;position:relative}
.gallery .g img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gallery .g svg{width:34px;height:34px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.kv>div{background:var(--card);padding:11px 13px}
.kv .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.kv .v{font-weight:700;margin-top:2px;font-size:14.5px;word-break:break-word}
.stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line2);border-radius:13px;overflow:hidden;background:var(--card)}
.stepper button{width:54px;height:52px;border:none;background:var(--card);font-size:24px;cursor:pointer;color:var(--saddle);display:grid;place-items:center}
.stepper button:active{background:var(--saddle-bg)}
.stepper input{flex:1;min-width:0;border:none;text-align:center;font-size:21px;font-weight:800;outline:none;height:52px;background:transparent}
.actgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.actgrid .btn{flex-direction:column;gap:5px;font-size:11.5px;padding:10px 4px;min-height:58px}
.hist{display:flex;flex-direction:column}
.hist .h{display:flex;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:13px}
.hist .h:last-child{border-bottom:none}
.hist .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);margin-top:5px;flex:0 0 auto}
.hist .when{color:var(--faint);font-size:11.5px;margin-top:1px}

/* ---------- tables ---------- */
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);box-shadow:var(--shadow)}
table.t{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
table.t th{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
table.t td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.t tr:last-child td{border-bottom:none}
table.t td.r,table.t th.r{text-align:right}
table.t tfoot td{font-weight:800;background:color-mix(in srgb,var(--ink) 4%,var(--card))}

/* ---------- modal / sheet ---------- */
#ovl{position:fixed;inset:0;background:rgba(28,22,16,.45);z-index:60;display:none;align-items:flex-end;justify-content:center}
#ovl.show{display:flex}
@media(min-width:680px){#ovl{align-items:center;padding:20px}}
#modal{background:var(--card);width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));animation:up .18s ease}
@media(min-width:680px){#modal{border-radius:18px;animation:pop .15s ease}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
@keyframes pop{from{transform:scale(.97);opacity:.6}to{transform:none;opacity:1}}
#modal h3{font-size:17px;font-weight:800;margin-bottom:13px}
.mhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mhead h3{margin:0;flex:1}

/* ---------- toast ---------- */
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
@media(min-width:920px){#toasts{bottom:22px}}
.toast{background:var(--dark-surface);color:#fff;border-radius:11px;padding:10px 16px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:up .18s ease;max-width:88vw;text-align:center}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}

/* ---------- scanner ---------- */
.scanwrap{position:relative;border-radius:var(--r);overflow:hidden;background:#15110D;aspect-ratio:3/4;max-height:62dvh;width:100%}
.scanwrap video{width:100%;height:100%;object-fit:cover}
.scanbox{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.scanbox .frame{width:68%;max-width:300px;aspect-ratio:1.4;border-radius:14px;box-shadow:0 0 0 9999px rgba(15,12,9,.45);position:relative}
.scanbox .frame::before{content:'';position:absolute;inset:0;border-radius:14px;border:2.5px solid rgba(255,255,255,.9)}
.scanbox .laser{position:absolute;left:6%;right:6%;height:2px;background:var(--brass);top:10%;animation:laser 1.6s ease-in-out infinite alternate;border-radius:2px;box-shadow:0 0 8px var(--brass)}
@keyframes laser{from{top:10%}to{top:88%}}
.scanmsg{position:absolute;bottom:12px;left:12px;right:12px;text-align:center;color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6)}

/* ---------- labels & print ---------- */
.lblsheet{display:flex;flex-wrap:wrap;gap:4mm;align-content:flex-start}
.lbl{border:1px dashed #BBB;border-radius:2mm;display:flex;align-items:center;gap:2.5mm;padding:2.5mm;background:#fff;overflow:hidden;page-break-inside:avoid;break-inside:avoid}
.lblsheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:6px}
.lblsheet .lbl{color:#222}
.skel{background:linear-gradient(90deg,var(--line2) 25%,var(--card) 50%,var(--line2) 75%);background-size:200% 100%;animation:skel 1.1s infinite;border-radius:10px}
@keyframes skel{to{background-position:-200% 0}}
.lbl .code{flex:0 0 auto;display:grid;place-items:center}
.lbl .code img,.lbl .code svg,.lbl .code canvas{display:block}
.lbl .tx{min-width:0;line-height:1.18}
.lbl .tn{font-weight:700;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lbl .ts{font-family:ui-monospace,Menlo,Consolas,monospace;color:#333}
.lbl .tp{font-weight:700}
.lbl.s-s{width:48mm;height:24mm;font-size:8.2pt}
.lbl.s-m{width:62mm;height:30mm;font-size:9.5pt}
.lbl.s-l{width:96mm;height:46mm;font-size:13pt}
#printArea{display:none}
body.printing #app,body.printing #ovl,body.printing #toasts,body.printing #bulkbar{display:none!important}
body.printing #printArea{display:block;padding:8mm}
@media print{
  body{background:#fff}
  #app,#ovl,#toasts,#bulkbar,#topbar,#bottomnav{display:none!important}
  #printArea{display:block!important;padding:0}
  .lbl{border-style:solid;border-color:#eee}
  @page{margin:8mm}
}
.printdoc h2{font-size:18pt;margin-bottom:2mm}
.printdoc .pmeta{font-size:9.5pt;color:#444;margin-bottom:5mm}
.printdoc table{width:100%;border-collapse:collapse;font-size:9.5pt}
.printdoc th,.printdoc td{border:1px solid #ccc;padding:1.6mm 2.2mm;text-align:left;vertical-align:top}
.printdoc th{background:#f2efe9;font-size:8pt;text-transform:uppercase;letter-spacing:.06em}
.printdoc td.r,.printdoc th.r{text-align:right}

/* ---------- empty / onboarding ---------- */
.empty{text-align:center;padding:42px 18px;color:var(--muted)}
.empty svg{width:42px;height:42px;color:var(--line2);margin:0 auto 10px}
.empty .t{font-weight:700;color:var(--ink);font-size:15px;margin-bottom:4px}
.empty .s{font-size:13px;max-width:340px;margin:0 auto 16px}
.welcome{background:linear-gradient(135deg,#2A2118,#4A331F);color:#F4E9D8;border-radius:18px;padding:22px 20px;margin-bottom:18px;position:relative;overflow:hidden}
.welcome::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border:2px dashed rgba(244,233,216,.25);border-radius:50%}
.welcome h2{font-size:20px;font-weight:800;letter-spacing:.01em}
.welcome p{font-size:13.5px;opacity:.85;margin:7px 0 15px;max-width:420px}
.listcard{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;cursor:pointer;box-shadow:var(--shadow)}
.listcard .ic{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;background:var(--saddle-bg);color:var(--saddle)}
.listcard .ic svg{width:19px;height:19px}
.listcard .t1{font-weight:700;font-size:14.5px}
.listcard .t2{font-size:12px;color:var(--muted);margin-top:1px}
.seg{display:flex;background:color-mix(in srgb,var(--ink) 8%,var(--card));border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:none;background:transparent;border-radius:8px;padding:8px 10px;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.prog{height:7px;background:color-mix(in srgb,var(--ink) 8%,var(--card));border-radius:4px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--green);border-radius:4px;transition:width .2s}
.dz{border:2px dashed var(--line2);border-radius:var(--r);padding:26px 16px;text-align:center;color:var(--muted);font-size:13.5px;background:var(--card)}
</style>
</head>
<body>
<div id="app">
  <nav id="side" aria-label="Main">
    <div class="brand"><span class="bx"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="64" height="64" rx="14" fill="#8A5226"/><circle cx="32" cy="17.5" r="4" fill="#E8B04B"/><path d="M19 28h26v17a3 3 0 0 1-3 3H22a3 3 0 0 1-3-3z" fill="none" stroke="#F4E9D8" stroke-width="3.4" stroke-linejoin="round"/><path d="M19 28l-5.5-6.5M45 28l5.5-6.5" fill="none" stroke="#F4E9D8" stroke-width="3.4" stroke-linecap="round"/><path d="M32 33v9" stroke="#F4E9D8" stroke-width="3.4" stroke-linecap="round"/></svg></span><span>INVENTO<small>by Trishal</small></span></div>

function parseCfgText(t){
  t=String(t||'');
  const k=t.indexOf('apiKey');if(k<0)return null;
  const a=t.lastIndexOf('{',k);if(a<0)return null;
  let d=0,b=-1;
  for(let i=a;i<t.length;i++){const ch=t[i];if(ch==='{')d++;else if(ch==='}'){d--;if(d===0){b=i;break}}}
  if(b<0)return null;
  let s=t.slice(a,b+1)
    .replace(/(^|\s)\/\/[^\n]*/g,'$1')
    .replace(/'/g,'"')
    .replace(/([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g,'$1"$2":')
    .replace(/,\s*([}\]])/g,'$1');
  try{const c=JSON.parse(s);return (c&&c.apiKey&&c.projectId)?c:null}catch(e){return null}
}

/* Safety limiter: per-device rolling write budget. Generous for real work
   (900 writes/hour ≈ far beyond a busy shift) but stops runaway loops,
   hijacked devices, or app-level abuse from burning the database. */
const WLIM_MAX=3000,WLIM_WIN=3600000;
function writeOK(n){
  n=n||1;
  try{
    let a=JSON.parse(localStorage.getItem('invento_wl')||'[]');
    const now=Date.now();a=a.filter(t=>now-t<WLIM_WIN);
    if(a.length+n>WLIM_MAX){localStorage.setItem('invento_wl',JSON.stringify(a));return false}
    for(let i=0;i<n;i++)a.push(now);
    localStorage.setItem('invento_wl',JSON.stringify(a));return true;
  }catch(e){return true}
}
let _wlToastTs=0;
function wlBlocked(){const now=Date.now();if(now-_wlToastTs>30000){_wlToastTs=now;toast('Safety limit reached — too many changes this hour from this device. Paused briefly.','err')}}
async function saveNow(col){
  clearTimeout(saveTimers[col]);dirty[col]=false;
  if(MODE==='cloud'){
    if(!writeOK(4)){wlBlocked();save(col);return false}
    try{
      if(col==='meta')await pushMeta();
      else if(col==='txns'){/* txns are written per-entry in logTx */}
      else await pushDiff(col);
      return true;
    }catch(e){
      console.error('cloud save',col,e);
      if(e&&e.code==='permission-denied'){toast('Not allowed — admin permission needed','err');resyncCol(col);return false}
      if(e&&e.code==='resource-exhausted'){toast('Daily free-tier limit reached — changes will sync after Google resets it (~1:30 PM IST). Avoid heavy use till then.','err');setTimeout(()=>saveNow(col),90000);return false}
      toast('Could not sync — retrying','err');save(col);return false}
  }
  const ok=await store.set(col,S[col]);
  if(!ok)toast('Could not save — storage error','err');
  return ok;
}
async function resyncCol(col){

async function pushDiff(col){
  const sh=shadows[col]||(shadows[col]={});
  const cur={},ops=[];
  S[col].forEach(o=>{
    if(!o||!o.id)return;
    const c=clean(o);const j=JSON.stringify(c);cur[o.id]=1;
    if(sh[o.id]!==j){ops.push(['set',c]);sh[o.id]=j}
  });
  Object.keys(sh).forEach(id=>{if(!cur[id]){ops.push(['del',id]);delete sh[id]}});
  for(let i=0;i<ops.length;i+=400){
    const b=db.batch();
    ops.slice(i,i+400).forEach(op=>{
      const ref=db.collection(col).doc(op[0]==='set'?op[1].id:op[1]);
      if(op[0]==='set')b.set(ref,op[1]);else b.delete(ref);
    });
    await b.commit();
  }
}
async function pushMeta(){
  const c=clean(S.meta);const j=JSON.stringify(c);
  if(shadows.meta===j)return;
  shadows.meta=j;

}
async function nextSeq(key){

  const ref=db.collection('meta').doc('app');
  const n=await db.runTransaction(async t=>{
    const s=await t.get(ref);const m=s.exists?(s.data()||{}):{};
    const seq=Object.assign({pl:0,po:0},m.seq||{});seq[key]=(seq[key]||0)+1;
    t.set(ref,{seq:seq},{merge:true});
    return seq[key];
  });
  S.meta.seq[key]=n;
  return n;
}

/* ---------- realtime sync ---------- */
function mergeCol(col,docs){
  const map={};S[col].forEach(o=>{if(o&&o.id)map[o.id]=o});
  const next=docs.map(d=>{
    const data=d.data();data.id=d.id;
    const ex=map[d.id];
    if(ex){
      Object.keys(ex).forEach(k=>{if(!(k in data)&&k[0]!=='_')delete ex[k]});
      Object.assign(ex,data);
      return ex;
    }
    return data;
  });
  S[col]=next;
  const sh=shadows[col]={};
  next.forEach(o=>{sh[o.id]=JSON.stringify(clean(o))});
}

/* ---------- derived helpers ---------- */
const fById=id=>S.folders.find(f=>f.id===id)||null;
const iById=id=>S.items.find(i=>i.id===id)||null;
function folderPath(id){const seg=[];let f=fById(id),guard=0;while(f&&guard++<30){seg.unshift(f.name);f=fById(f.parent)}return seg.join(' / ')||'All stock'}
function childFolders(pid){return S.folders.filter(f=>(f.parent||null)===(pid||null)).sort((a,b)=>a.name.localeCompare(b.name))}
function itemsIn(fid){return S.items.filter(i=>pilesOf(i).some(p=>(p.f||null)===(fid||null)))}
/* ============================================================
   MULTI-LOCATION PILES (plan A)
   An item may hold stock in several racks at once:
   i.piles = [{f:folderId,q:number},...]  ·  sum(q) === i.qty  ·  i.folder === piles[0].f
   Items WITHOUT a piles field behave exactly as before (single location).
   ============================================================ */
function pilesOf(i){if(Array.isArray(i.piles)&&i.piles.length)return i.piles;return[{f:i.folder||null,q:+i.qty||0}]}
function isMultiRack(i){return Array.isArray(i.piles)&&i.piles.length>1}
function setPiles(i,ps){
  const m={},order=[];
  (ps||[]).forEach(p=>{const q=round4(+p.q||0);if(q<=1e-9)return;const k=String(p.f||'');if(!(k in m)){m[k]={f:p.f||null,q:0};order.push(k)}m[k].q=round4(m[k].q+q)});
  const out=order.map(k=>m[k]);
  i.qty=round4(out.reduce((s,p)=>s+p.q,0));
  if(out.length<=1){delete i.piles;if(out.length)i.folder=out[0].f}
  else{i.piles=out;i.folder=out[0].f}
  i.updatedAt=Date.now();
}
function pileAdd(i,f,q){q=round4(+q||0);if(q<=0)return;const ps=pilesOf(i).map(p=>({f:p.f,q:p.q}));const t=ps.find(p=>String(p.f||'')===String(f||''));if(t)t.q=round4(t.q+q);else ps.push({f:f===undefined?i.folder||null:f,q:q});setPiles(i,ps)}
/* remove q, preferring pile preferF, draining others in order. Returns 'from' text for logs. */
function pileDrain(i,q,preferF){
  q=round4(+q||0);if(q<=0)return '';
  const ps=pilesOf(i).map(p=>({f:p.f,q:p.q}));
  if(preferF!==undefined){const ix=ps.findIndex(p=>String(p.f||'')===String(preferF||''));if(ix>0){const t=ps.splice(ix,1)[0];ps.unshift(t)}}
  const took=[];
  for(const p of ps){if(q<=1e-9)break;const t=Math.min(p.q,q);if(t>1e-9){p.q=round4(p.q-t);q=round4(q-t);took.push(shelfName(p.f)+' ·'+fmtQty(t))}}
  setPiles(i,ps);
  return took.join(' + ');
}
function shelfName(f){const x=fById(f);return x?x.name:'All stock'}
/* short location text: "R31C2 ·8 + R8C2 ·7" for multi, full path for single */
function pileSummary(i){if(!isMultiRack(i))return folderPath(i.folder);return i.piles.map(p=>shelfName(p.f)+' ·'+fmtQty(p.q)).join(' + ')}
/* after any DIRECT i.qty set on a multi-rack item: rebalance the primary pile */
function syncPilesToQty(i){
  if(!isMultiRack(i))return;
  let target=round4(+i.qty||0);
  const ps=i.piles.map(p=>({f:p.f,q:p.q}));
  const others=ps.slice(1).reduce((s,p)=>s+p.q,0);
  if(target>=others){ps[0].q=round4(target-others)}
  else{ps[0].q=0;let need=round4(others-target);for(let ix=ps.length-1;ix>=1&&need>1e-9;ix--){const t=Math.min(ps[ix].q,need);ps[ix].q=round4(ps[ix].q-t);need=round4(need-t)}}
  setPiles(i,ps);
}

[/^adding$/,()=>'जोड़ रहे हैं'],[/^removing$/,()=>'घटा रहे हैं'],
[/^Move (\d+) items$/,m=>m[1]+' आइटम मूव करें'],
[/^(\d+) clones? created$/,m=>m[1]+' कॉपी बन गई'],
[/^Screen error: (.*)$/,m=>'स्क्रीन में गड़बड़: '+m[1]]
];
function trHi(s){
  if(!s)return s;const t=s.trim();if(!t||/^[\d.,:%₹$+\-—·]*$/.test(t))return s;
  let out=HI[t];
  if(out===undefined){for(const r of HI_RX){const m=t.match(r[0]);if(m){out=r[1](m);break}}}
  if(out===undefined)return s;
  return s.replace(t,out);
}
function i18nWalk(root){
  if(!langHi()||!root)return;
  const bad={SCRIPT:1,STYLE:1,TEXTAREA:1,INPUT:1};
  const skip=el=>{for(let e=el;e&&e.nodeType===1;e=e.parentElement){if(bad[e.tagName]||e.classList&&(e.classList.contains('num')||e.classList.contains('mono'))||e.hasAttribute&&e.hasAttribute('data-noi18n'))return true}return false};
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  const nodes=[];let n;while(n=w.nextNode())nodes.push(n);
  nodes.forEach(nd=>{if(skip(nd.parentElement))return;const v=nd.nodeValue,t2=trHi(v);if(t2!==v)nd.nodeValue=t2});
  (root.querySelectorAll?[root].concat(Array.from(root.querySelectorAll('[placeholder],[title],[aria-label]'))):[]).forEach(el=>{
    if(!el.getAttribute)return;
    ['placeholder','title','aria-label'].forEach(a=>{const v=el.getAttribute&&el.getAttribute(a);if(v){const t2=trHi(v);if(t2!==v)el.setAttribute(a,t2)}});
  });
}
function i18nBoot(){
  if(!document.body)return;
  if(langHi()){document.documentElement.lang='hi';i18nWalk(document.body)}
  const mo=new MutationObserver(muts=>{
    if(!langHi())return;
    muts.forEach(m=>m.addedNodes&&m.addedNodes.forEach(nd=>{
      if(nd.nodeType===3){const v=nd.nodeValue,t2=trHi(v);if(t2!==v)nd.nodeValue=t2}
      else if(nd.nodeType===1)i18nWalk(nd);
    }));
  });
  mo.observe(document.body,{childList:true,subtree:true});
  document.addEventListener('change',e=>{
    if(e.target&&e.target.id==='st-lang'){setLang(e.target.value);location.reload()}
  });
  document.addEventListener('click',e=>{
    const b=e.target&&e.target.closest&&e.target.closest('#lang-flip');
    if(b){setLang(langHi()?'en':'hi');location.reload()}
  });
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',i18nBoot);else i18nBoot();

function sortItems(arr){

  $('#selToggle').onclick=()=>{view.selectMode=!view.selectMode;if(!view.selectMode)view.sel.clear();renderBulk();vStockFolders(fid)};
  const fwh=$('#fld-wh');if(fwh)fwh.onchange=async()=>{const f2=fById(fid);if(!f2)return;f2.parent=fwh.value||null;await saveNow('folders');toast(fwh.value?('Moved into '+whName(fwh.value)):'Moved to top level','ok');vStockFolders(fid)};

function rerenderStockBody(fid){ // light re-render keeps keyboard focus
  vStockDebounce=vStockDebounce||{};clearTimeout(vStockDebounce.t);

}
let vStockDebounce=null;
function bindStockClicks(fid){
  $$('#main [data-folder]').forEach(b=>b.onclick=()=>go('#stock/'+b.dataset.folder));

/* ---------- bulk bar ---------- */
function renderBulk(){
  const bar=$('#bulkbar');const n=view.sel.size;
  if(!n){bar.classList.remove('show');bar.innerHTML='';return}
  bar.classList.add('show');
  bar.innerHTML='<span class="cnt num">'+n+' selected</span>'+
    '<button data-b="move">'+ico('move')+'Move</button>'+
    '<button data-b="tag">'+ico('tag')+'Tag</button>'+
    '<button data-b="label">'+ico('label')+'Labels</button>'+
    '<button data-b="csv">'+ico('down')+'CSV</button>'+
    (can('delitem')?'<button data-b="del">'+ico('trash')+'Delete</button>':'')+
    '<button data-b="x">'+ico('x')+'Clear</button>';
  $$('#bulkbar [data-b]').forEach(b=>b.onclick=()=>bulkAct(b.dataset.b));
}
async function bulkAct(k){
  const ids=Array.from(view.sel);const its=ids.map(iById).filter(Boolean);
  if(k==='x'){view.sel.clear();renderBulk();route();return}
  if(k==='move'){moveDlg(its);return}
  if(k==='label'){sessionStorage.setItem('lblsel',JSON.stringify(ids));go('#labels');return}
  if(k==='csv'){if(!can('export')){toast('You do not have permission to export','err');return}exportItemsCSV(its);return}
  if(k==='tag'){openModal('<h3>Add tag to '+its.length+' items</h3><div class="field"><input class="in" id="bt" placeholder="e.g. sale, export, b-grade" list="tagsdl"><datalist id="tagsdl">'+allTags().map(t=>'<option value="'+esc(t)+'">').join('')+'</datalist></div><button class="btn pri block" id="btgo">Add tag</button>');
    $('#btgo').onclick=()=>{const t=$('#bt').value.trim();if(!t)return;its.forEach(i=>{i.tags=i.tags||[];if(!i.tags.includes(t))i.tags.push(t);i.updatedAt=Date.now()});save('items');logTx('edited',{detail:'Tag "'+t+'" added to '+its.length+' items'});closeModal();toast('Tag added','ok');route()};return}
  if(k==='del'){const ok=await confirmDlg('Delete '+its.length+' items?','They move to Trash and can be restored from More → Trash.','Delete',true);if(!ok)return;
    its.forEach(i=>trashItem(i,true));save('items');save('trash');logTx('deleted',{detail:its.length+' items moved to trash'});view.sel.clear();renderBulk();toast(its.length+' moved to trash');route()}
}

    (i.min!==''&&i.min!=null?'<div class="small muted" style="margin-top:2px">Low-stock alert at '+fmtQty(i.min)+'</div>':'')+
    (can('adjqty')?'<div class="row mt" style="gap:8px;flex-wrap:wrap"><input id="adj-n" class="in num" inputmode="decimal" placeholder="0" style="max-width:110px;flex:0 0 auto;text-align:center;font-weight:800;font-size:19px">'+
    '<select class="in" id="adj-r" style="flex:1;min-width:120px;padding:9px 10px">'+ADJ_REASONS.map(r=>'<option>'+r+'</option>').join('')+'</select></div>':'')+
    (can('adjqty')?'<div class="row mt" style="gap:8px"><button class="btn grow danger" id="adj-out" style="font-weight:800">− Remove</button><button class="btn grow pri" id="adj-in" style="font-weight:800">+ Add</button></div>'+
    '<div class="hint" style="margin-top:7px">Stock only moves by adding or removing — every change lands in the movement history with its reason.</div>':'<div class="hint" style="margin-top:7px">You do not have permission to change stock quantity.</div>')+'</div>';
  h+='<div class="actgrid mb">'+
    '<button class="btn" data-act="moveitem" data-id="'+i.id+'">'+ico('move')+'Move</button>'+
    '<button class="btn" data-act="cloneitem" data-id="'+i.id+'">'+ico('copy')+'Clone</button>'+
    '<button class="btn" data-act="labelone" data-id="'+i.id+'">'+ico('label')+'Label</button>'+
    '<button class="btn" data-act="addto" data-id="'+i.id+'">'+ico('pick')+'Add to…</button></div>';
  h+='<div class="kv mb">'+
    '<div'+(isMultiRack(i)?' style="grid-column:1/-1"':'')+'><div class="k">'+locTerm()+(isMultiRack(i)?' — '+i.piles.length+' racks':'')+'</div><div class="v">'+(isMultiRack(i)?i.piles.map(p=>'<span class="skutag" style="font-size:13px;margin:0 5px 5px 0;display:inline-block">'+esc(shelfName(p.f))+' · <b class="num">'+fmtQty(p.q)+'</b></span>').join(''):esc(folderPath(i.folder)))+'</div></div>'+
    '<div style="grid-column:1/-1"><div class="k">SKU'+(skusOf(i).length>1?'s ('+skusOf(i).length+')':'')+'</div><div class="v">'+(skusOf(i).length?skusOf(i).map((s,ix)=>'<span class="skutag" style="font-size:13px;margin:0 5px 5px 0;display:inline-block">'+esc(s)+(ix===0?' ·main':'')+'</span>').join(''):'<span class="muted">—</span>')+'</div></div>'+
    '<div><div class="k">Min quantity</div><div class="v num">'+(i.min!==''&&i.min!=null?fmtQty(i.min)+' '+esc(i.unit||''):'<span class="muted">No alert</span>')+'</div></div>'+
    '<div><div class="k">Price</div><div class="v num">'+(+i.price?fmtMoney(+i.price):'<span class="muted">—</span>')+'</div></div>'+
    '<div><div class="k">Cost (USD)</div><div class="v num">'+(+i.cost?fmtUSD(+i.cost):'<span class="muted">—</span>')+'</div></div>'+
    '<div><div class="k">Created</div><div class="v">'+fmtDate(i.createdAt)+'</div></div>'+

    }).join('')+'</div>'+((S.txns||[]).filter(t=>t.itemId===i.id).length>30?'<div class="small muted mt">Older entries are in the Activity log.</div>':'')):'<div class="sub">No movements recorded yet.</div>')+'</div>';

    let n=round4(parseFloat(an.value));
    if(!(n>0)){toast('Enter how many to '+(dir>0?'add':'remove'),'err');return}
    const old=+i.qty||0;
    if(dir<0&&n>old){toast('Only '+fmtQty(old)+' in stock','err');return}
    const reason=$('#adj-r').value;
    const pick=await askRack(i,dir,n);          // single-rack remove resolves instantly; everything else asks
    if(!pick)return;                            // person closed the box — nothing changes
    const pf=pick.f;
    if(dir<0){const pp=pilesOf(i).find(p=>String(p.f||'')===String(pf||''));const cap=pp?pp.q:0;if(n>cap+1e-9){toast('Only '+fmtQty(cap)+' in '+shelfName(pf),'err');return}}
    const wasMulti=isMultiRack(i);

  };
  if($('#adj-out'))$('#adj-out').onclick=()=>adj(-1);
  if($('#adj-in'))$('#adj-in').onclick=()=>adj(1);
}

  h+='<div class="field"><label>More SKUs / barcodes (optional)</label><input class="in mono" id="f-alt" value="'+esc((i.alt||[]).join(', '))+'" placeholder="ETSY-WAL-101, VENDOR-77 (comma separated)"><div class="hint">A product can carry several SKUs (different channels/vendors). Scanning any of them finds this item, and you can print a label per SKU.</div></div>';
  h+='<div class="field"><label>Tags</label><input class="in" id="f-tags" value="'+esc((i.tags||[]).join(', '))+'" placeholder="duffle, bestseller (comma separated)"></div>';

  $('#main').innerHTML=h;

  $('#f-photo').onchange=async e=>{const file=e.target.files[0];e.target.value='';if(!file)return;

  function readForm(){return{name:$('#f-name').value.trim(),qty:isNew?(parseFloat($('#f-qty').value)||0):(+i.qty||0),unit:$('#f-unit').value,folder:(($('#f-sel')&&['__rc__','__new__'].indexOf($('#f-sel').value)<0)?($('#f-sel').value||null):(i.folder||null)),price:$('#f-price').value.trim(),cost:$('#f-cost').value.trim(),sku:$('#f-sku').value.trim(),min:$('#f-min').value.trim(),code:$('#f-code').value.trim(),alt:$('#f-alt').value.split(',').map(s=>s.trim()).filter(Boolean),tags:$('#f-tags').value.split(',').map(s=>s.trim()).filter(Boolean),notes:$('#f-notes').value.trim(),img:($('#f-img')?$('#f-img').value.trim():''),autoPO:!!($('#f-autopo')&&$('#f-autopo').checked)}}

function compressImage(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      const make=(max,q)=>{const sc=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*sc));c.height=Math.max(1,Math.round(img.height*sc));c.getContext('2d').drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',q)};
      res([make(800,.62),make(80,.5)]);
    };img.onerror=rej;img.src=r.result};
    r.onerror=rej;r.readAsDataURL(file);
  });
}
function makeThumbFromDataURL(durl){return new Promise(res=>{const img=new Image();img.onload=()=>{const max=80,sc=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.6))};img.onerror=()=>res('');img.src=durl})}

function wireLocPicker(prefix){
  const sel=$('#'+prefix+'-sel'),nw=$('#'+prefix+'-newwrap');
  if(sel){sel.onchange=()=>{const v=sel.value;if(nw)nw.style.display=v==='__new__'?'':'none';if(v==='__new__'){const n=$('#'+prefix+'-new');if(n)setTimeout(()=>n.focus(),30)}}}
  const r=$('#'+prefix+'-r'),c=$('#'+prefix+'-c'),pv=$('#'+prefix+'-rcprev');
  const prev=()=>{const rv=(r&&r.value||'').trim(),cv=(c&&c.value||'').trim();if(pv)pv.textContent=rv?('= R'+rv+'C'+cv):'';};
  if(r)r.oninput=prev; if(c)c.onchange=prev;
}
// returns {folderId} (creating the folder if needed) or null on validation error (with toast)
async function resolveLocPicker(prefix){
  const r=($('#'+prefix+'-r')&&$('#'+prefix+'-r').value||'').trim();
  const c=($('#'+prefix+'-c')&&$('#'+prefix+'-c').value||'').trim();
  if(r){
    const rn=parseInt(r);
    if(!(rn>=1&&rn<=999)){toast('Rack must be 1–999','err');return null}
    const name='R'+rn+'C'+(c||'');
    return {folderId:await ensureFolderByName(name)};
  }
  const sel=$('#'+prefix+'-sel');if(!sel)return {folderId:null};
  if(sel.value==='__new__'){
    const nm=($('#'+prefix+'-new').value||'').trim();
    if(!nm){toast('Type a '+locL()+' name, or enter a rack number','err');return null}
    return {folderId:await ensureFolderByName(nm)};
  }
  return {folderId:sel.value||null};
}
async function ensureFolderByName(name){
  const ex=S.folders.find(f=>f.name.toLowerCase()===name.toLowerCase()&&!f.parent);
  if(ex)return ex.id;
  const nf={id:uid('f'),name:name,parent:null,createdAt:Date.now()};
  S.folders.push(nf);await saveNow('folders');return nf.id;
}

function moveDlg(items){
  const one=items.length===1?items[0]:null;
  const multi1=one&&isMultiRack(one);
  openModal('<h3>Move '+(one?'“'+esc(one.name)+'”':items.length+' items')+'</h3>'+
    (multi1?'<div class="field"><label>From which rack</label>'+pileSelect(one,'mv-from')+'</div>':'')+
    (one?'<div class="field"><label>Quantity to move'+(multi1?'':' (have '+fmtQty(one.qty)+' '+esc(one.unit||'')+')')+'</label><input class="in num" id="mv-q" inputmode="decimal" value="'+fmtQty(multi1?pilesOf(one)[0].q:one.qty)+'"><div class="hint">Move part of the stock and the rest stays where it is'+(multi1?' — each rack keeps its own count':'')+'.</div></div>':'<p class="sub mb">Full quantity of each selected item will move'+(items.some(isMultiRack)?' (all racks combined into the destination)':'')+'.</p>')+
    locPickerHTML('mv',one?one.folder:null)+
    '<div class="field"><label>Reason</label><select class="in" id="mv-r">'+MOVE_REASONS.map(r=>'<option>'+r+'</option>').join('')+'</select></div>'+
    '<button class="btn pri block" id="mv-go">'+ico('move')+'Move</button>');
  wireLocPicker('mv');
  if(multi1)$('#mv-from').onchange=()=>{$('#mv-q').value=fmtQty(pilesOf(one)[+$('#mv-from').value].q)};
  $('#mv-go').onclick=async()=>{
    const res=await resolveLocPicker('mv');
    if(!res)return;
    const dest=res.folderId;
    const reason=$('#mv-r').value;
    if(one){
      const q=round4(parseFloat($('#mv-q').value));
      const fromP=multi1?pilesOf(one)[+($('#mv-from').value||0)]:null;
      const cap=fromP?fromP.q:(+one.qty||0);
      if(!(q>0)||q>cap+1e-9){toast('Enter a quantity up to '+fmtQty(cap)+(fromP?' (in '+shelfName(fromP.f)+')':''),'err');return}
      doMove(one,q,dest,reason,fromP?fromP.f:undefined);
    } else items.forEach(it=>{if(isMultiRack(it))setPiles(it,[{f:dest,q:+it.qty||0}]),logTx('moved',{itemId:it.id,itemName:it.name,qtyMoved:+it.qty||0,from:pileSummary(it),to:folderPath(dest),detail:reason});else doMove(it,+it.qty||0,dest,reason)});
    save('items');closeModal();view.sel.clear();renderBulk();toast('Moved','ok');route();
  };
}
function doMove(i,q,dest,reason,fromF){
  const srcF=fromF!==undefined?fromF:(i.folder||null);
  if((srcF||null)===(dest||null))return;
  const fromName=folderPath(srcF),toName=folderPath(dest);
  const moveAll=!isMultiRack(i)&&Math.abs(q-(+i.qty||0))<1e-9&&fromF===undefined;
  if(moveAll){i.folder=dest;i.updatedAt=Date.now()}
  else{
    /* pile-based: take q from the source rack, add it to the destination rack — SAME item */
    const ps=pilesOf(i).map(p=>({f:p.f,q:p.q}));
    let s=ps.find(p=>String(p.f||'')===String(srcF||''));if(!s)s=ps[0];
    const take=Math.min(s?s.q:0,q);if(take<=1e-9)return;
    s.q=round4(s.q-take);
    const t=ps.find(p=>String(p.f||'')===String(dest||''));
    if(t)t.q=round4(t.q+take);else ps.push({f:dest,q:take});
    setPiles(i,ps);
  }
  logTx('moved',{itemId:i.id,itemName:i.name,qtyMoved:q,from:fromName,to:toName,detail:reason});
}

function vScan(mode,arg){
  mode=mode||'find';
  const list=mode==='pick'?S.lists.find(l=>l.id===arg):null;
  topTitle(mode==='tocode'?'Scan a code':(mode==='pick'?'Scan to pick — '+(list?list.name:''):'Scan'),mode==='tocode'?null:(mode==='pick'?'#list/'+arg:'#home'));
  const hw=hwScanner();
  let h='';
  if(hw){
    // Barcode machine ON — no camera, just the always-focused scanner input
    h+='<div class="card pad mb" style="text-align:center;border:2px solid var(--saddle)"><div style="width:54px;height:54px;border-radius:50%;background:var(--saddle-bg);color:var(--saddle);display:grid;place-items:center;margin:0 auto 10px">'+ico('scan')+'</div><h2 style="margin:0 0 4px">Scan using the barcode scanner</h2><div class="sub">Point the machine and scan — items pop up instantly. No camera needed.</div></div>';
    h+='<div class="card pad"><div class="row"><input class="in mono grow" id="man" placeholder="Waiting for scan…" autocomplete="off" autocapitalize="off" autocorrect="off"><button class="btn pri" id="mango">Go</button></div><div class="hint">Tip: turn the barcode machine off in the menu to use the phone camera instead.</div></div>';
  } else {
    h+='<div class="scanwrap mb"><video id="cam" playsinline muted autoplay></video><div class="scanbox"><div class="frame"><div class="laser"></div></div></div><div class="scanmsg" id="scanmsg">Point at a barcode or QR code</div></div>';
    h+='<div class="card pad"><div class="eyebrow" style="margin-bottom:6px">Or enter code manually</div><div class="row"><input class="in mono grow" id="man" placeholder="SKU or barcode value" autocomplete="off"><button class="btn pri" id="mango">Go</button></div><div class="hint" id="camnote"></div></div>';
  }
  $('#main').innerHTML=h;
  const man=$('#man');
  $('#mango').onclick=()=>{const v=man.value.trim();if(v)handleCode(v)};
  man.onkeydown=e=>{if(e.key==='Enter')$('#mango').click()};
  if(hw){
    setTimeout(()=>{try{man.focus()}catch(e){}},80);
    // keep focus + auto-submit (scanners that don't send Enter)
    const fi=setInterval(()=>{if(!document.querySelector('#man')){clearInterval(fi);return}try{if(document.activeElement!==man)man.focus()}catch(e){}},500);
    let at=null;man.oninput=()=>{clearTimeout(at);at=setTimeout(()=>{if(man.value.trim().length>=3)$('#mango').click()},120)};
  }

  let lastCode='',lastAt=0,closed=false;
  function handleCode(code){
    const now=Date.now();
    if(code===lastCode&&now-lastAt<2200)return;
    lastCode=code;lastAt=now;
    if(mode==='tocode'){beep(true);sessionStorage.setItem('scannedcode',code);const ret=sessionStorage.getItem('scanret')||'stock';sessionStorage.removeItem('scanret');go('#'+ret);return}
    if(mode==='pick'&&list){scanPick(list,code);return}
    const it=findByCode(code);
    if(it){beep(true);quickScanModal(it)}
    else{beep(false);openModal('<h3>Code not found</h3><p class="sub mb">No item matches <span class="mono">'+esc(code)+'</span>.</p><button class="btn pri block mb" id="ns-add">'+ico('plus')+'Add new item with this code</button><button class="btn block" id="ns-x">Keep scanning</button>');
      $('#ns-add').onclick=()=>{closeModal();sessionStorage.setItem('newcode',code);go('#edit/new')};
      $('#ns-x').onclick=closeModal;}
  }
  function quickScanModal(it){
    openModal('<div class="mhead"><span class="th" style="width:46px;height:46px;border-radius:9px;overflow:hidden;display:grid;place-items:center;background:var(--saddle-bg)">'+((it.img||it.thumb)?'<img src="'+esc(it.img||it.thumb)+'" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover">':ico('box'))+'</span><h3 class="ellip">'+esc(it.name)+'</h3></div>'+
      '<div class="sub mb num">In stock: <b id="qs-cur">'+fmtQty(it.qty)+'</b> '+esc(it.unit||'')+' · '+esc(pileSummary(it))+'</div>'+

      '<div class="row mb" style="gap:8px"><input id="qs-q" class="in num" inputmode="decimal" placeholder="0" style="max-width:110px;flex:0 0 auto;text-align:center;font-weight:800;font-size:19px">'+
      '<select class="in" id="qs-r" style="flex:1;min-width:110px;padding:9px 10px">'+ADJ_REASONS.map(r=>'<option>'+r+'</option>').join('')+'</select></div>'+

      '<div class="row mb" style="gap:8px"><button class="btn grow danger" id="qs-out" style="font-weight:800">− Remove</button><button class="btn pri grow" id="qs-in" style="font-weight:800">+ Add</button></div>'+
      (can('dispatch')?'<div class="row mb" style="gap:8px"><button class="btn grow" id="qs-dispatch">'+ico('send')+'Dispatch</button><button class="btn grow" id="qs-return">'+ico('undo')+'Return</button></div>':'')+
      '<button class="btn block" id="qs-open">Open item</button>');
    const q=$('#qs-q');
    $('#qs-open').onclick=()=>{closeModal();go('#item/'+it.id)};
    const dsb=$('#qs-dispatch');if(dsb)dsb.onclick=()=>{closeModal();ensureMarketThen(()=>startDispatch(it))};
    const rtb=$('#qs-return');if(rtb)rtb.onclick=()=>{closeModal();ensureMarketThen(()=>startReturn(it))};
    const apply=async dir=>{
      let n=round4(parseFloat(q.value));
      if(!(n>0)){toast('Enter how many','err');return}
      const old=+it.qty||0;
      if(dir<0&&n>old){beep(false);toast('Only '+fmtQty(old)+' in stock','err');return}
      const reason=$('#qs-r').value;
      const pick=await askRack(it,dir,n);       // replaces the scan popup, asks the rack question
      if(!pick)return;                          // closed — nothing changes, back to scanning
      const pf=pick.f;
      if(dir<0){const pp=pilesOf(it).find(p=>String(p.f||'')===String(pf||''));const cap=pp?pp.q:0;if(n>cap+1e-9){beep(false);toast('Only '+fmtQty(cap)+' in '+shelfName(pf),'err');return}}
      if(dir>0)pileAdd(it,pf,n);else pileDrain(it,n,pf);
      const nv=+it.qty||0;save('items');
      logTx(dir>0?'in':'out',{itemId:it.id,itemName:it.name,fromQ:old,toQ:nv,qty:n,reason:reason,detail:'Scan · '+reason+' · '+shelfName(pf)});
      updateBadges();beep(true);closeModal();
      toast((dir>0?'Added ':'Removed ')+fmtQty(n)+' in '+shelfName(pf)+' — '+it.name+' now '+fmtQty(nv),'ok');
    };
    $('#qs-out').onclick=()=>apply(-1);
    $('#qs-in').onclick=()=>apply(1);
  }
  function scanPick(l,code){
    const line=l.items.find(x=>{const it=iById(x.itemId);return it&&codeHit(it,code.toLowerCase())});
    if(!line){beep(false);$('#scanmsg').textContent='Not on this list: '+code;return}
    const it=iById(line.itemId);
    const cap=Math.min(line.need,(+it.qty||0));
    if(line.picked>=cap){beep(false);$('#scanmsg').textContent=(line.picked>=line.need?'Already fully picked':'No stock left')+' — '+it.name;return}
    line.picked=round4(line.picked+1);if(line.picked>cap)line.picked=cap;
    save('lists');beep(true);
    $('#scanmsg').textContent='Picked '+fmtQty(line.picked)+' / '+fmtQty(line.need)+' — '+it.name;
  }

  // camera (only when barcode machine is OFF)
  const video=$('#cam');const note=$('#camnote');
  const Detector=window.BarcodeDetector;
  if(!hw)(async()=>{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){if(note)note.textContent='Camera not available here — use manual entry or a USB/Bluetooth scanner (it types into the box above).';return}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      if(closed){stream.getTracks().forEach(t=>t.stop());return}
      video.srcObject=stream;
      scannerStop=()=>{closed=true;try{stream.getTracks().forEach(t=>t.stop())}catch(e){}};
      if(!Detector){note.textContent='Live decoding is not supported in this browser — camera is on for reference, but type the code manually or use Chrome on Android for auto-detect.';return}
      let formats=['qr_code','ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','codabar','data_matrix'];
      try{const sup=await Detector.getSupportedFormats();formats=formats.filter(f=>sup.includes(f))}catch(e){}
      const det=new Detector({formats});
      let busy=false;
      const loop=async()=>{
        if(closed)return;
        if(!busy&&video.readyState>=2){busy=true;
          try{const codes=await det.detect(video);if(codes&&codes.length&&codes[0].rawValue)handleCode(String(codes[0].rawValue).trim())}catch(e){}
          busy=false}
        setTimeout(()=>requestAnimationFrame(loop),180);
      };
      loop();
    }catch(err){
      note.innerHTML='Camera blocked or unavailable. If you are previewing inside Claude, <b>download this file</b> (More → About) and open it in Chrome on your phone — scanning works there. Manual entry and hardware scanners work everywhere.';
    }
  })();
}

}

const DAMAGED_FOLDER_NAME='Damaged Items';
function getMarket(){return (S.meta&&S.meta.market)||'dom'}
async function setMarket(m){S.meta.market=m;await saveNow('meta')}
function marketLabel(m){return (m||getMarket())==='intl'?'International':'Domestic'}
// per-item stock split across locations (only items sharing the same SKU/name live in one record,
// but the same product may exist as separate records in different folders — group by primary sku or name)
function stockSplit(item){
  if(!item)return [];
  const key=(item.sku||'').toLowerCase()||('name:'+(item.name||'').toLowerCase());
  const sibs=S.items.filter(x=>{
    const k=(x.sku||'').toLowerCase()||('name:'+(x.name||'').toLowerCase());
    return k===key;
  });
  return sibs.map(x=>({id:x.id,folder:x.folder,path:folderPath(x.folder),qty:+x.qty||0})).sort((a,b)=>b.qty-a.qty);
}
function damagedFolderId(){
  const f=S.folders.find(x=>x.name===DAMAGED_FOLDER_NAME&&!x.parent);
  return f?f.id:null;
}
async function ensureDamagedFolder(){
  let id=damagedFolderId();
  if(id)return id;
  const nf={id:uid('f'),name:DAMAGED_FOLDER_NAME,parent:null,createdAt:Date.now()};
  S.folders.push(nf);await saveNow('folders');
  return nf.id;
}
// find or create the record for an item within a specific folder (so damaged units sit together)
async function recordInFolder(srcItem,folderId){
  const key=(srcItem.sku||'').toLowerCase()||('name:'+(srcItem.name||'').toLowerCase());
  let rec=S.items.find(x=>{
    const k=(x.sku||'').toLowerCase()||('name:'+(x.name||'').toLowerCase());
    return k===key && (x.folder||null)===(folderId||null);
  });
  if(rec)return rec;
  // clone the source item record into that folder, qty 0
  rec=newItem(Object.assign({},JSON.parse(JSON.stringify(srcItem)),{id:uid('i'),folder:folderId,qty:0,thumb:srcItem.thumb||'',createdAt:Date.now(),updatedAt:Date.now()}));
  S.items.push(rec);
  return rec;
}

   DISPATCH — helpers
   ============================================================ */
async function nextDispatchNo(){
  const n=await nextSeq('ds');
  return 'DSP-'+String(n).padStart(4,'0');
}
// sales velocity: units dispatched per day over last N days, per item
function salesStats(days){
  const since=Date.now()-(days||30)*86400000;
  const m={};
  (S.dispatches||[]).forEach(d=>{
    if(d.ts<since)return;
    (d.lines||[]).forEach(ln=>{
      if(!ln.itemId)return;
      const e=m[ln.itemId]||(m[ln.itemId]={itemId:ln.itemId,name:ln.name||'',qty:0,orders:0,intl:0,dom:0});
      const q=+ln.qty||0;e.qty+=q;e.orders++;
      if(d.dest==='intl')e.intl+=q;else e.dom+=q;
    });
  });
  const arr=Object.values(m).map(e=>{
    const it=iById(e.itemId);
    const perDay=e.qty/(days||30);
    const stock=it?(+it.qty||0):0;
    const daysLeft=perDay>0?stock/perDay:Infinity;
    return Object.assign(e,{stock:stock,perDay:perDay,daysLeft:daysLeft,unit:it?it.unit:'',exists:!!it});
  });
  return arr;
}
function fmtBytes(b){b=+b||0;if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(b<10240?1:0)+' KB';if(b<1073741824)return (b/1048576).toFixed(b<10485760?1:0)+' MB';return (b/1073741824).toFixed(2)+' GB'}
// rough byte size of a base64 data-URL string
function dataUrlBytes(s){if(!s||typeof s!=='string')return 0;const i=s.indexOf(',');const b64=i>=0?s.slice(i+1):s;return Math.floor(b64.length*0.75)}
// estimate storage used; window in days (0/undefined = all-time). Walks dispatch photos + item thumbs + record JSON.
async function storageUsage(days){
  const since=days?Date.now()-days*86400000:0;
  let bytes=0, photos=0, records=0;
  // dispatch/return records + their photos
  for(const d of (S.dispatches||[])){
    if(d.ts<since)continue;
    records++;
    bytes+=JSON.stringify(d).length;
    const np=(d.lines||[]).filter(l=>l.hasPhoto).length;
    if(np){
      try{const arr=await store.get('p:dsp_'+d.id);if(arr&&arr.length){arr.forEach(p=>{bytes+=dataUrlBytes(p);photos++})}}catch(e){}
    }
  }
  // item thumbnails (count toward sync size) — only if within window by updatedAt
  (S.items||[]).forEach(i=>{ if((i.updatedAt||i.createdAt||0)>=since){ if(i.thumb){bytes+=dataUrlBytes(i.thumb)} } });
  return {bytes,photos,records};
}
function dispatchTotals(days){
  const since=Date.now()-(days||30)*86400000;
  let orders=0,units=0,intl=0,dom=0;
  (S.dispatches||[]).forEach(d=>{if(d.ts<since)return;orders++;(d.lines||[]).forEach(l=>{const q=+l.qty||0;units+=q;if(d.dest==='intl')intl+=q;else dom+=q})});
  return {orders,units,intl,dom};
}

function addLineToList(l,i,n){
  if(!l)return;
  const ex=l.items.find(x=>x.itemId===i.id);
  if(ex)ex.need=round4((+ex.need||0)+(n||1));
  else l.items.push({itemId:i.id,need:n||1,picked:0});

}
function vList(id){
  const l=S.lists.find(x=>x.id===id);
  if(!l){toast('Pick list not found','err');go('#flows/pick');return}
  const ro=l.status==='completed';

/* ---------- purchase orders ---------- */
/* -------- Auto purchase orders (min-stock reorder) --------
   Items ticked "auto-add to PO" that fall to/below their min are
   collected into one draft PO named by AUTO_PO flag. An item already
   sitting on ANY not-yet-received PO is not added again. */
// PO overdue: expected date passed and goods not fully received
function poIsOverdue(p){if(!p||!p.expected||p.status==='received')return false;const d=new Date(p.expected+'T23:59:59');return Date.now()>d.getTime()}
function poDaysLate(p){return Math.max(1,Math.floor((Date.now()-new Date(p.expected+'T23:59:59').getTime())/86400000))}
function overduePOs(){return (S.pos||[]).filter(poIsOverdue)}
const PO_SNOOZE_KEY='invento_po_snooze',PO_SNOOZE_MS=2*86400000;
function maybePoOverduePopup(){
  const od=overduePOs();if(!od.length)return;
  let last=0;try{last=+localStorage.getItem(PO_SNOOZE_KEY)||0}catch(e){}
  if(Date.now()-last<PO_SNOOZE_MS)return;
  try{localStorage.setItem(PO_SNOOZE_KEY,String(Date.now()))}catch(e){}
  openModal('<h3 style="color:var(--red)">'+ico('alert')+' Purchase order'+(od.length>1?'s':'')+' overdue</h3>'+
    '<p class="sub mb">'+od.length+' PO'+(od.length>1?'s are':' is')+' past the expected date and not fully received. Chase the vendor or update the date.</p>'+
    od.map(p=>'<button class="pocard late" data-gopo="'+p.id+'" style="margin-bottom:8px"><div class="po-t">'+esc(p.number)+(p.priority==='high'?'<span class="pill danger">HIGH</span>':'')+'</div><div class="po-m">'+(p.vendor?esc(p.vendor)+' · ':'')+'<span class="po-due over">was due '+poDaysLate(p)+' day'+(poDaysLate(p)>1?'s':'')+' ago</span></div></button>').join('')+
    '<button class="btn block mt" onclick="closeModal()">'+ico('check')+'Remind me in 2 days</button>');
  $$('#modal [data-gopo]').forEach(b=>b.onclick=()=>{closeModal();go('#po/'+b.dataset.gopo)});
}
let _apoT=null;
function scheduleAutoPO(){clearTimeout(_apoT);_apoT=setTimeout(()=>{autoPOSweep().catch(()=>{})},900)}
function itemOnOpenPO(itemId){return S.pos.some(p=>p.status!=='received'&&(p.items||[]).some(x=>x.itemId===itemId))}
async function autoPOSweep(){
  if(!can('additem')&&!isAdminU())return; // needs write perms to create POs
  const due=S.items.filter(i=>i.autoPO&&(+i.min>0)&&((+i.qty||0)<=(+i.min))&&!itemOnOpenPO(i.id));
  if(!due.length)return;
  let p=S.pos.find(x=>x.auto&&x.status==='draft');
  if(!p){
    const n=await nextSeq('po');
    p={id:uid('p'),number:'PO-'+String(n).padStart(4,'0'),vendor:'',expected:'',status:'draft',priority:'low',auto:true,items:[],notes:'Auto-created from low stock',createdAt:Date.now(),updatedAt:Date.now()};
    S.pos.unshift(p);
  }
  due.forEach(i=>{
    const need=Math.max(round4((+i.min)-(+i.qty||0)),1);
    p.items.push({itemId:i.id,name:i.name,qty:need,cost:+i.cost||0,received:0,auto:true});
  });
  p.updatedAt=Date.now();
  await saveNow('pos');if(MODE!=='cloud')save('meta');
  logTx('po',{detail:due.length+' low-stock item'+(due.length>1?'s':'')+' auto-added to '+p.number});
  toast(due.length+' low-stock item'+(due.length>1?'s':'')+' added to '+p.number,'ok');
}
/* ---------------- RECOVERY POINTS (15-day snapshots) ---------------- */
const BK_DAYS=15,BK_KEEP=6,BK_CHUNK=700000;
function bkSummary(sinceTs){
  const t=(S.txns||[]).filter(x=>x.ts>sinceTs);
  const c=a=>t.filter(x=>x.act===a).length;
  const parts=[];
  const add=c('created'),del=c('deleted')+c('trashed');
  if(add)parts.push(add+' items added');if(del)parts.push(del+' deleted');
  const inn=c('in')+c('received'),out=c('out');
  if(inn)parts.push(inn+' stock-in');if(out)parts.push(out+' stock-out');
  const dp=c('dispatch');if(dp)parts.push(dp+' dispatches');
  const mv=c('moved');if(mv)parts.push(mv+' moves');
  return parts.length?parts.join(' · '):'No recorded changes';
}
function bkPayload(){return JSON.stringify({v:1,ts:Date.now(),meta:S.meta,items:S.items,folders:S.folders,lists:S.lists,pos:S.pos,dispatches:S.dispatches,awbs:S.awbs,approvals:S.approvals})}
async function bkList(){
  if(MODE==='cloud'){const q=await db.collection('backups').where('part','==',0).get();return q.docs.map(d=>d.data()).sort((a,b)=>b.ts-a.ts)}
  const ix=await store.get('bkindex')||[];return ix.sort((a,b)=>b.ts-a.ts);
}
async function createRecoveryPoint(auto){
  const list=await bkList();
  const last=list[0]?list[0].ts:0;
  const sum=bkSummary(last);
  const id='bk'+Date.now();
  const data=bkPayload();
  const parts=[];for(let i=0;i<data.length;i+=BK_CHUNK)parts.push(data.slice(i,i+BK_CHUNK));
  if(MODE==='cloud'){
    for(let i=0;i<parts.length;i++)
      await db.collection('backups').doc(id+'_'+i).set({id:id,part:i,of:parts.length,ts:Date.now(),by:userName(),summary:i===0?sum:'',size:data.length,data:parts[i]});
    // retention
    const all=await bkList();
    for(const b of all.slice(BK_KEEP)){for(let i=0;i<(b.of||1);i++){try{await db.collection('backups').doc(b.id+'_'+i).delete()}catch(e){}}}
  } else {
    await store.set('bk:'+id,data);
    const ix=(await store.get('bkindex')||[]);ix.push({id:id,part:0,of:1,ts:Date.now(),by:userName(),summary:sum,size:data.length});
    while(ix.length>BK_KEEP){const o=ix.sort((a,b)=>a.ts-b.ts).shift();try{await store.set('bk:'+o.id,null)}catch(e){}}
    await store.set('bkindex',ix);
  }
  logTx('list',{detail:'Recovery point created'+(auto?' (auto)':'')});
  if(!auto)toast('Recovery point saved','ok');else toast('15-day recovery point saved automatically','ok');
}
async function bkFetch(b){
  if(MODE!=='cloud')return await store.get('bk:'+b.id);
  let s='';
  for(let i=0;i<(b.of||1);i++){const d=await db.collection('backups').doc(b.id+'_'+i).get();s+=(d.exists?(d.data().data||''):'')}
  return s;
}
async function restoreRecovery(b){
  const ok=await confirmDlg('Restore this point?','Data goes back to '+fmtDT(b.ts)+'. Current data is saved as a new recovery point first, so nothing is lost.','Restore',true);
  if(!ok)return;
  try{
    await createRecoveryPoint(false); // safety net of "now"
    const raw=await bkFetch(b);if(!raw){toast('Could not read that recovery point','err');return}
    const d=JSON.parse(raw);
    S.meta=Object.assign(DEFAULT_META(),d.meta||{});S.items=d.items||[];S.folders=d.folders||[];S.lists=d.lists||[];S.pos=d.pos||[];S.dispatches=d.dispatches||[];S.awbs=d.awbs||[];S.approvals=d.approvals||[];
    await Promise.all(['meta','items','folders','lists','pos','dispatches','awbs','approvals'].map(saveNow));
    logTx('list',{detail:'Restored recovery point of '+fmtDT(b.ts)});
    toast('Restored','ok');go('#home');
  }catch(e){toast('Restore failed: '+((e&&e.code)||e),'err')}
}

function vDash(days){
  if(!isAdminU()){go('#more');return}
  days=+days||30;const since=Date.now()-days*86400000;
  topTitle('Dashboard','#more');
  const OUT=['out','dispatch'];
  const t=(S.txns||[]).filter(x=>x.ts>=since);
  const disp=t.filter(x=>x.act==='dispatch');
  const outUnits=t.filter(x=>OUT.indexOf(x.act)>=0).reduce((a,x)=>a+(+x.qty||0),0);
  const totUnits=S.items.reduce((a,i)=>a+(+i.qty||0),0);
  const totVal=S.items.reduce((a,i)=>a+itemValue(i),0);
  // best sellers
  const per={};t.forEach(x=>{if(OUT.indexOf(x.act)>=0&&x.itemId)per[x.itemId]=(per[x.itemId]||0)+(+x.qty||0)});
  const best=Object.entries(per).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([id,q])=>({i:iById(id),q})).filter(x=>x.i);
  // reorder list
  const reord=S.items.filter(i=>(+i.min>0)&&(+i.qty||0)<=(+i.min)).map(i=>({i,short:Math.max(1,round4((+i.min)-(+i.qty||0))),onPO:itemOnOpenPO(i.id)})).sort((a,b)=>b.short-a.short);
  // fast movers running out
  const risk=Object.entries(per).map(([id,q])=>{const i=iById(id);if(!i)return null;const v=q/days;const cov=v>0?(+i.qty||0)/v:1e9;return {i,cov,v}}).filter(x=>x&&x.cov<=10&&x.v>0).sort((a,b)=>a.cov-b.cov).slice(0,8);
  // team
  const who={};t.forEach(x=>{if(x.act==='dispatch')who[x.user]=(who[x.user]||0)+1});
  const team=Object.entries(who).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const kpi=(l,v,s)=>'<div class="card pad" style="flex:1 1 45%"><div class="eyebrow">'+l+'</div><div style="font-weight:800;font-size:21px" class="num">'+v+'</div>'+(s?'<div class="small muted">'+s+'</div>':'')+'</div>';
  let h='<h1 class="page">Dashboard</h1>';
  h+='<div class="seg mb" id="dh-p">'+[7,30,90].map(d=>'<button data-d="'+d+'" class="'+(d===days?'on':'')+'">'+d+' days</button>').join('')+'</div>';
  h+='<div class="row wrap mb" style="gap:9px">'+kpi('Dispatches',disp.length,'last '+days+'d')+kpi('Units out',fmtQty(outUnits),'last '+days+'d')+kpi('Items',S.items.length,fmtQty(totUnits)+' units in stock')+kpi('Stock value',fmtMoney(totVal,0),'')+'</div>';
  h+='<div class="card pad mb"><div class="eyebrow mb">Best selling · '+days+'d</div>'+(best.length?best.map((x,n)=>'<div class="row" style="padding:5px 0;border-bottom:1px solid var(--line2)"><span class="muted small" style="width:20px">'+(n+1)+'</span><span class="grow ellip" style="font-weight:600">'+esc(x.i.name)+'</span><b class="num">'+fmtQty(x.q)+'</b></div>').join(''):'<div class="sub">No sales recorded in this period.</div>')+'</div>';
  h+='<div class="card pad mb" style="border-left:4px solid var(--red)"><div class="eyebrow mb" style="color:var(--red)">Running out fast</div>'+(risk.length?risk.map(x=>'<div class="row" style="padding:5px 0;border-bottom:1px solid var(--line2)"><span class="grow ellip" style="font-weight:600">'+esc(x.i.name)+'</span><span class="small" style="color:var(--red);font-weight:700">≈'+(x.cov<1?'<1':Math.round(x.cov))+' days left</span></div>').join('')+'<div class="hint mt">Based on this period\'s selling speed vs current stock.</div>':'<div class="sub">Nothing at risk at current speed.</div>')+'</div>';
  h+='<div class="card pad mb" style="border-left:4px solid var(--amber)"><div class="eyebrow mb" style="color:var(--amber)">Should be ordered (below min)</div>'+(reord.length?reord.slice(0,10).map(x=>'<div class="row" style="padding:5px 0;border-bottom:1px solid var(--line2)"><span class="grow ellip" style="font-weight:600">'+esc(x.i.name)+'</span><span class="small num">'+fmtQty(x.i.qty)+'/'+fmtQty(x.i.min)+(x.onPO?' · <span style="color:var(--green)">on PO</span>':' · need '+fmtQty(x.short))+'</span></div>').join('')+(reord.length>10?'<div class="small muted mt">+'+(reord.length-10)+' more in Low stock</div>':''):'<div class="sub">Nothing below minimum. </div>')+'</div>';
  h+='<div class="card pad mb"><div class="eyebrow mb">Dispatches by person · '+days+'d</div>'+(team.length?team.map(x=>'<div class="row" style="padding:4px 0"><span class="grow">'+esc(x[0])+'</span><b class="num">'+x[1]+'</b></div>').join(''):'<div class="sub">No dispatches in this period.</div>')+'</div>';
  $('#main').innerHTML=h;
  $$('#dh-p button').forEach(b=>b.onclick=()=>vDash(+b.dataset.d));
}
function vBackups(){
