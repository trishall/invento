  topTitle('Recovery points','#more');
  $('#main').innerHTML='<h1 class="page">Recovery points</h1><p class="sub mb">A snapshot is taken automatically every '+BK_DAYS+' days (keeps last '+BK_KEEP+'). Restore rolls data back; the current state is snapshotted first so nothing is lost. Photos are not included.</p>'+
    '<button class="btn pri block mb" id="bk-now">'+ico('check')+'Create recovery point now</button><div id="bk-list"><div class="skel" style="height:64px"></div></div>';
  $('#bk-now').onclick=async()=>{$('#bk-now').disabled=true;try{await createRecoveryPoint(false)}catch(e){toast('Failed: '+((e&&e.code)||e),'err')}vBackups()};
  (async()=>{
    let list=[];try{list=await bkList()}catch(e){}
    const w=$('#bk-list');if(!w)return;
    if(!list.length){w.innerHTML='<div class="empty">'+ico('inbox')+'<div class="t">No recovery points yet</div><div class="s">Tap the button above to create the first one.</div></div>';return}

    $$('#bk-list [data-bkr]').forEach(x=>x.onclick=()=>{const b=list.find(y=>y.id===x.dataset.bkr);if(b)restoreRecovery(b)});
    $$('#bk-list [data-bkd]').forEach(x=>x.onclick=async()=>{const b=list.find(y=>y.id===x.dataset.bkd);const raw=await bkFetch(b);download('invento-recovery-'+new Date(b.ts).toISOString().slice(0,10)+'.json',raw,'application/json')});
    $$('#bk-list [data-bkx]').forEach(x=>x.onclick=async()=>{const b=list.find(y=>y.id===x.dataset.bkx);const ok=await confirmDlg('Delete this recovery point?',fmtDT(b.ts),'Delete',true);if(!ok)return;
      if(MODE==='cloud'){for(let i=0;i<(b.of||1);i++){try{await db.collection('backups').doc(b.id+'_'+i).delete()}catch(e){}}}
      else{const ix=(await store.get('bkindex')||[]).filter(y=>y.id!==b.id);await store.set('bkindex',ix);await store.set('bk:'+b.id,null)}
      toast('Deleted');vBackups()});
  })();

async function autoRecoveryCheck(){
  try{
    if(!isAdminU())return;
    const list=await bkList();
    if(!list.length||Date.now()-list[0].ts>BK_DAYS*86400000)await createRecoveryPoint(true);
  }catch(e){}
}
async function createPO(){
  const n=await nextSeq('po');
  const p={id:uid('p'),number:'PO-'+String(n).padStart(4,'0'),vendor:'',expected:'',status:'draft',priority:'low',items:[],notes:'',createdAt:Date.now(),updatedAt:Date.now()};
  S.pos.unshift(p);await saveNow('pos');if(MODE!=='cloud')save('meta');
  logTx('po',{detail:'Created '+p.number});
  return p.id;
}
function addLineToPO(p,i,n){
  if(!p)return;
  const ex=p.items.find(x=>x.itemId===i.id);
  if(ex)ex.qty=round4((+ex.qty||0)+(n||1));
  else p.items.push({itemId:i.id,qty:n||1,cost:+i.cost||0,received:0});
  p.updatedAt=Date.now();
}
function poVendors(){const m={};S.pos.forEach(p=>{if(p.vendor)m[p.vendor.trim()]=1});return Object.keys(m).sort()}

/* ============================================================
   CSV HELPERS
   ============================================================ */
function buildCSV(rows){
  return rows.map(r=>r.map(c=>{
    // formula-injection guard: only for values that were strings (never numbers),
    // so qty/price columns stay clean. Leading = + - @ or tab/CR would execute
    // as a formula in Excel/Sheets — prefix with ' to force plain text.
    const wasString=(typeof c==='string');
    c=(c==null)?'':String(c);
    if(wasString&&/^[=+\-@\t\r]/.test(c))c="'"+c;
    return /[",\n\r]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;
  }).join(',')).join('\r\n');
}
function parseCSV(text){
  const rows=[];let row=[],cur='',inQ=false;
  text=String(text).replace(/^\uFEFF/,'');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++}else inQ=false}
      else cur+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===','){row.push(cur);cur=''}
      else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(cur);cur='';if(row.length>1||row[0]!=='')rows.push(row);row=[]}
      else cur+=ch;
    }
  }
  if(cur!==''||row.length){row.push(cur);if(row.length>1||row[0]!=='')rows.push(row)}
  return rows;
}
function exportItemsCSV(its){
  const rows=[['Name','Location','Quantity','Unit','Price','Cost','Min quantity','SKU','Barcode','Other SKUs','Tags','Notes','Image URL','Value','Updated']];
  its.forEach(i=>rows.push([i.name,pileSummary(i),i.qty,i.unit,i.price,i.cost,i.min,i.sku,i.code,(i.alt||[]).join('; '),(i.tags||[]).join('; '),i.notes,i.img||'',itemValue(i),new Date(i.updatedAt).toISOString()]));
  download('invento-items-'+new Date().toISOString().slice(0,10)+'.csv',buildCSV(rows),'text/csv');
  logTx('export',{detail:its.length+' items to CSV'});
  toast('CSV downloaded','ok');
}

/* ============================================================
   UNICOMMERCE — Inventory Adjustment export sheet
   Matches Uniware "Inventory Adjustment" import columns:
   Product Code*, Quantity*, Shelf Code*, Adjustment Type*,
   Inventory Type, Transfer to Shelf Code, Sla, Source Batch Code,
   Remarks, Force Allocate.
   Adjustment Type: ADD | REMOVE | REPLACE | TRANSFER
   Inventory Type: GOOD_INVENTORY | BAD_INVENTORY | QC_REJECTED | VIRTUAL_INVENTORY
   ============================================================ */
// Uniware SKU: 3-45 chars, allowed specials - . _ / ; no spaces
function uniSkuIssue(sku){
  sku=String(sku||'').trim();
  if(!sku)return 'missing SKU';
  if(sku.length<3)return 'SKU under 3 chars';
  if(sku.length>45)return 'SKU over 45 chars';
  if(/\s/.test(sku))return 'SKU has a space';
  if(/[^A-Za-z0-9._/\-]/.test(sku))return 'SKU has an unsupported symbol';
  return '';
}
// immediate location name for an item = the shelf code Uniware expects (e.g. R5C12)
function shelfCodeFor(i){const f=fById(i.folder);return f?f.name:'DEFAULT'}
// qty-affecting activity acts
const UNI_QTY_ACTS=['created','in','out','adjusted','received','picked','moved','cloned','imported','restored'];
// Step-by-step guide for uploading the sheet into Uniware (from the Unicommerce process guide)
function uniUploadGuideHTML(fileName,adjNote){
  return '<div class="card pad" style="background:var(--saddle-bg);border:1px solid var(--saddle)">'+
    '<div class="eyebrow" style="color:var(--saddle)">Next: upload in Unicommerce</div>'+
    '<div style="font-weight:800;margin:4px 0 2px">Uniware → Tools → Import → <span style="color:var(--saddle)">Inventory Adjustment</span></div>'+
    '<ol style="margin:8px 0 0;padding-left:20px;line-height:1.7;font-size:14px">'+
      '<li>Log in at <b>mahetriprivatelimited.unicommerce.com</b></li>'+
      '<li>Top menu: <b>Tools → Import</b></li>'+
      '<li>Choose <b>Inventory Adjustment</b></li>'+
      '<li>Click <b>Upload File</b> and pick <b>'+esc(fileName)+'</b> (in your Downloads)</li>'+
      '<li>Submit, then open <b>Review import results</b> to confirm every row passed</li>'+
    '</ol>'+
    '<div class="hint" style="margin-top:8px">'+esc(adjNote)+' Shelf Codes must already exist in Uniware (Products → create shelf codes). Rows with a shelf Uniware doesn\'t know will show in the import result — create the shelf, then re-upload just those.</div>'+
    '</div>';
}
function exportUnicommerce(){
  if(!can('export')){toast('You do not have permission to export','err');return}
  openModal('<h3>Export to Unicommerce</h3>'+
    '<p class="sub mb">Builds an <b>Inventory Adjustment</b> CSV. After download, upload it in Uniware → <b>Tools → Import → Inventory Adjustment</b> (step-by-step shown after export).</p>'+
    '<div class="field"><label>Include changes from</label><select class="in" id="uni-days"><option value="1">Last 1 day</option><option value="2">Last 2 days</option><option value="7" selected>Last 7 days</option><option value="30">Last 30 days</option><option value="0">Everything (all current stock)</option></select></div>'+
    '<div class="field"><label>How to write the stock</label><select class="in" id="uni-mode"><option value="replace" selected>Set Uniware to current stock (REPLACE) — safe to re-run</option><option value="delta">Only the change (ADD / REMOVE)</option></select></div>'+
    '<div class="field"><label>Which items</label><select class="in" id="uni-scope"><option value="__all__">All warehouses</option>'+warehouses().map(w=>'<option value="'+w.id+'">'+esc(w.name)+'</option>').join('')+'</select></div>'+
    '<div class="hint">Only items whose stock changed in the chosen period are included, so the sheet stays small. Shelf Code uses each item\'s location (e.g. R5C12) — those shelves must exist in Uniware. SKUs need 3–45 chars, no spaces.</div>'+
    '<button class="btn pri block mt" id="uni-go">'+ico('down')+'Build adjustment CSV</button>');
  $('#uni-go').onclick=()=>{
    const days=parseInt($('#uni-days').value);
    const mode=$('#uni-mode').value;
    const scope=$('#uni-scope').value;
    const since=days?Date.now()-days*86400000:0;
    let pool=scope==='__all__'?S.items.slice():itemsInTree(scope);
    const poolIds=new Set(pool.map(i=>i.id));
    // which items changed in the window
    let changedIds;
    if(!days){changedIds=new Set(pool.map(i=>i.id));} // everything
    else{
      changedIds=new Set();
      (S.txns||[]).forEach(t=>{ if(t.ts>=since && t.itemId && poolIds.has(t.itemId) && UNI_QTY_ACTS.includes(t.act)) changedIds.add(t.itemId); });
    }
    // for delta mode, net change per item over window
    const delta={};
    if(mode==='delta' && days){
      (S.txns||[]).forEach(t=>{ if(t.ts>=since && t.itemId && changedIds.has(t.itemId) && t.toQ!=null && t.fromQ!=null){ delta[t.itemId]=(delta[t.itemId]||0)+((+t.toQ||0)-(+t.fromQ||0)); } });
    }
    const cols=['Product Code*','Quantity*','Shelf Code*','Adjustment Type*','Inventory Type','Transfer to Shelf Code','Sla','Source Batch Code','Remarks','Force Allocate'];
    const rows=[cols];
    const problems=[];
    let n=0;
    const stamp=new Date().toISOString().slice(0,10);
    Array.from(changedIds).forEach(id=>{
      const i=iById(id);if(!i)return;
      const sku=(i.sku||i.code||'').trim();
      const issue=uniSkuIssue(sku);
      if(issue){problems.push((i.name||'(no name)')+' — '+issue+(sku?' ['+sku+']':''));return}
      let adjType,qty;
      if(mode==='delta' && days){
        const d=delta[id]||0;
        if(!d)return; // no net change → nothing to write
        adjType=d>0?'ADD':'REMOVE';
        qty=Math.abs(round4(d));
      } else {
        /* REPLACE: one row PER RACK so Uniware mirrors the shelf-wise split */
        pilesOf(i).forEach(p=>{
          rows.push([sku,round4(p.q),shelfName(p.f)||'DEFAULT','REPLACE','','','','','Invento sync '+stamp,'']);
          n++;
        });
        return;
      }
      rows.push([sku,qty,shelfCodeFor(i),adjType,'','','','','Invento sync '+stamp,'']);
      n++;
    });
    if(!n){closeModal();toast('No stock changes in that period','err');if(problems.length)setTimeout(()=>alert('SKU problems:\n'+problems.join('\n')),50);return}
    download('unicommerce-inventory-'+stamp+'.csv',buildCSV(rows),'text/csv');
    logTx('export',{detail:n+' items → Unicommerce inventory CSV ('+(days?('last '+days+'d'):'all')+')'});
    closeModal();
    const fileName='unicommerce-inventory-'+stamp+'.csv';
    const adjNote=mode==='delta'?'This sheet uses ADD / REMOVE (only the change since last sync).':'This sheet uses REPLACE (sets Uniware to Invento\'s current stock) — safe to upload again anytime.';
    toast(n+' items exported'+(problems.length?' · '+problems.length+' skipped':''),'ok');
    openModal('<h3>'+n+' rows exported '+ico('check')+'</h3><p class="sub mb">Saved <b>'+esc(fileName)+'</b> to your device.</p>'+
      uniUploadGuideHTML(fileName,adjNote)+
      (problems.length?'<details class="mt"><summary class="small muted">'+problems.length+' item'+(problems.length>1?'s were':' was')+' skipped (SKU issues) — show</summary><div class="card" style="padding:8px 12px;max-height:32dvh;overflow:auto;margin-top:6px"><div class="hist" style="font-size:13px">'+problems.map(p=>'<div style="padding:4px 0;border-bottom:1px solid var(--line2)">'+esc(p)+'</div>').join('')+'</div></div></details>':'')+
      '<button class="btn pri block mt" onclick="closeModal()">Done</button>');
  };
}

    function rowsFor(){

      }).map(t=>{
        const isIn=t.act==='in'||t.act==='received';
        const q=t.qty!=null?+t.qty:Math.abs((+t.toQ||0)-(+t.fromQ||0));
        return {ts:t.ts,dir:isIn?'in':'out',name:t.itemName||'',qty:q,reason:t.reason||t.detail||(t.act==='received'?'Received (PO)':t.act==='picked'?'Picked':''),user:t.user||'',balance:t.toQ};
      });
    }
    function bodyFor(){
      const rs=rowsFor();
      if(!rs.length)return '<div class="empty">'+ico('move')+'<div class="t">No movements in this period</div><div class="s">Add or remove stock from an item — each movement is recorded here with its reason.</div></div>';
      const tin=sum(rs.filter(x=>x.dir==='in'),x=>x.qty),tout=sum(rs.filter(x=>x.dir==='out'),x=>x.qty);
      let b='<div class="stats mb"><div class="stat"><div class="n num" style="color:var(--green)">+'+fmtQty(tin)+'</div><div class="l">Total in</div></div><div class="stat"><div class="n num" style="color:var(--red)">−'+fmtQty(tout)+'</div><div class="l">Total out</div></div></div>';
      b+='<div class="tablewrap"><table class="t"><thead><tr><th>When</th><th>Item</th><th>Direction</th><th>Reason</th><th class="r">Qty</th><th>By</th></tr></thead><tbody>';
      rs.slice(0,300).forEach(x=>{b+='<tr><td class="small">'+esc(fmtDate(x.ts))+'</td><td>'+esc(x.name)+'</td><td>'+(x.dir==='in'?'<span class="pill ok">In</span>':'<span class="pill low">Out</span>')+'</td><td class="small">'+esc(x.reason)+'</td><td class="r num" style="font-weight:700;color:'+(x.dir==='in'?'var(--green)':'var(--red)')+'">'+(x.dir==='in'?'+':'−')+fmtQty(x.qty)+'</td><td class="small">'+esc(x.user)+'</td></tr>'});
      b+='</tbody></table></div>'+(rs.length>300?'<div class="sub mt">Showing first 300 of '+rs.length+' — use CSV for everything.</div>':'');
      return b;
    }
    shell('Stock movements',controls,bodyFor(),
      ()=>{const rs=rowsFor();printTable('Stock movements','Last '+period+' days'+(dir?' · '+dir:''),[['When'],['Item'],['Direction'],['Reason'],['Qty',1],['By']],rs.map(x=>[fmtDate(x.ts),x.name,x.dir==='in'?'IN':'OUT',x.reason,(x.dir==='in'?'+':'-')+fmtQty(x.qty),x.user]))},
      ()=>{const rs=rowsFor();const rows=[['Date','Item','Direction','Reason','Qty','Balance after','By']];rs.forEach(x=>rows.push([new Date(x.ts).toISOString(),x.name,x.dir,x.reason,x.qty,x.balance,x.user]));download('stock-movements.csv',buildCSV(rows),'text/csv');logTx('export',{detail:'Stock movements CSV'})});
    $('#rm-p').onchange=e=>{period=+e.target.value;$('#rep-body').innerHTML=bodyFor()};
    $('#rm-d').onchange=e=>{dir=e.target.value;$('#rep-body').innerHTML=bodyFor()};
  }
  else go('#reports');
}

function vImport(){
  if(!can('export')){toast('You do not have permission to import','err');go('#more');return}
  topTitle('Import CSV','#more');
  $('#main').innerHTML='<h1 class="page">Import items from CSV</h1>'+
    '<div class="card pad mb"><p class="sub" style="margin-bottom:10px">Minimum columns: <b>Name</b> and <b>Quantity</b>. Also understood: '+locTerm()+', Unit, Price, Cost (USD), Min, SKU, Barcode, Tags, Notes. Headers are matched automatically — export from Excel or Sheets as CSV.</p>'+
    '<div class="dz" id="imp-dz">'+ico('csv')+'<div style="margin-top:8px;font-weight:700;color:var(--ink)">Choose a CSV file</div><div class="small" style="margin-top:3px">or drop it here</div></div>'+
    '<input type="file" id="imp-f" accept=".csv,text/csv" style="display:none"></div>'+
    '<div class="card pad mb"><div class="row" style="gap:12px;align-items:center"><span class="th" style="background:var(--saddle-bg);color:var(--saddle);flex:0 0 auto">'+ico('down')+'</span><div class="grow"><div style="font-weight:700;font-size:14px">Not sure of the format?</div><div class="small muted">Download a ready-to-fill template with the right headers and example rows.</div></div><button class="btn sm" id="imp-tpl">'+ico('csv')+'Template</button></div></div>'+
    '<div id="imp-stage"></div>';
  const fin=$('#imp-f'),dz=$('#imp-dz');
  dz.onclick=()=>fin.click();
  dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='var(--saddle)'};
  dz.ondragleave=()=>{dz.style.borderColor=''};
  dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';const f=e.dataTransfer.files[0];if(f)readFile(f)};
  fin.onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)readFile(f)};
  $('#imp-tpl').onclick=()=>{
    const headers=['Name','Quantity','Unit',locTerm(),'Price','Cost (USD)','Min quantity','SKU','Barcode','Other SKUs','Tags','Notes','Image URL'];
    const sample=[
      ['Leather Duffle — Vintage Brown','12','pcs','Workshop','7999','45','3','CLB-DUF-201','CLB-DUF-201','ETSY-DUF-201','duffle; bestseller','Full-grain, 22 inch'],
      ['Bifold Wallet — Black','40','pcs','Shelf A','1299','5','10','CLB-WAL-101','CLB-WAL-101','','wallet','Buffalo leather'],
      ['Raw Hide — Tan','25','sq.ft','Godown','','2.5','','RAW-TAN-01','','','material','Per square foot']
    ];
    const csv=buildCSV([headers].concat(sample));
    download('invento-import-template.csv',csv,'text/csv');
    toast('Template downloaded — fill it and import','ok');
  };
  function readFile(f){
    const r=new FileReader();
    r.onload=()=>prep(String(r.result));
    r.onerror=()=>toast('Could not read file','err');
    r.readAsText(f);
  }
  const ALIAS={name:['name','item','itemname','item name','product','title','product name'],qty:['quantity','qty','stock','units','onhand','on hand','count'],folder:['folder','location','godown','warehouse','shelf','place'],unit:['unit','uom'],price:['price','sell','sale price','selling price','mrp','rate'],cost:['cost','cost (usd)','cost usd','buy','purchase','purchase price','cost price'],min:['min','minimum','min qty','min quantity','minimum quantity','reorder','reorder level','low stock'],sku:['sku','item code','code no','article'],code:['barcode','qr','code','barcode value','ean','upc'],alt:['other skus','alt skus','alt','more skus','barcodes'],tags:['tags','tag','labels','category','categories'],notes:['notes','note','description','remarks','desc'],img:['image url','image','img','image link','photo url','picture']};
  function prep(text){
    const rows=parseCSV(text);
    if(rows.length<2){toast('File needs a header row and at least one data row','err');return}
    const head=rows[0].map(h=>String(h).trim().toLowerCase());
    const col={};
    Object.keys(ALIAS).forEach(k=>{const ix=head.findIndex(h=>ALIAS[k].includes(h));if(ix>=0&&!(k==='code'&&col.sku===ix))col[k]=ix});
    if(col.name==null||col.qty==null){toast('Could not find Name and Quantity columns','err');return}
    const data=rows.slice(1),errs=[];
    const parsed=data.map((rw,ix)=>{
      const name=String(rw[col.name]||'').trim();
      const qty=round4(parseFloat(rw[col.qty]));
      if(!name){errs.push('Row '+(ix+2)+': missing name');return null}
      if(isNaN(qty)){errs.push('Row '+(ix+2)+': quantity is not a number');return null}
      const g=k=>(col[k]!=null?String(rw[col[k]]||'').trim():'');
      return{name:name,qty:qty,folderName:g('folder'),unit:g('unit')||'pcs',price:g('price'),cost:g('cost'),min:g('min'),sku:g('sku'),code:g('code')||g('sku'),img:g('img'),alt:g('alt').split(/[;,]/).map(s=>s.trim()).filter(Boolean),tags:g('tags').split(/[;,]/).map(s=>s.trim()).filter(Boolean),notes:g('notes')};
    }).filter(Boolean);
    const dups=parsed.filter(p=>p.sku&&S.items.some(i=>i.sku===p.sku)).length;
    const nameIndex={};S.items.forEach(i=>{const k=(i.name||'').trim().toLowerCase();if(k&&!(k in nameIndex))nameIndex[k]=i.id;});
    const skuMatch=p=>p.sku&&S.items.some(i=>skusOf(i).some(s=>String(s).toLowerCase()===String(p.sku).toLowerCase()));
    const nameDups=parsed.filter(p=>!skuMatch(p)&&nameIndex[(p.name||'').trim().toLowerCase()]!=null).length;
    let h='<div class="card pad mb"><div class="eyebrow" style="margin-bottom:8px">Ready to import</div>'+
      '<div class="kv" style="border:none;padding:0;background:transparent;gap:0 14px"><div><div class="k">Valid rows</div><div class="v num">'+parsed.length+'</div></div><div><div class="k">Skipped rows</div><div class="v num">'+errs.length+'</div></div></div>'+
      (dups?'<div class="field mt"><label>'+dups+' rows match existing SKUs</label><select class="in" id="imp-dup"><option value="update">Update existing items (qty &amp; details)</option><option value="skip">Skip them</option><option value="create">Create as new items anyway</option></select></div>':'')+
      (nameDups?'<div class="field mt"><label>'+nameDups+' rows match an existing item by <b>name</b> (different SKU)</label><select class="in" id="imp-namedup"><option value="update">Update that item (change its SKU too) — avoids duplicates</option><option value="create">Create as new item</option><option value="skip">Skip them</option></select><div class="hint">Use “Update” when it’s the same product with a corrected SKU. Use “Create new” only if these are genuinely different products that happen to share a name.</div></div>':'')+
      (errs.length?'<details class="mt small muted"><summary>Show skipped rows</summary><div style="margin-top:6px">'+errs.slice(0,30).map(esc).join('<br>')+(errs.length>30?'<br>…':'')+'</div></details>':'')+
      '<button class="btn pri block mt" id="imp-go">'+ico('check')+'Import '+parsed.length+' items</button></div>';
    h+='<div class="tablewrap"><table class="t"><thead><tr><th>Name</th><th>'+locTerm()+'</th><th class="r">Qty</th><th>SKU</th></tr></thead><tbody>'+parsed.slice(0,8).map(p=>'<tr><td>'+esc(p.name)+'</td><td class="small">'+esc(p.folderName||'—')+'</td><td class="r num">'+fmtQty(p.qty)+'</td><td class="small mono">'+esc(p.sku||'')+'</td></tr>').join('')+(parsed.length>8?'<tr><td colspan="4" class="small muted">… and '+(parsed.length-8)+' more</td></tr>':'')+'</tbody></table></div>';
    $('#imp-stage').innerHTML=h;
    $('#imp-go').onclick=async()=>{
      $('#imp-go').disabled=true;
      const dupMode=$('#imp-dup')?$('#imp-dup').value:'update';
      const nameDupMode=$('#imp-namedup')?$('#imp-namedup').value:'update';
      const nameIdx={};S.items.forEach(i=>{const k=(i.name||'').trim().toLowerCase();if(k&&!(k in nameIdx))nameIdx[k]=i.id;});
      const fmap={};S.folders.forEach(f=>fmap[folderPath(f.id).toLowerCase()]=f.id);S.folders.forEach(f=>{if(!(f.name.toLowerCase() in fmap))fmap[f.name.toLowerCase()]=f.id});
      function folderFor(nm){
        if(!nm)return null;const key=nm.toLowerCase();
        if(fmap[key])return fmap[key];
        let parent=null;
        nm.split('/').map(s=>s.trim()).filter(Boolean).forEach(seg=>{
          const segKey=(parent?folderPath(parent).toLowerCase()+' / ':'')+seg.toLowerCase();
          if(fmap[segKey]){parent=fmap[segKey];return}
          const nf={id:uid('f'),name:seg,parent:parent,createdAt:Date.now()};
          S.folders.push(nf);fmap[segKey]=nf.id;parent=nf.id;
        });
        return parent;
      }
      let added=0,updated=0,skipped=0;
      parsed.forEach(p=>{
        // 1) SKU match (any SKU, case-insensitive)
        let ex=p.sku?S.items.find(i=>skusOf(i).some(s=>String(s).toLowerCase()===String(p.sku).toLowerCase())):null;
        let viaName=false;
        // 2) no SKU match → try NAME match
        if(!ex){
          const nid=nameIdx[(p.name||'').trim().toLowerCase()];
          if(nid!=null){ex=iById(nid);viaName=true;}
        }
        if(ex){
          const mode=viaName?nameDupMode:dupMode;
          if(mode==='skip'){skipped++;return}
          if(mode==='update'){
            Object.assign(ex,{name:p.name,qty:p.qty,unit:p.unit,price:p.price,cost:p.cost,min:p.min,tags:p.tags.length?p.tags:ex.tags,notes:p.notes||ex.notes,img:p.img||ex.img,updatedAt:Date.now()});
            syncPilesToQty(ex);
            if(p.sku||p.alt.length)setSkus(ex,[p.sku||p.code||ex.sku].concat(p.alt||[]).filter(Boolean));
            if(p.folderName)ex.folder=folderFor(p.folderName);
            updated++;return;
          }
          // mode==='create' falls through to create a new item
        }
        const ni=newItem({name:p.name,qty:p.qty,unit:p.unit,price:p.price,cost:p.cost,min:p.min,tags:p.tags,notes:p.notes,img:p.img||'',folder:folderFor(p.folderName)});
        setSkus(ni,[p.sku||p.code].concat(p.alt||[]).filter(Boolean));
        S.items.push(ni);
        // keep name index fresh so later rows with same name update this one
        const nk=(ni.name||'').trim().toLowerCase();if(nk&&!(nk in nameIdx))nameIdx[nk]=ni.id;
        added++;
      });
      logTx('imported',{detail:added+' added, '+updated+' updated'+(skipped?', '+skipped+' skipped':'')+' from CSV'});
      await Promise.all([saveNow('items'),saveNow('folders')]);
      updateBadges();
      toast('Imported — '+added+' added, '+updated+' updated','ok');
      go('#stock');
    };
  }
}

        S.meta=Object.assign(DEFAULT_META(),d.meta||{});S.folders=d.folders||[];S.items=d.items||[];S.txns=d.txns||[];S.lists=d.lists||[];S.pos=d.pos||[];S.trash=d.trash||[];S.dispatches=d.dispatches||[];S.approvals=d.approvals||[];S.awbs=d.awbs||[];
        S.txns.forEach(t=>{if(!t.id)t.id=uid('t')});
        await Promise.all(['meta','folders','items','txns','lists','pos','trash','dispatches','approvals','awbs'].map(saveNow));
        if(MODE==='cloud'&&S.txns.length){
          for(let i2=0;i2<S.txns.length;i2+=400){const b=db.batch();S.txns.slice(i2,i2+400).forEach(t=>b.set(db.collection('txns').doc(t.id),clean(t)));await b.commit()}
        }

        logTx('imported',{detail:'Backup restored'});

  };
  const sm=$('#st-sample');if(sm)sm.onclick=async()=>{sm.disabled=true;await loadSample();toast('Sample data loaded','ok');route()};
  const wb=$('#st-wipe');if(wb)wb.onclick=async()=>{
    const ok=await confirmDlg('Erase everything?','Items, folders, lists, POs, history and photos will be permanently deleted'+(MODE==='cloud'?' for the whole team':'')+'. Take a backup first if in doubt.','Erase all',true);
    if(!ok)return;
    $('#st-wipe').disabled=true;$('#st-wipe').textContent='Erasing…';
    if(MODE==='cloud'){
      try{
        for(const c of ['items','folders','txns','lists','pos','trash','photos']){
          let q=await db.collection(c).limit(400).get();
          while(!q.empty){const b=db.batch();q.docs.forEach(d=>b.delete(d.ref));await b.commit();q=await db.collection(c).limit(400).get()}
        }
        await db.collection('meta').doc('app').delete();
      }catch(e){toast('Erase failed: '+(e.message||e),'err');route();return}
      Object.keys(shadows).forEach(k=>delete shadows[k]);
      S.meta=DEFAULT_META();S.folders=[];S.items=[];S.txns=[];S.lists=[];S.pos=[];S.trash=[];
      await saveNow('meta');
    } else {
      const keys=await store.listPhotoKeys();
      for(const k of keys)await store.del(k);
      S.meta=DEFAULT_META();S.folders=[];S.items=[];S.txns=[];S.lists=[];S.pos=[];S.trash=[];
      await Promise.all(['meta','folders','items','txns','lists','pos','trash','dispatches','approvals','awbs'].map(saveNow));
    }
    toast('All data erased');paintNav();go('#home');
  };
}

// duplicate = a prior DISPATCH (not return) with same orderId (case-insensitive) AND same market
function findDuplicateDispatch(orderId,market){
  const oid=String(orderId||'').trim().toLowerCase();
  if(!oid)return null;
  return (S.dispatches||[]).find(d=>d.kind!=='return' && String(d.orderId||'').trim().toLowerCase()===oid && (d.dest||'dom')===(market||'dom'))||null;
}
// verify an admin/mainframe via a secondary auth instance so the current user stays logged in
// Legacy accounts (userid@invento.app) attach a real email. Uses verifyBeforeUpdateEmail:
// the email switches only after they click the link — safe if they mistype.
function attachEmailFlow(){
  if(MODE!=='cloud'||!fbUser)return;
  openModal('<h3>Add a recovery email</h3>'+
    '<p class="sub mb">A link goes to this email. After you open it, sign in with the email + your same password. Password resets then work by yourself.</p>'+
    '<div class="field"><label>Your email</label><input class="in" id="ae-e" type="email" inputmode="email" autocomplete="email" autocapitalize="none" spellcheck="false" placeholder="you@gmail.com"></div>'+
    '<div class="field"><label>Current password <span class="muted">(to confirm it\'s you)</span></label><input class="in" id="ae-p" type="password" autocomplete="current-password"></div>'+
    '<button class="btn pri block" id="ae-go">'+ico('check')+'Send verification link</button>');
  setTimeout(()=>{try{$('#ae-e').focus()}catch(e){}},40);
  $('#ae-go').onclick=async()=>{
    const em=($('#ae-e').value||'').trim(), pw=$('#ae-p').value;
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){toast('Enter a valid email','err');return}
    if(!pw){toast('Enter your current password','err');return}
    const btn=$('#ae-go');btn.disabled=true;btn.textContent='Sending…';
    try{
      const cred=firebase.auth.EmailAuthProvider.credential(fbUser.email,pw);
      await fbUser.reauthenticateWithCredential(cred);
      await fbUser.verifyBeforeUpdateEmail(em);
      try{await db.collection('users').doc(fbUser.uid).set({pendingEmail:em},{merge:true})}catch(e){}
      closeModal();
      openModal('<h3>Check '+esc(em)+' '+ico('check')+'</h3><p class="sub mb">Open the verification link (check spam too). After that, sign in with <b>'+esc(em)+'</b> and your same password. Your user ID stays the same for the team.</p><button class="btn pri block" onclick="closeModal()">Done</button>');
    }catch(e){
      btn.disabled=false;btn.innerHTML=ico('check')+'Send verification link';
      const c=(e&&e.code)||'';
      toast(c==='auth/wrong-password'||c==='auth/invalid-credential'?'Password is wrong':(c==='auth/email-already-in-use'?'That email already has an Invento account':authErrMsg(e)),'err');
    }
  };
}

async function verifyAdmin(userId,password){
  if(MODE!=='cloud')return true;
  let sec;
  try{
    sec=firebase.initializeApp(fbApp.options,'admincheck_'+Date.now());
    const email=authEmail(userId);
    const cred=await sec.auth().signInWithEmailAndPassword(email,password);
    const uid=cred.user.uid;
    // read their profile via primary db (rules allow admins to read; but we just need role)
    const snap=await db.collection('users').doc(uid).get();
    const ok=snap.exists && ['admin','mainframe'].includes((snap.data()||{}).role) && (snap.data()||{}).status==='active';
    try{await sec.auth().signOut()}catch(e){}
    return ok;
  }catch(e){return false}
  finally{ if(sec){try{await sec.delete()}catch(e){}} }
}

function startDispatch(seed){
  openModal('<h3>Dispatch · '+marketLabel()+'</h3>'+

// Rapid hardware-scanner mode: an always-focused field; the BT scanner "types" the code + Enter.
// onCode(code) is called for each scan. Used by dispatch & return when the machine switch is ON.
function hwScanModal(title,onCode,opts){
  opts=opts||{};
  let h='<h3>'+esc(title)+' <span class="pill ok" style="font-size:10px">Machine</span></h3>';
  h+='<p class="sub mb">Point the barcode machine and scan — each scan is added instantly. Keep this open and keep scanning.</p>';
  h+='<div class="searchbar mb" style="border-color:var(--saddle)">'+ico('scan')+'<input id="hw-in" placeholder="Waiting for scan…" autocomplete="off" autocapitalize="off" autocorrect="off"></div>';
  if(opts.condToggle){
    h+='<div class="condbtns mb" style="grid-template-columns:1fr 1fr"><button class="condbtn good on" id="hw-good">'+ico('check')+'Good</button><button class="condbtn bad" id="hw-bad">'+ico('x')+'Damaged</button></div><div class="hint" style="margin-top:-4px">New scans use the selected condition.</div>';
  }
  h+='<div id="hw-feed" class="sub" style="min-height:40px;margin:8px 0"></div>';
  if(opts&&opts.camBtn)h+='<button class="btn block" id="hw-cam" style="margin-bottom:8px">'+ico('camera')+'Use camera instead</button>';
  h+='<button class="btn pri block" id="hw-done">'+ico('check')+'Done</button>';
  openModal(h);
  const inp=$('#hw-in'),feed=$('#hw-feed');
  let count=0;
  const refocus=()=>{try{inp.focus()}catch(e){}};
  refocus();
  // keep focus so the scanner always lands in the box
  const fi=setInterval(refocus,400);
  let cond='good';
  if(opts.condToggle){
    $('#hw-good').onclick=()=>{cond='good';$('#hw-good').classList.add('on');$('#hw-bad').classList.remove('on');refocus()};
    $('#hw-bad').onclick=()=>{cond='bad';$('#hw-bad').classList.add('on');$('#hw-good').classList.remove('on');refocus()};
  }
  const handle=(code)=>{
    code=String(code||'').trim();if(!code)return;
    onCode(code,cond);count++;
    const it=findByCode(code);
    feed.innerHTML='<b style="color:var(--green)">+ '+esc(it?it.name:code)+'</b>'+(it?'':' <span class="muted">(saved as code)</span>')+'<div class="sub">'+count+' scanned</div>';
    beep(true);inp.value='';
  };
  inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();handle(inp.value)}};
  // some scanners send no Enter — debounce on input
  let t=null;
  inp.oninput=()=>{clearTimeout(t);t=setTimeout(()=>{if(inp.value.trim().length>=3){handle(inp.value)}},120)};
  $('#hw-done').onclick=()=>{clearInterval(fi);closeModal();if(opts.onDone)opts.onDone()};
  const hc=$('#hw-cam');if(hc)hc.onclick=()=>{clearInterval(fi);closeModal();opts.camBtn()};
  const ov=$('#ovl');const obs=new MutationObserver(()=>{if(!ov.classList.contains('show')){clearInterval(fi);obs.disconnect();if(opts.onDone)opts.onDone()}});obs.observe(ov,{attributes:true,attributeFilter:['class']});
}

function dispatchScan(force){
  if(!force&&hwScanner()){return hwScanModal('Scan to dispatch',(code)=>addDispatchLineByCode(code),{onDone:()=>vDispatchNew(),camBtn:()=>dispatchScan(true)});}
  // full-screen scanner overlay that keeps adding lines until closed
  let h='<div class="scanwrap" id="dsw"><div class="scanbox"><div class="laser"></div></div><video id="dsv" playsinline muted></video></div>';
  h+='<div class="row mt" style="gap:9px"><div class="searchbar grow">'+ico('scan')+'<input id="ds-manual" placeholder="or type a SKU and press Enter" autocomplete="off"></div></div>';
  h+='<div id="ds-feed" class="sub mt" style="min-height:22px"></div>';
  h+='<button class="btn pri block mt" id="ds-done">'+ico('check')+'Done scanning</button>';
  openModal(h,true);
  const feed=$('#ds-feed');
  const manual=$('#ds-manual');
  manual.onkeydown=e=>{if(e.key==='Enter'){const v=manual.value.trim();if(v){addDispatchLineByCode(v);feed.innerHTML='Added <b>'+esc(v)+'</b>';manual.value=''}}};
  let stop=null,lastCode='',lastTs=0;
  const teardown=()=>{if(stop){try{stop()}catch(e){}stop=null}};
  (async()=>{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){feed.textContent='Camera not available — type the SKU above, or use a USB/Bluetooth scanner.';return}
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});}
    catch(e){feed.textContent='Camera blocked. Allow camera access, or type the SKU above.';return}
    const v=$('#dsv');if(!v){try{stream.getTracks().forEach(t=>t.stop())}catch(e){}return}
    v.srcObject=stream;await v.play().catch(()=>{});
    stop=()=>{try{stream.getTracks().forEach(t=>t.stop())}catch(e){}};
    if(!('BarcodeDetector' in window)){feed.innerHTML='Live scan isn’t supported on this browser — type SKUs above, or use the <b>Take photo</b> option instead.';return}
    let fmts;try{fmts=await BarcodeDetector.getSupportedFormats()}catch(e){fmts=[]}
    const det=new BarcodeDetector({formats:fmts.length?fmts:['code_128','ean_13','qr_code','code_39','ean_8','upc_a','upc_e']});
    const loop=async()=>{
      if(!stop)return;
      try{const codes=await det.detect(v);
        if(codes&&codes.length){const c=codes[0].rawValue;const now=Date.now();
          if(c&&(c!==lastCode||now-lastTs>2200)){lastCode=c;lastTs=now;addDispatchLineByCode(c);const it=findByCode(c);feed.innerHTML='Added <b>'+esc(it?it.name:c)+'</b>'+(it?'':' <span class="muted">(not in catalog — saved as code)</span>');}
        }
      }catch(e){}
      if(stop)setTimeout(()=>{requestAnimationFrame(loop)},180);
    };
    requestAnimationFrame(loop);
  })();
  $('#ds-done').onclick=()=>{teardown();closeModal();vDispatchNew();};
  // ensure camera stops if modal closed another way
  const ov=$('#ovl');
  const obs=new MutationObserver(()=>{if(!ov.classList.contains('show')){teardown();obs.disconnect();}});
  obs.observe(ov,{attributes:true,attributeFilter:['class']});
}

async function saveDispatch(){
  if(!dDraft||!dDraft.lines.length)return;
  if(!can('dispatch')){toast('You do not have permission to dispatch','err');return}
  const deductable=dDraft.lines.filter(l=>l.itemId);
  const ok=await confirmDlg('Save dispatch '+esc(dDraft.orderId)+'?',
    dDraft.lines.length+' item'+(dDraft.lines.length>1?'s':'')+' · '+(dDraft.dest==='intl'?'International':'Domestic')+'.'+
    (deductable.length?'<br>Stock will be reduced for '+deductable.length+' scanned item'+(deductable.length>1?'s':'')+'.':'<br>No catalog items matched, so nothing is deducted — saved as a record.'),
    'Save dispatch');
  if(!ok)return;
  /* plan A: for multi-rack items, ask which rack the pieces are being taken from */
  const rackChoice={};
  const multiLines=dDraft.lines.filter(l=>{const it=l.itemId&&iById(l.itemId);return it&&isMultiRack(it)});
  if(multiLines.length){
    const picked=await new Promise(res=>{
      let mh='<h3>Which rack?</h3><p class="sub mb">These items sit in more than one rack — pick where the pieces are coming from. If a rack runs short, the rest is taken from the other racks automatically.</p>';
      multiLines.forEach((l,ix)=>{const it=iById(l.itemId);
        mh+='<div class="field"><label class="ellip">'+esc(it.name)+' — taking '+fmtQty(l.qty)+'</label><select class="in" data-rkpick="'+ix+'">'+pilesOf(it).map((p,pix)=>'<option value="'+pix+'"'+(pix===0?' selected':'')+'>'+esc(shelfName(p.f))+' — '+fmtQty(p.q)+' here</option>').join('')+'</select></div>';});
      mh+='<button class="btn pri block" id="rk-go">'+ico('check')+'Continue</button>';
      openModal(mh);
      $('#rk-go').onclick=()=>{const out={};$$('#modal [data-rkpick]').forEach(s=>{const l=multiLines[+s.dataset.rkpick];const it=iById(l.itemId);out[l.itemId+'|'+dDraft.lines.indexOf(l)]=pilesOf(it)[+s.value].f});closeModal();res(out)};
      const ovv=$('#ovl');const obs2=new MutationObserver(()=>{if(!ovv.classList.contains('show')){obs2.disconnect();res(null)}});obs2.observe(ovv,{attributes:true,attributeFilter:['class']});
    });
    if(!picked)return; // user closed the rack question — dispatch not saved
    Object.assign(rackChoice,picked);
  }
  const sv=$('#d-save');if(sv){sv.disabled=true;sv.textContent='Saving…'}
  const no=await nextDispatchNo();
  // deduct stock + log movements (pile-aware)
  for(const ln of dDraft.lines){
    if(!ln.itemId)continue;
    const it=iById(ln.itemId);if(!it)continue;
    const old=+it.qty||0;const q=Math.min(+ln.qty||0,old);
    const pf=rackChoice[ln.itemId+'|'+dDraft.lines.indexOf(ln)];
    const fromTxt=pileDrain(it,q,pf);
    logTx('out',{itemId:it.id,itemName:it.name,fromQ:old,toQ:it.qty,qty:q,reason:'Dispatched · '+dDraft.orderId,detail:'Dispatch '+dDraft.orderId+(fromTxt&&pf!==undefined?' · from '+fromTxt:'')});
  }
  // store photos separately (keyed) to keep dispatch doc small
  const rec={id:uid('d'),number:no,orderId:dDraft.orderId,dest:dDraft.dest,ts:Date.now(),by:userName(),dupApproved:!!dDraft.dupApproved,
    lines:dDraft.lines.map(l=>({itemId:l.itemId||null,name:l.name||'',code:l.code||'',qty:+l.qty||0,thumb:l.thumb||'',hasPhoto:!!l.photo}))};
  // save full photos under d:<id> (array aligned to lines that hasPhoto)
  const photos=dDraft.lines.filter(l=>l.photo).map(l=>l.photo);
  S.dispatches.unshift(rec);
  await Promise.all([saveNow('items'),saveNow('dispatches')]);
  if(photos.length){try{await store.set('p:dsp_'+rec.id,photos)}catch(e){}}
  logTx('dispatch',{detail:dDraft.orderId+' · '+dDraft.lines.length+' items'+(dDraft.dest==='intl'?' · Intl':' · Dom')});
  dDraft=null;
  updateBadges();
  toast('Dispatch saved · stock updated','ok');
  go('#dispatch');
}

// sum of what was dispatched for an order (by itemId, fallback code), and what already came back
function orderLedger(orderId,market){
  const oid=String(orderId||'').trim().toLowerCase();
  const sent={}, back={}, names={};
  if(!oid)return {sent,back,names,hasOrder:false};
  let hasOrder=false;
  (S.dispatches||[]).forEach(d=>{
    const same=String(d.orderId||d.refId||'').trim().toLowerCase()===oid && (d.dest||'dom')===(market||'dom');
    if(!same)return;
    (d.lines||[]).forEach(l=>{
      const key=l.itemId||('code:'+(l.code||l.name||''));
      names[key]=l.name||l.code||'Item';
      if(d.kind==='return'){back[key]=(back[key]||0)+(+l.qty||0)}
      else{sent[key]=(sent[key]||0)+(+l.qty||0);hasOrder=true}
    });
  });
  return {sent,back,names,hasOrder};
}
function lineKey(l){return l.itemId||('code:'+(l.code||l.name||''))}

function startReturn(seed){
  openModal('<h3>Return · '+marketLabel()+'</h3>'+
    '<div class="field"><label>Reference (order ID / RMA — optional)</label><input class="in" id="r-ref" placeholder="e.g. RET-204, #1042" autocomplete="off"></div>'+
    '<button class="btn pri block" id="r-start">'+ico('undo')+'Start return</button>');
  $('#r-ref').focus();
  $('#r-ref').onkeydown=e=>{if(e.key==='Enter')$('#r-start').click()};
  $('#r-start').onclick=()=>{
    const ref=$('#r-ref').value.trim();
    const led=ref?orderLedger(ref,getMarket()):{hasOrder:false};
    rDraft={refId:ref||('Return '+new Date().toLocaleDateString()),dest:getMarket(),lines:[],ts:Date.now(),linkedOrder:(ref&&led.hasOrder)?ref:null};
    if(seed)rDraft.lines.push({itemId:seed.id,name:seed.name,code:seed.sku||'',qty:1,cond:'good',thumb:seed.thumb||''});
    closeModal();go('#return/new');
  };
}

function returnMatchHTML(){
  if(!rDraft.linkedOrder)return '';
  const led=orderLedger(rDraft.linkedOrder,rDraft.dest);
  // current returning counts from draft
  const cur={};rDraft.lines.forEach(l=>{const k=lineKey(l);cur[k]=(cur[k]||0)+(+l.qty||0)});
  const keys=Object.keys(led.sent);
  if(!keys.length)return '';
  let rows='';
  keys.forEach(k=>{
    const sent=led.sent[k]||0, already=led.back[k]||0, now=cur[k]||0;
    const accounted=already+now;
    const over=accounted>sent;
    const done=accounted>=sent;
    rows+='<div class="sl"><span>'+esc(led.names[k]||'Item')+'</span><b style="color:'+(over?'var(--red)':(done?'var(--green)':'var(--saddle-dk)'))+'">'+fmtQty(accounted)+' / '+fmtQty(sent)+(over?' ⚠':(done?' ✓':''))+'</b></div>';
  });
  return '<div class="splitbox mb"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:4px">Returned / Sent for this order</div>'+rows+'</div>';
}

    const it=ln.itemId?iById(ln.itemId):null;

      '<div class="stepper" style="max-width:118px"><button data-rm="'+ix+'">−</button><input class="num" data-rq="'+ix+'" inputmode="decimal" value="'+fmtQty(ln.qty)+'"><button data-rp="'+ix+'">+</button></div>'+

function placementHTML(ln){
  if(!ln.itemId)return '<div class="splitbox" style="width:100%">Not in catalog — saved as a record only. Add it as an item first to track stock & location.</div>';
  const it=iById(ln.itemId);if(!it)return '';
  if(ln.cond==='bad'){
    const dmgId=damagedFolderId();
    const dmgRec=dmgId?stockSplit(it).find(s=>s.folder===dmgId):null;
    return '<div class="splitbox" style="width:100%"><div class="sl"><span>📍 Place in</span><b>'+esc(DAMAGED_FOLDER_NAME)+(dmgRec&&dmgRec.qty>0?' (has '+fmtQty(dmgRec.qty)+' already)':' (new)')+'</b></div></div>';
  }
  // good: show split + where it lands (its own folder)
  const split=stockSplit(it);
  let s='<div class="splitbox" style="width:100%"><div class="sl"><span>📍 Place in</span><b>'+esc(folderPath(it.folder))+'</b></div>';
  if(split.length>1){s+='<div style="border-top:1px solid var(--line2);margin:5px 0;opacity:.5"></div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:2px">Current stock across '+locLP()+'</div>';
    split.forEach(sp=>{s+='<div class="sl"><span>'+esc(sp.path)+'</span><b>'+fmtQty(sp.qty)+'</b></div>'})}
  s+='</div>';
  return s;
}

async function saveReturn(){
  if(!rDraft||!rDraft.lines.length)return;
  if(!can('dispatch')){toast('No permission','err');return}
  // over-return check when linked to an order: returning more than was sent needs admin approval
  if(rDraft.linkedOrder){
    const led=orderLedger(rDraft.linkedOrder,rDraft.dest);
    const cur={};rDraft.lines.forEach(l=>{const k=lineKey(l);cur[k]=(cur[k]||0)+(+l.qty||0)});
    const over=[];
    Object.keys(cur).forEach(k=>{
      const sent=led.sent[k]||0, already=led.back[k]||0;
      if(sent>0 && (already+cur[k])>sent+1e-9)over.push((led.names[k]||'Item')+' ('+fmtQty(already+cur[k])+' vs '+fmtQty(sent)+' sent)');
    });
    if(over.length){
      const approved=await adminApprove('This returns more than was dispatched for <b>'+esc(rDraft.linkedOrder)+'</b>: '+esc(over.join(', '))+'.');
      if(!approved){toast('Over-return blocked — needs admin approval','err');return}
      rDraft.overApproved=true;
    }
  }
  const good=rDraft.lines.filter(l=>l.itemId&&l.cond!=='bad');
  const bad=rDraft.lines.filter(l=>l.itemId&&l.cond==='bad');
  const ok=await confirmDlg('Save return '+esc(rDraft.refId)+'?',
    rDraft.lines.length+' line'+(rDraft.lines.length>1?'s':'')+'.<br>'+
    (good.length?good.length+' good → back to stock. ':'')+
    (bad.length?bad.length+' damaged → '+DAMAGED_FOLDER_NAME+'.':'')+
    (rDraft.lines.some(l=>!l.itemId)?'<br>Items not in catalog are logged only.':''),
    'Save return');
  if(!ok)return;
  const sv=$('#r-save');if(sv){sv.disabled=true;sv.textContent='Saving…'}
  let dmgFolder=null;
  if(bad.length)dmgFolder=await ensureDamagedFolder();
  const savedLines=[];
  for(const ln of rDraft.lines){
    if(!ln.itemId){savedLines.push({itemId:null,name:ln.name,code:ln.code,qty:+ln.qty||0,cond:ln.cond});continue;}
    const src=iById(ln.itemId);if(!src){continue;}
    const q=+ln.qty||0;
    if(ln.cond==='bad'){
      const rec=await recordInFolder(src,dmgFolder);
      const old=+rec.qty||0;rec.qty=round4(old+q);rec.updatedAt=Date.now();
      logTx('in',{itemId:rec.id,itemName:rec.name,fromQ:old,toQ:rec.qty,qty:q,reason:'Return (damaged) · '+rDraft.refId,detail:'Return '+rDraft.refId+' → '+DAMAGED_FOLDER_NAME});
      savedLines.push({itemId:rec.id,name:rec.name,code:rec.sku||ln.code,qty:q,cond:'bad',placedIn:folderPath(rec.folder)});
    } else {
      const old=+src.qty||0;pileAdd(src,src.folder||null,q);
      logTx('in',{itemId:src.id,itemName:src.name,fromQ:old,toQ:src.qty,qty:q,reason:'Return (good) · '+rDraft.refId,detail:'Return '+rDraft.refId});
      savedLines.push({itemId:src.id,name:src.name,code:src.sku||ln.code,qty:q,cond:'good',placedIn:folderPath(src.folder)});
    }
  }
  S.meta.seq.rt=(S.meta.seq.rt||0)+1;
  const rec={id:uid('r'),number:'RET-'+String(S.meta.seq.rt).padStart(4,'0'),refId:rDraft.refId,dest:rDraft.dest,ts:Date.now(),by:userName(),kind:'return',linkedOrder:rDraft.linkedOrder||null,overApproved:!!rDraft.overApproved,lines:savedLines};
  S.dispatches.unshift(rec); // returns stored alongside dispatches, flagged kind:'return'
  await Promise.all([saveNow('items'),saveNow('folders'),saveNow('dispatches'),saveNow('meta')]);
  logTx('dispatch',{detail:'Return '+rDraft.refId+' · '+rDraft.lines.length+' lines'});
  updateBadges();
  toast('Return saved · stock updated','ok');
  lastReturn=rec;          // keep for the done screen
  rDraft=null;
  go('#return/done/'+rec.id);
}

/* ============================================================
   AWB / SHIPMENTS — accountability for shipping labels
   ============================================================ */
const AWB_OVERDUE_DAYS=7;
function awbPending(){return (S.awbs||[]).filter(a=>a.status==='accepted')}
function awbOverdue(){const cut=Date.now()-AWB_OVERDUE_DAYS*86400000;return awbPending().filter(a=>(a.acceptedAt||0)<cut)}
// overdue AWBs held specifically by the current user (governs the accept-block)
function myOverdueAwbs(){const me=userName();return awbOverdue().filter(a=>(a.acceptedBy||'')===me)}
function awbByNo(no){const k=String(no||'').trim().toLowerCase();return (S.awbs||[]).find(a=>String(a.awb||'').trim().toLowerCase()===k)}
function awbAgeDays(a){return Math.floor((Date.now()-(a.acceptedAt||Date.now()))/86400000)}
// colour state by age: 'fresh' | 'aging' (5-6d) | 'over' (7d+)
function awbAgeClass(a){const d=awbAgeDays(a);if(d>=AWB_OVERDUE_DAYS)return 'over';if(d>=AWB_OVERDUE_DAYS-2)return 'aging';return 'fresh'}
async function acceptAwb(no){
  no=String(no||'').trim();
  if(!no)return {ok:false,msg:'Empty'};
  const ex=awbByNo(no);
  if(ex&&ex.status==='accepted')return {ok:false,msg:'Already in list ('+(ex.acceptedBy||'someone')+')'};
  if(ex&&ex.status==='dispatched')return {ok:false,msg:'Already dispatched'};
  const rec={id:uid('awb'),awb:no,status:'accepted',acceptedBy:userName(),acceptedAt:Date.now()};
  S.awbs.unshift(rec);
  await saveNow('awbs');
  logTx('list',{detail:'AWB accepted · '+no});
  return {ok:true,rec};
}
async function dispatchAwbByNo(no){
  no=String(no||'').trim();
  if(!no)return {ok:false,msg:'Empty'};
  let a=awbByNo(no);
  if(a&&a.status==='dispatched')return {ok:false,msg:'Already dispatched'};
  if(a&&a.status==='returned')return {ok:false,msg:'Was returned to office'};
  if(!a){ // scanned outward without being accepted first — create then dispatch
    a={id:uid('awb'),awb:no,status:'accepted',acceptedBy:userName(),acceptedAt:Date.now()};
    S.awbs.unshift(a);
  }
  a.status='dispatched';a.resolvedBy=userName();a.resolvedAt=Date.now();
  await saveNow('awbs');
  logTx('dispatch',{detail:'AWB dispatched · '+no});
  return {ok:true,rec:a};
}
async function returnAwbRec(a){
  if(!a||a.status!=='accepted')return false;
  a.status='returned';a.resolvedBy=userName();a.resolvedAt=Date.now();
  await saveNow('awbs');
  logTx('list',{detail:'AWB returned to office · '+a.awb});
  return true;
}

function vAwb(sub,arg){
  if(!(can('awbAccept')||can('awbDispatch')||can('awbReturn')||can('dispatch'))){toast('You do not have permission for AWBs','err');go('#home');return}

  if(sub==='out'){return awbScanFlow('out');}

  const pend=awbPending().slice().sort((a,b)=>(a.acceptedAt||0)-(b.acceptedAt||0)); // oldest first
  const disp=(S.awbs||[]).filter(a=>a.status==='dispatched').sort((a,b)=>(b.resolvedAt||0)-(a.resolvedAt||0));

  h+='<div class="bigbtns" style="margin-bottom:14px">'+

// Admin: tap to return. Regular user: must scan (handled by awbReturnScanFlow).
async function awbReturnOne(awbId){
  const a=(S.awbs||[]).find(x=>x.id===awbId);if(!a||a.status!=='accepted')return;
  if(!can('awbReturn')){toast('No permission to return AWBs','err');return}

/* scanner flow shared by inward / outward / return */
function awbScanFlow(mode){
  // mode: 'in' (accept) | 'out' (dispatch)
  const accept=mode==='in';
  if(accept && !can('awbAccept')){toast('No permission','err');go('#awb');return}
  if(!accept && !can('awbDispatch')){toast('No permission','err');go('#awb');return}
  awbScanModal(accept?'Inward — accept AWBs':'Outward — dispatch AWBs', accept?'Scan each label taken from office.':'Scan each AWB you are sending out.',
    async(code)=>accept?acceptAwb(code):dispatchAwbByNo(code), ()=>vAwb());
}
function awbReturnScanFlow(prefill){

  const refocus=()=>{try{inp.focus()}catch(e){}};refocus();
  let fi=null,stop=null;

    fi=setInterval(()=>{if(!document.querySelector('#aw-in2')){clearInterval(fi);return}refocus()},450);

  } else {

      if(!('BarcodeDetector' in window))return;let fmts;try{fmts=await BarcodeDetector.getSupportedFormats()}catch(e){fmts=[]}

      const loop=async()=>{if(!stop)return;try{const cs=await det.detect(v);if(cs&&cs.length){const c=cs[0].rawValue;const now=Date.now();if(c&&(c!==last||now-lt>2500)){last=c;lt=now;handle(c)}}}catch(e){}if(stop)setTimeout(()=>requestAnimationFrame(loop),200)};
      requestAnimationFrame(loop);
    })();
  }
  const cleanup=()=>{if(fi)clearInterval(fi);if(stop){try{stop()}catch(e){}stop=null}};
  $('#aw-done2').onclick=()=>{cleanup();closeModal();if(onDone)onDone();};
  const ov=$('#ovl');const obs=new MutationObserver(()=>{if(!ov.classList.contains('show')){cleanup();obs.disconnect();}});obs.observe(ov,{attributes:true,attributeFilter:['class']});

/* ---------------- PHONE AUTH (Blaze) ---------------- */
function normPhone(v){
  v=String(v||'').replace(/[^\d+]/g,'');
  if(v.startsWith('+'))return v;
  if(v.length===10)return '+91'+v;
  if(v.length===11&&v.startsWith('0'))return '+91'+v.slice(1);
  if(v.length===12&&v.startsWith('91'))return '+'+v;
  return v?'+'+v:'';
}
/* ============================================================
   OTP / EMAIL SEND RATE-GUARD (per device)
   SMS: min 60s between sends, max 4 sends per rolling hour.
   Emails (reset/verification): min 60s between sends.
   Note: Firebase also throttles server-side per number/IP —
   this layer mainly stops accidental re-taps burning SMS money.
   ============================================================ */
function smsGuard(){
  try{
    const now=Date.now();
    let a=JSON.parse(localStorage.getItem('invento_sms')||'[]').filter(t=>now-t<3600000);
    if(a.length&&now-a[a.length-1]<60000)return 'Please wait '+Math.ceil((60000-(now-a[a.length-1]))/1000)+'s before requesting another code';
    if(a.length>=4){const wait=Math.ceil((3600000-(now-a[0]))/60000);return 'Too many codes requested from this device — try again in ~'+wait+' min'}
    return '';
  }catch(e){return ''}
}
function smsGuardStamp(){try{const now=Date.now();let a=JSON.parse(localStorage.getItem('invento_sms')||'[]').filter(t=>now-t<3600000);a.push(now);localStorage.setItem('invento_sms',JSON.stringify(a))}catch(e){}}
function emailCool(key){try{const k='invento_ec_'+key;const last=+localStorage.getItem(k)||0;const now=Date.now();if(now-last<60000)return 'Please wait '+Math.ceil((60000-(now-last))/1000)+'s before sending again';localStorage.setItem(k,String(now));return ''}catch(e){return ''}}
let _rcv=null;
function newCaptcha(){
  try{if(_rcv){_rcv.clear();}}catch(e){}
  const old=document.getElementById('rcv');if(old)old.remove();
  const el=document.createElement('div');el.id='rcv';document.body.appendChild(el);
  _rcv=new firebase.auth.RecaptchaVerifier(el,{size:'invisible'});
  return _rcv;
}
// Shared OTP dialog. sendFn(verifier)->confirmationResult. onCred(cred) after confirm.
function otpModal(phone,sendFn,onCred,backTo){
  let conf=null,busy=false;
  const paint=(msg)=>{
    openModal('<h3>Enter the code</h3>'+
      '<p class="sub mb">We sent a 6-digit code by SMS to <b>'+esc(phone)+'</b>.'+(msg?' <span style="color:var(--red);font-weight:700">'+esc(msg)+'</span>':'')+'</p>'+
      '<div class="field"><label>SMS code</label><input class="in num" id="ot-c" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" style="letter-spacing:6px;font-size:20px;text-align:center"></div>'+
      '<button class="btn pri block" id="ot-go">'+ico('check')+'Verify</button>'+
      '<button class="btn block mt" id="ot-re" disabled>Resend code (60)</button>');
    const c=$('#ot-c');setTimeout(()=>{try{c.focus()}catch(e){}},60);
    c.onkeydown=e=>{if(e.key==='Enter')$('#ot-go').click()};
    let left=60;const tm=setInterval(()=>{left--;const b=$('#ot-re');if(!b){clearInterval(tm);return}if(left<=0){clearInterval(tm);b.disabled=false;b.textContent='Resend code'}else b.textContent='Resend code ('+left+')'},1000);
    $('#ot-re').onclick=async()=>{
      const g=smsGuard();if(g){toast(g,'err');return}
      try{$('#ot-re').disabled=true;conf=await sendFn(newCaptcha());smsGuardStamp();toast('Code sent again','ok');paint('')}catch(e){toast(authErrMsg(e),'err');$('#ot-re').disabled=false}};
    $('#ot-go').onclick=async()=>{
      if(busy)return;const code=(c.value||'').trim();
      if(code.length<6){toast('Enter the 6-digit code','err');return}
      busy=true;$('#ot-go').disabled=true;$('#ot-go').textContent='Verifying…';
      try{const cred=await conf.confirm(code);await onCred(cred);}
      catch(e){busy=false;$('#ot-go').disabled=false;$('#ot-go').innerHTML=ico('check')+'Verify';paint(authErrMsg(e));}
    };
  };
  (async()=>{
    const g=smsGuard();
    if(g){closeModal();if(backTo)backTo(g);else toast(g,'err');return}
    try{conf=await sendFn(newCaptcha());smsGuardStamp();paint('');}
    catch(e){closeModal();if(backTo)backTo(authErrMsg(e));else toast(authErrMsg(e),'err');}
  })();
}

  tab=tab||'in';m=m||'em';
  topTitle('Welcome','');
  const seg='<div class="seg mb" style="margin-top:2px"><button id="mm-em" class="'+(m==='em'?'on':'')+'">'+ico('lock')+'Email</button><button id="mm-ph" class="'+(m==='ph'?'on':'')+'">'+ico('scan')+'Phone</button></div>';
  $('#main').innerHTML='<div class="welcome"><div class="eyebrow" style="color:#C9A86C">Invento</div><h2>'+(tab==='in'?'Sign in':'Create your account')+'</h2><p>'+(tab==='in'?'You stay signed in on this device.':(m==='ph'?'Sign up with your mobile — we text a 6-digit code. An admin approves new accounts.':'Use a real email — it\'s how you reset a forgotten password. An admin approves new accounts.'))+'</p></div>'+
    '<div class="seg mb"><button id="tb-in" class="'+(tab==='in'?'on':'')+'">Sign in</button><button id="tb-up" class="'+(tab==='up'?'on':'')+'">Sign up</button></div>'+
    '<div class="card pad">'+seg+
    (err?'<p class="sub" style="color:var(--red);margin-bottom:12px;font-weight:600">'+esc(err)+'</p>':'')+
    (tab==='up'?'<div class="field"><label>Full name</label><input class="in" id="lg-n" autocomplete="name" placeholder="e.g. Ramesh Kumar"></div>':'')+
    (tab==='up'?'<div class="field"><label>User ID <span class="muted">(short name for the team)</span></label><input class="in" id="lg-u2" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="e.g. ramesh"></div>':'')+
    (m==='ph'
      ?'<div class="field"><label>Phone (India +91)</label><input class="in" id="lg-ph" type="tel" inputmode="tel" autocomplete="tel" placeholder="98765 43210"></div>'
      :(tab==='up'
        ?'<div class="field"><label>Email</label><input class="in" id="lg-e" type="email" inputmode="email" autocomplete="email" autocapitalize="none" spellcheck="false" placeholder="e.g. ramesh@gmail.com"></div>'
        :'<div class="field"><label>Email <span class="muted">(or user ID for old accounts)</span></label><input class="in" id="lg-u" type="text" inputmode="email" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="you@gmail.com or ramesh"></div>'))+
    (m==='em'?'<div class="field"><label>Password</label><input class="in" id="lg-p" type="password" autocomplete="'+(tab==='up'?'new-password':'current-password')+'" enterkeyhint="go" placeholder="'+(tab==='up'?'At least 6 characters':'')+'"></div>':'')+
    '<button class="btn pri block" id="lg-go">'+ico('check')+(m==='ph'?(tab==='in'?'Send code & sign in':'Send code & create account'):(tab==='in'?'Sign in':'Create account'))+'</button>'+
    (tab==='in'&&m==='em'?'<button class="btn block mt" id="lg-forgot" style="font-weight:600">'+ico('lock')+'Forgot password?</button>':'')+
    (m==='ph'?'<div class="hint mt">SMS charges apply to the business, not you. Standard code delivery.</div>':(tab==='up'?'<div class="hint mt">The email gets a verification link. Your team sees only your name and user ID.</div>':''))+
    '</div>'+
    '<button class="btn block mt" id="lang-flip" data-noi18n style="font-weight:700">'+(langHi()?'View in English':'हिंदी में देखें')+'</button>';
  $('#tb-in').onclick=()=>vLogin('','in',m);
  $('#tb-up').onclick=()=>vLogin('','up',m);
  $('#mm-em').onclick=()=>vLogin('',tab,'em');
  $('#mm-ph').onclick=()=>vLogin('',tab,'ph');
  const fg=$('#lg-forgot');if(fg)fg.onclick=()=>forgotPasswordDlg((($('#lg-u')||{}).value||'').trim());
  const doAuth=async()=>{
    const btn=$('#lg-go');
    if(m==='ph'){
      const phone=(($('#lg-ph')||{}).value||'').trim();
      if(tab==='up'){
        const nm=(($('#lg-n')||{}).value||'').trim();
        const uid=(($('#lg-u2')||{}).value||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
        if(!nm){toast('Enter your name','err');return}
        if(uid.length<2){toast('Pick a user ID','err');return}
        btn.disabled=true;btn.textContent='Sending code…';
        startPhoneAuth('up',{phone:phone,nm:nm,uid:uid},msg=>vLogin(msg,tab,m));
      }else{
        btn.disabled=true;btn.textContent='Sending code…';
        startPhoneAuth('in',{phone:phone},msg=>vLogin(msg,tab,m));
      }
      return;
    }
    const p=$('#lg-p').value;
    try{
      if(tab==='in'){
        const u=$('#lg-u').value.trim();
        if(!u||!p){toast('Enter your email/ID and password','err');return}
        btn.disabled=true;btn.textContent='Signing in…';
        const email=u.indexOf('@')>=0?u:authEmail(u);
        await firebase.auth().signInWithEmailAndPassword(email,p);
      }else{
        const nm=$('#lg-n').value.trim();
        const uid=$('#lg-u2').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
        const email=$('#lg-e').value.trim();
        if(!nm){toast('Enter your name','err');return}
        if(uid.length<2){toast('Pick a user ID (letters/numbers)','err');return}
        if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast('Enter a real email address','err');return}
        if(!p||p.length<6){toast('Password must be at least 6 characters','err');return}
        btn.disabled=true;btn.textContent='Creating…';
        const cred=await firebase.auth().createUserWithEmailAndPassword(email,p);
        try{await cred.user.updateProfile({displayName:nm})}catch(e){}
        const prof={id:cred.user.uid,userid:uid,name:nm,email:email,role:'user',status:'pending',createdAt:Date.now()};
        await db.collection('users').doc(cred.user.uid).set(prof);
        try{await cred.user.sendEmailVerification()}catch(e){}
      }
      location.hash='#home';location.reload();
    }catch(e){vLogin(authErrMsg(e),tab,m)}
  };
  $('#lg-go').onclick=doAuth;
  const pw=$('#lg-p');if(pw)pw.onkeydown=e=>{if(e.key==='Enter')doAuth()};
  const first=$(tab==='up'?'#lg-n':(m==='ph'?'#lg-ph':'#lg-u'));if(first)first.focus();
}
function vPending(){
  topTitle('Awaiting approval','');
  $('#main').innerHTML='<div class="empty" style="margin-top:46px">'+ico('check')+'<div class="t">Account created — waiting for approval</div><div class="s">Signed in as <b>'+esc(userName())+'</b>. An admin needs to approve you in More → Team members before you can see stock. Ask them, then tap below.</div>'+
    '<div class="row" style="justify-content:center;gap:9px"><button class="btn pri" onclick="location.reload()">'+ico('undo')+'Check again</button><button class="btn" id="pd-out">Sign out</button></div></div>';
  $('#pd-out').onclick=async()=>{try{await firebase.auth().signOut()}catch(e){};location.reload()};
}
function vRevoked(){
  topTitle('Access revoked','');
  $('#main').innerHTML='<div class="empty" style="margin-top:46px">'+ico('alert')+'<div class="t">Access revoked</div><div class="s">This account ('+esc(userName())+') has been revoked by an admin. Contact them if you think this is a mistake.</div>'+
    '<button class="btn" id="rv-out">Sign out</button></div>';
  $('#rv-out').onclick=async()=>{try{await firebase.auth().signOut()}catch(e){};location.reload()};
}
function vSetup(err){
  topTitle('Connect your team','');
  $('#main').innerHTML='<div class="welcome"><div class="eyebrow" style="color:#C9A86C">One-time setup</div><h2>Connect Firebase</h2><p>Ten minutes, free, and everyone on the team sees the same live stock — every change syncs instantly to all phones.</p></div>'+
    (err?'<div class="card pad mb" style="border-color:var(--red)"><b style="color:var(--red)">Could not connect</b><div class="sub mt" style="margin-top:6px">'+esc(err)+'</div></div>':'')+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:8px">Do this once (any laptop)</div><ol style="padding-left:20px;font-size:14px;line-height:1.85">'+
    '<li>Open <b>console.firebase.google.com</b> → <b>Add project</b> (name it <span class="mono">invento</span>, Analytics off)</li>'+
    '<li><b>Build → Firestore Database → Create database</b> → Production mode → location <b>asia-south1 (Mumbai)</b></li>'+
    '<li>In Firestore, open the <b>Rules</b> tab, replace everything with the rules below → <b>Publish</b></li>'+
    '<li><b>Build → Authentication → Get started → Sign-in method → Email/Password → Enable</b></li>'+
    '<li>Team members <b>sign up themselves</b> in the app (just a user ID + password, no email/OTP) — new accounts wait until an admin approves them in More → Team members. The ID <span class="mono">trishal</span> becomes the mainframe owner automatically.</li>'+
    '<li>Click the <b>&lt;/&gt;</b> (Web) icon on Project Overview → register app → copy the <span class="mono">firebaseConfig</span> block</li>'+
    '<li>Paste it below → Connect → sign in. Then share this file (or the team link from More) with your staff — they sign in with their own ID.</li></ol></div>'+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Security rules (step 3)</div><pre class="mono" id="ruletext" style="font-size:11.5px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;white-space:pre-wrap">'+esc(FB_RULES)+'</pre><button class="btn sm" id="rule-copy">'+ico('copy')+'Copy rules</button></div>'+
    '<div class="card pad mb"><div class="field"><label>Paste your firebaseConfig here</label><textarea class="in mono" id="cfg-in" style="min-height:130px" placeholder=\'const firebaseConfig = {\n  apiKey: "AIza…",\n  authDomain: "godown-xxxx.firebaseapp.com",\n  projectId: "godown-xxxx",\n  …\n};\'></textarea></div><button class="btn pri block" id="cfg-go">'+ico('bolt')+'Connect &amp; sync</button></div>'+
    '<button class="btn block" id="cfg-local">Skip — use on this device only (no sync)</button>';
  $('#rule-copy').onclick=()=>{try{navigator.clipboard.writeText(FB_RULES);toast('Rules copied','ok')}catch(e){toast('Select and copy the text above','err')}};
  $('#cfg-go').onclick=()=>{
    const c=parseCfgText($('#cfg-in').value);
    if(!c){toast('That does not look like a Firebase config — paste the whole block','err');return}
    localStorage.setItem('gdwn:fbconfig',JSON.stringify(c));
    localStorage.removeItem('gdwn:mode');
    location.hash='#home';location.reload();
  };
  $('#cfg-local').onclick=()=>{localStorage.setItem('gdwn:mode','local');location.hash='#home';location.reload()};
}
function vCloudError(e){
  topTitle('Connection problem','');
  const msg=(e&&e.message)||String(e);
  const denied=/permission|insufficient/i.test(msg);
  $('#main').innerHTML='<h1 class="page">Could not connect</h1>'+
    '<div class="card pad mb" style="border-color:var(--red)"><div class="mono small" style="word-break:break-word">'+esc(msg)+'</div>'+'</div>'+
    '<div class="card pad mb"><div class="eyebrow" style="margin-bottom:6px">Usual fixes</div><ul style="padding-left:18px;font-size:14px;line-height:1.8">'+
    (denied?'<li><b>Enable Email/Password sign-in</b> (Authentication → Sign-in method) and check the Firestore <b>Rules</b> allow signed-in users</li>':'')+
    '<li>Check internet on this device</li><li>Make sure Firestore Database was created in the project</li><li>Re-paste the config if the project changed</li></ul></div>'+
    '<div class="row" style="gap:9px"><button class="btn pri grow" onclick="location.reload()">'+ico('undo')+'Retry</button><button class="btn grow" id="ce-cfg">Re-enter config</button></div>'+
    '<button class="btn block mt" id="ce-local">Use on this device only (no sync)</button>';
  $('#ce-cfg').onclick=()=>{localStorage.removeItem('gdwn:fbconfig');location.reload()};
  $('#ce-local').onclick=()=>{localStorage.removeItem('gdwn:fbconfig');localStorage.setItem('gdwn:mode','local');location.reload()};
}

(async function init(){
  applyTheme(getTheme());
  window.addEventListener('hashchange',route);
  paintNav();
  $('#main').innerHTML='<div class="empty" style="margin-top:56px">'+ico('bolt')+'<div class="t">Connecting…</div><div class="s">Loading Invento</div></div>';
  let res;
  try{res=await loadAll()}
  catch(e){console.error(e);vCloudError(e);return}
  if(res==='setup'){vSetup();return}
  if(res==='login'){vLogin();return}
  if(res==='pending'){vPending();return}
  if(res==='revoked'){vRevoked();return}
  bootDone=true;
  scheduleAutoPO();
  setTimeout(()=>{autoRecoveryCheck()},4000);
  route();
})();
</script>
</body>
</html>
